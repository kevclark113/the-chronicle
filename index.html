.codelabel{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;opacity:.6}
.codevalue{font-family:'Cinzel Decorative',serif;font-size:2.2rem;color:var(--blood);letter-spacing:.3em;text-shadow:0 0 20px rgba(139,26,26,.28);margin:.14rem 0}
.codehint{font-size:.7rem;font-style:italic;opacity:.58}

/* ROSTER */
.roster{margin:.9rem 0}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:.46rem .65rem;border-radius:2px;margin-bottom:.35rem;border:1px solid var(--p2)}
.rrow.rdy{background:rgba(58,120,64,.1);border-color:var(--green)}
.rrow.wait{background:rgba(255,255,255,.16)}
.rname{font-family:'Cinzel',serif;font-size:.73rem;font-weight:600}
.rchar{font-size:.7rem;font-style:italic;color:#5a3520;opacity:.83;margin-top:.06rem}
.rwait{font-size:.7rem;font-style:italic;opacity:.48}
.rbadge{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.08em}
.wait-msg{text-align:center;font-style:italic;font-size:.8rem;opacity:.55;margin-top:.9rem;padding:.6rem}

/* PLAY WRAP */
.play-wrap{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#200d05 0%,#0b0704 80%);display:flex;flex-direction:column}
.phead{display:flex;justify-content:space-between;align-items:center;padding:.65rem 1.1rem;border-bottom:1px solid rgba(201,168,76,.16);flex-shrink:0}
.pbrand{font-family:'Cinzel Decorative',serif;font-size:.92rem;color:var(--gold);text-shadow:0 0 20px rgba(201,168,76,.38)}
.pcode{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--p2);opacity:.62}
.pcode strong{color:var(--gold);opacity:1}
.btn-leave{background:rgba(139,26,26,.15);border:1px solid rgba(139,26,26,.65);color:#e8b4b4;border-radius:2px;padding:.3rem .75rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-leave:hover{background:rgba(139,26,26,.3);border-color:var(--blood);color:var(--p0)}
#btn-abandon{background:transparent;border:1px solid rgba(139,26,26,.25);color:rgba(232,180,180,.4);border-radius:2px;padding:.28rem .55rem;font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s}
#btn-abandon:hover{background:rgba(139,26,26,.15);border-color:rgba(139,26,26,.5);color:#e8b4b4}
.pgrid{display:grid;grid-template-columns:1fr 255px;gap:.9rem;padding:.9rem;flex:1;align-items:start}
@media(max-width:680px){.pgrid{grid-template-columns:1fr}}

/* NARRATIVE */
.narc{display:flex;flex-direction:column}
.narc-card{display:flex;flex-direction:column;padding:0}
.log{padding:1.1rem 1.35rem;min-height:260px;max-height:calc(100vh - 250px);overflow-y:auto;display:flex;flex-direction:column;gap:.82rem}
.log::-webkit-scrollbar{width:5px}
.log::-webkit-scrollbar-track{background:var(--p2)}
.log::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
.mdm{font-size:.96rem;line-height:1.78;color:var(--ink);border-left:3px solid var(--gold);padding-left:.82rem}
.mlbl{font-family:'Cinzel',serif;font-size:.53rem;letter-spacing:.2em;text-transform:uppercase;color:var(--blood);margin-bottom:.16rem;opacity:.7}
.mpl{font-size:.87rem;line-height:1.62;color:#3a2010;background:rgba(255,255,255,.24);border-radius:2px;padding:.42rem .72rem;border-left:3px solid var(--ember);font-style:italic}
.mroll{font-family:'Cinzel',serif;font-size:.68rem;text-align:center;color:var(--blood);letter-spacing:.1em;opacity:.74}
.thinking{font-style:italic;color:var(--p2);font-size:.78rem;opacity:.58;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:.32}50%{opacity:.85}}

/* ACTION ZONE */
.azone{border-top:1px solid var(--p2);padding:.75rem .95rem}
.tpill{display:inline-block;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;padding:.28rem .72rem;border-radius:20px;border:1px solid;margin-bottom:.5rem}
.tpill-on{background:rgba(201,168,76,.14);border-color:var(--gold);color:var(--gold)}
.tpill-off{background:rgba(255,255,255,.08);border-color:var(--p2);color:#5a3520;opacity:.6}
.arow{display:flex;gap:.45rem;align-items:flex-end}
#ainp{flex:1;background:rgba(255,255,255,.34);border:1px solid var(--p2);border-radius:2px;padding:.42rem .6rem;font-family:'IM Fell English',serif;font-size:.94rem;color:var(--ink);resize:none;outline:none;transition:border-color .2s,box-shadow .2s}
#ainp:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.2)}
.btn-declare{background:linear-gradient(135deg,var(--blood) 0%,#6b1414 100%);color:var(--p0);border:1px solid #6b1414;border-radius:2px;padding:.42rem .85rem;font-family:'Cinzel',serif;font-size:.57rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-declare:hover{background:linear-gradient(135deg,#a02020 0%,var(--blood) 100%)}
.declare-btns{display:flex;flex-direction:column;gap:.3rem;flex-shrink:0}
.btn-bonus{background:linear-gradient(135deg,#4a3a6b,#2e2044);color:#c0a8e8;border:1px solid #6b4c8b;border-radius:2px;padding:.42rem .7rem;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-bonus:hover{background:linear-gradient(135deg,#6b4c8b,#4a3a6b);box-shadow:0 2px 8px rgba(107,76,139,.4)}
.btn-bonus-used{opacity:.45;cursor:not-allowed}
.btn-retry{display:inline-block;margin-top:.5rem;background:rgba(139,26,26,.12);border:1px solid var(--blood);color:var(--blood);border-radius:2px;padding:.25rem .7rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-retry:hover{background:rgba(139,26,26,.25)}

/* SIDEBAR */
.sbar{display:flex;flex-direction:column;gap:.72rem}
.sc{padding:.82rem}
.st{font-family:'Cinzel',serif;font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:var(--blood);border-bottom:1px solid var(--p2);padding-bottom:.3rem;margin-bottom:.62rem}

/* TURN ORDER */
.trow{display:flex;justify-content:space-between;align-items:center;padding:.26rem .38rem;border-radius:2px;margin-bottom:.16rem}
.trow-cur{background:rgba(201,168,76,.13);border:1px solid rgba(201,168,76,.26)}
.tcn{font-family:'Cinzel',serif;font-size:.7rem;font-weight:600}
.tcs{font-size:.6rem;font-style:italic;color:#5a3520;opacity:.7}
.tarr{color:var(--gold);font-size:.62rem}

/* HP */
.hpb{margin-bottom:.62rem}.hpb:last-child{margin-bottom:0}
.hpn{font-family:'Cinzel',serif;font-size:.66rem;font-weight:600;margin-bottom:.16rem}
.hbar-w{background:var(--p2);border-radius:2px;height:5px;overflow:hidden}
.hbar{height:100%;background:linear-gradient(90deg,var(--blood),var(--ember));border-radius:2px;transition:width .4s}
.hpnum{font-family:'Cinzel',serif;font-size:.54rem;color:var(--blood);margin-top:.12rem}
.hpctrl{display:flex;gap:.26rem;margin-top:.28rem;align-items:center}
.hpinp{width:38px;background:rgba(255,255,255,.34);border:1px solid var(--p2);border-radius:2px;padding:.16rem .3rem;font-family:'Cinzel',serif;font-size:.66rem;color:var(--ink);text-align:center;outline:none}
.hbtn{flex:1;padding:.16rem 0;font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.04em;cursor:pointer;border-radius:2px;border:1px solid;transition:opacity .15s}
.db{background:rgba(139,26,26,.11);border-color:var(--blood);color:var(--blood)}
.hb{background:rgba(58,120,64,.11);border-color:var(--green);color:var(--green)}
.hbtn:hover{opacity:.68}

/* DICE */
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:.28rem}
.dbtn{background:linear-gradient(135deg,var(--p1),var(--p2));border:1px solid var(--gold);border-radius:2px;padding:.35rem .08rem;font-family:'Cinzel',serif;font-size:.57rem;color:var(--ink);cursor:pointer;text-align:center;transition:all .15s}
.dbtn:hover{background:linear-gradient(135deg,var(--gold2),var(--gold));box-shadow:0 2px 6px rgba(201,168,76,.28)}
.dres{text-align:center;margin-top:.5rem;font-family:'Cinzel',serif;font-size:1.6rem;color:var(--blood);font-weight:700;line-height:1.1}
.dres span{font-size:.56rem;color:var(--ink);opacity:.52;display:block;font-weight:400}
.dempty{text-align:center;margin-top:.42rem;font-family:'Cinzel',serif;font-size:.52rem;opacity:.28;letter-spacing:.1em}

/* MINI STATS */
.mstats{display:grid;grid-template-columns:repeat(3,1fr);gap:.26rem}
.ms{background:rgba(255,255,255,.2);border:1px solid var(--p2);border-radius:2px;text-align:center;padding:.26rem .08rem}
.msk{font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blood);opacity:.84}
.msv{font-family:'Cinzel',serif;font-size:.98rem;font-weight:600;color:var(--ink);line-height:1.1}
.msm{font-size:.56rem;color:var(--ember);font-style:italic}

/* ── CHARACTER SHEET ── */
.sheet-toggle{cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.sheet-toggle:hover{opacity:.8}
.sheet-arrow{color:var(--gold);font-size:.6rem}
.sheet-tabs{display:flex;gap:.2rem;margin-bottom:.6rem;flex-wrap:wrap}
.stab{background:rgba(255,255,255,.2);border:1px solid var(--p2);border-radius:2px;padding:.22rem .45rem;
  font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--ink);transition:all .15s}
.stab-on{background:linear-gradient(135deg,var(--gold),#a8862e);border-color:var(--gold2);color:var(--ink);font-weight:600}
.stab:hover:not(.stab-on){border-color:var(--gold);background:rgba(201,168,76,.15)}
.sheet-body{font-size:.82rem}
.sheet-row-label{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blood);opacity:.75;margin-top:.5rem}
.sheet-val{font-family:'Cinzel',serif;font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:.1rem}
.sheet-list{display:flex;flex-direction:column;gap:.28rem;margin-bottom:.5rem;max-height:160px;overflow-y:auto}
.sheet-list::-webkit-scrollbar{width:4px}
.sheet-list::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
.sheet-item{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.22);
  border:1px solid var(--p2);border-radius:2px;padding:.22rem .4rem;font-size:.78rem;gap:.3rem}
.sheet-item span{flex:1;word-break:break-word}
.del-btn{background:transparent;border:none;color:var(--blood);cursor:pointer;font-size:.65rem;opacity:.5;flex-shrink:0;padding:0 .1rem}
.del-btn:hover{opacity:1}
.sheet-add-row{display:flex;gap:.3rem}
.sheet-inp{flex:1;background:rgba(255,255,255,.34);border:1px solid var(--p2);border-radius:2px;
  padding:.28rem .45rem;font-family:'IM Fell English',serif;font-size:.8rem;color:var(--ink);outline:none}
.sheet-inp:focus{border-color:var(--gold)}
.sheet-add-btn{background:linear-gradient(135deg,var(--gold),#a8862e);border:1px solid var(--gold2);border-radius:2px;
  padding:.28rem .55rem;font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;cursor:pointer;color:var(--ink);transition:all .15s}
.sheet-add-btn:hover{background:linear-gradient(135deg,var(--gold2),var(--gold))}
.sheet-notes{width:100%;min-height:90px;background:rgba(255,255,255,.3);border:1px solid var(--p2);border-radius:2px;
  padding:.4rem .5rem;font-family:'IM Fell English',serif;font-size:.82rem;color:var(--ink);resize:vertical;outline:none;margin-bottom:.4rem}
.sheet-notes:focus{border-color:var(--gold)}
.sheet-save-btn{width:100%;background:rgba(255,255,255,.25);border:1px solid var(--p2);border-radius:2px;
  padding:.28rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;color:var(--ink);transition:all .15s}
.sheet-save-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.15)}

/* ── CHARACTER CREATION MULTI-STEP ── */
.creation-card{max-width:600px}
.step-sub{font-family:'IM Fell English',serif;font-size:.7rem;font-weight:400;font-style:italic;opacity:.6;margin-left:.5rem}
.step-bar{display:flex;align-items:center;gap:.2rem;margin-bottom:1.2rem;flex-wrap:wrap}
.step-pip{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid var(--p2);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.55rem;font-weight:600;flex-shrink:0;transition:all .2s}
.pip-on{background:linear-gradient(135deg,var(--gold),#a8862e);border-color:var(--gold2);color:var(--ink)}
.pip-done{background:var(--green);border-color:var(--green);color:#fff}
.step-label{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--p2);opacity:.5;margin-right:.4rem}
.slbl-on{opacity:1;color:var(--gold)}
.step-nav{display:flex;gap:.6rem;margin-top:1.2rem}
.step-nav .btn-gold{flex:1}
.step-back{flex:0 0 auto;width:auto}
.class-feature-box{background:rgba(255,255,255,.15);border:1px solid var(--p2);border-radius:2px;padding:.7rem}
.feature-list{display:flex;flex-direction:column;gap:.3rem}
.feature-item{font-size:.78rem;color:#3a2010;line-height:1.4}
/* Background step */
.bg-info{background:rgba(255,255,255,.18);border:1px solid var(--p2);border-radius:2px;padding:.7rem;margin-top:.5rem}
.bg-row{font-size:.8rem;margin-bottom:.35rem;line-height:1.4}
.bg-lbl{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blood);opacity:.8;margin-right:.3rem}
.bg-hint{font-style:italic;opacity:.5;font-size:.8rem;margin-top:.5rem}
/* Skills step */
.skill-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.6rem}
.skill-header span{font-size:.85rem}
.skill-count{font-family:'Cinzel',serif;font-size:.65rem;color:var(--gold);letter-spacing:.1em}
.bg-skill-note{font-size:.75rem;font-style:italic;color:var(--green);margin-bottom:.6rem;padding:.4rem;background:rgba(58,120,64,.08);border:1px solid rgba(58,120,64,.25);border-radius:2px}
.skill-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.3rem;max-height:200px;overflow-y:auto;padding:.2rem}
.skill-grid::-webkit-scrollbar{width:4px}
.skill-grid::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
.skill-check{display:flex;align-items:center;gap:.4rem;font-size:.8rem;cursor:pointer;padding:.25rem .4rem;border-radius:2px;border:1px solid transparent;transition:all .15s}
.skill-check:hover{border-color:var(--gold);background:rgba(201,168,76,.1)}
.skill-check input{accent-color:var(--gold);cursor:pointer}
.skill-bg{opacity:.6;cursor:default}
/* Equipment step */
.eq-note{font-size:.78rem;font-style:italic;opacity:.65;margin-bottom:.6rem}
.eq-list{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.5rem}
.eq-item{display:flex;gap:.3rem;align-items:center}
.eq-inp{flex:1;background:rgba(255,255,255,.34);border:1px solid var(--p2);border-radius:2px;padding:.3rem .5rem;font-family:'IM Fell English',serif;font-size:.85rem;color:var(--ink);outline:none}
.eq-inp:focus{border-color:var(--gold)}
/* Spells step */
.spell-section{margin-bottom:1rem}
.spell-hdr{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--blood);margin-bottom:.5rem}
.spell-count{color:var(--gold);opacity:1}
.prep-note{font-size:.75rem;font-style:italic;opacity:.65;margin-bottom:.5rem;line-height:1.4}
.spell-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.25rem;max-height:180px;overflow-y:auto;padding:.2rem}
.spell-grid::-webkit-scrollbar{width:4px}
.spell-grid::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
.spell-check{display:flex;align-items:center;gap:.35rem;font-size:.75rem;cursor:pointer;padding:.22rem .35rem;border-radius:2px;border:1px solid transparent;transition:all .15s}
.spell-check:hover{border-color:var(--gold);background:rgba(201,168,76,.08)}
.spell-check input{accent-color:var(--gold);cursor:pointer}
.sp-on{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.3)!important}
.no-spells{text-align:center;padding:1.5rem;font-style:italic;opacity:.6;line-height:1.6}
/* Review step */
.review-grid{display:flex;flex-direction:column;gap:.7rem}
.review-block{background:rgba(255,255,255,.18);border:1px solid var(--p2);border-radius:2px;padding:.6rem .8rem}
.rv-hdr{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--blood);margin-bottom:.15rem}
.rv-sub{font-size:.8rem;font-style:italic;opacity:.75}
.rv-lbl{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--blood);opacity:.8;margin-bottom:.25rem}
.rv-list{font-size:.8rem;line-height:1.5;color:#3a2010}

/* ── SHEET PANEL ── */
.sheet-toggle{cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.sheet-toggle:hover{opacity:.8}
.sheet-arrow{color:var(--gold);font-size:.6rem}
.sheet-tabs{display:flex;gap:.18rem;margin-bottom:.55rem;flex-wrap:wrap}
.stab{background:rgba(255,255,255,.18);border:1px solid var(--p2);border-radius:2px;padding:.2rem .4rem;font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--ink);transition:all .15s}
.stab-on{background:linear-gradient(135deg,var(--gold),#a8862e);border-color:var(--gold2);font-weight:600}
.stab:hover:not(.stab-on){border-color:var(--gold);background:rgba(201,168,76,.12)}
.sheet-body{font-size:.82rem}
/* Combat tab */
.combat-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.28rem;margin-bottom:.6rem}
.cs-box{background:rgba(255,255,255,.22);border:1px solid var(--p2);border-radius:2px;text-align:center;padding:.3rem .1rem}
.cs-lbl{font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blood);opacity:.8}
.cs-val{font-family:'Cinzel',serif;font-size:.95rem;font-weight:600}
.act-section{margin:.5rem 0}
.act-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.35rem}
.act-check{display:flex;align-items:center;gap:.3rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.08em;cursor:pointer}
.act-check input{accent-color:var(--blood);width:14px;height:14px;cursor:pointer}
.btn-rest{width:100%;background:rgba(30,10,60,.15);border:1px solid #6b4c8b;color:#9b7cc0;border-radius:2px;padding:.3rem;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:.2rem;transition:all .2s}
.btn-rest:hover{background:rgba(107,76,139,.2);color:#bba0e0}
/* Spell slots */
.slots-section{margin:.5rem 0}
.slots-lbl{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--blood);opacity:.75;margin-bottom:.35rem}
.slot-row{display:flex;align-items:center;gap:.3rem;margin-bottom:.28rem}
.slot-name{font-family:'Cinzel',serif;font-size:.58rem;width:24px;flex-shrink:0}
.slot-pips{display:flex;gap:.2rem;flex:1}
.slot-pip{width:12px;height:12px;border-radius:50%;border:1px solid var(--p2);background:rgba(255,255,255,.15);transition:all .2s;cursor:default}
.pip-avail{background:linear-gradient(135deg,var(--gold),#a8862e);border-color:var(--gold2)}
.slot-use-btn,.slot-reg-btn{padding:.15rem .35rem;font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.05em;cursor:pointer;border-radius:2px;border:1px solid;transition:all .15s}
.slot-use-btn{background:rgba(139,26,26,.1);border-color:var(--blood);color:var(--blood)}
.slot-reg-btn{background:rgba(58,120,64,.1);border-color:var(--green);color:var(--green)}
.slot-use-btn:disabled,.slot-reg-btn:disabled{opacity:.3;cursor:not-allowed}
/* Concentration */
.conc-row{display:flex;align-items:center;gap:.4rem;margin:.4rem 0}
.conc-lbl{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;white-space:nowrap;opacity:.7}
.conc-inp{flex:1;background:rgba(255,255,255,.3);border:1px solid var(--p2);border-radius:2px;padding:.22rem .4rem;font-family:'IM Fell English',serif;font-size:.78rem;color:var(--ink);outline:none}
.conc-inp:focus{border-color:var(--gold)}
.feature-section{margin-top:.5rem}
/* Inventory/lists */
.sheet-list{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.4rem;max-height:150px;overflow-y:auto}
.sheet-list::-webkit-scrollbar{width:4px}
.sheet-list::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
.sheet-item{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.2);border:1px solid var(--p2);border-radius:2px;padding:.2rem .38rem;font-size:.76rem;gap:.25rem}
.sheet-item span{flex:1;word-break:break-word;line-height:1.3}
.del-btn{background:transparent;border:none;color:var(--blood);cursor:pointer;font-size:.62rem;opacity:.45;flex-shrink:0;padding:0 .1rem;transition:opacity .15s}
.del-btn:hover{opacity:1}
.empty-list{font-style:italic;opacity:.4;font-size:.75rem;text-align:center;padding:.4rem}
.sheet-add-row{display:flex;gap:.28rem}
.sheet-inp{flex:1;background:rgba(255,255,255,.32);border:1px solid var(--p2);border-radius:2px;padding:.26rem .42rem;font-family:'IM Fell English',serif;font-size:.78rem;color:var(--ink);outline:none}
.sheet-inp:focus{border-color:var(--gold)}
.sheet-add-btn{background:linear-gradient(135deg,var(--gold),#a8862e);border:1px solid var(--gold2);border-radius:2px;padding:.26rem .5rem;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;cursor:pointer;color:var(--ink)}
/* Gold row */
.inv-gp-row{display:flex;align-items:center;gap:.35rem;margin-bottom:.5rem}
.gp-lbl{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;white-space:nowrap}
.gp-inp-sm{width:55px;background:rgba(255,255,255,.34);border:1px solid var(--p2);border-radius:2px;padding:.22rem .35rem;font-family:'Cinzel',serif;font-size:.75rem;color:var(--ink);text-align:center;outline:none}
/* Proficiencies */
.prof-list{display:flex;flex-direction:column;gap:.22rem;max-height:120px;overflow-y:auto;margin-bottom:.4rem}
.prof-item{font-size:.78rem;display:flex;justify-content:space-between;align-items:center;padding:.1rem 0}
/* Notes */
.sheet-notes{width:100%;min-height:85px;background:rgba(255,255,255,.28);border:1px solid var(--p2);border-radius:2px;padding:.38rem .48rem;font-family:'IM Fell English',serif;font-size:.8rem;color:var(--ink);resize:vertical;outline:none;margin-bottom:.38rem}
.sheet-notes:focus{border-color:var(--gold)}
.sheet-save-btn{width:100%;background:rgba(255,255,255,.22);border:1px solid var(--p2);border-radius:2px;padding:.26rem;font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--ink);transition:all .15s}
.sheet-save-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.12)}

/* XP BAR */
.xp-bar-wrap{margin:.5rem 0}
.xp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.2rem}
.xp-lbl{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blood);opacity:.8}
.xp-val{font-family:'Cinzel',serif;font-size:.56rem;color:var(--ink);opacity:.65}
.xp-track{background:var(--p2);border-radius:2px;height:5px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#6b4c8b,#9b7cc0);border-radius:2px;transition:width .5s}
.levelup-banner{background:rgba(107,76,139,.15);border:1px solid #9b7cc0;border-radius:2px;padding:.35rem .5rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.08em;color:#bba0e0;margin-top:.4rem;text-align:center;animation:pulse 2s infinite}
/* XP message in log */
.msg-xp{font-family:'Cinzel',serif;font-size:.68rem;text-align:center;color:#9b7cc0;letter-spacing:.1em;opacity:.85;padding:.2rem 0}
.msg-hp{font-family:'Cinzel',serif;font-size:.68rem;text-align:center;color:var(--blood);letter-spacing:.08em;opacity:.9;padding:.2rem 0}
.msg-hp-dead{color:#ff4444;font-weight:700;animation:pulse 1s infinite}
/* Spell slot popup */
.spell-popup{background:linear-gradient(135deg,var(--p0),var(--p1));border:1px solid var(--gold);border-radius:3px;padding:.7rem;margin-top:.5rem;box-shadow:0 4px 16px var(--sh)}
.sp-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;color:var(--blood);margin-bottom:.5rem}
.sp-btns{display:flex;gap:.35rem;flex-wrap:wrap}
.sp-slot-btn{background:linear-gradient(135deg,var(--gold),#a8862e);border:1px solid var(--gold2);border-radius:2px;padding:.3rem .6rem;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--ink);font-weight:600;transition:all .15s}
.sp-slot-btn:hover{background:linear-gradient(135deg,var(--gold2),var(--gold));box-shadow:0 2px 8px rgba(201,168,76,.4)}
.sp-cancel{background:transparent;border:1px solid var(--p2);border-radius:2px;padding:.3rem .6rem;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--ink);opacity:.6;transition:opacity .15s}
.sp-cancel:hover{opacity:1}

/* ── ACTION LIST ── */
.action-section{margin:.5rem 0}
.action-row-item{padding:.28rem .35rem;border-radius:2px;margin-bottom:.18rem;background:rgba(255,255,255,.18);border:1px solid var(--p2);transition:background .15s}
.action-row-item:hover{background:rgba(255,255,255,.28)}
.act-name{font-family:'Cinzel',serif;font-size:.65rem;font-weight:600;color:var(--ink);letter-spacing:.05em}
.act-bonus-name{color:#6b4c8b}
.act-react-name{color:#2e6b8b}
.act-detail{font-size:.68rem;color:#5a3520;margin-top:.08rem;line-height:1.3}
.act-hit{color:var(--green);font-family:'Cinzel',serif;font-size:.62rem}
.act-dmg{color:var(--blood);font-family:'Cinzel',serif;font-size:.62rem}
.act-prop{opacity:.6;font-style:italic;font-size:.6rem}

/* ── EQUIPPED ITEMS ── */
.inv-legend{font-size:.62rem;font-style:italic;opacity:.5;margin-bottom:.35rem}
.inv-leg-eq{color:var(--blood)}
.item-equipped{border-color:var(--blood)!important;background:rgba(139,26,26,.08)!important}
.equip-btn{background:transparent;border:1px solid var(--p2);border-radius:2px;width:20px;height:20px;font-size:.65rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--ink);opacity:.5;padding:0}
.equip-btn:hover{border-color:var(--blood);opacity:1}
.equip-btn.eq-on{background:rgba(139,26,26,.15);border-color:var(--blood);color:var(--blood);opacity:1}
.eq-spacer{width:20px;flex-shrink:0;display:inline-block}
.inv-name{flex:1;word-break:break-word}

/* ── INITIATIVE ── */
.msg-init{font-family:'Cinzel',serif;font-size:.68rem;text-align:center;color:var(--ember);letter-spacing:.08em;opacity:.9;padding:.2rem 0;border-top:1px solid rgba(196,86,10,.2);border-bottom:1px solid rgba(196,86,10,.2);margin:.1rem 0}
.tcn-enemy{color:var(--blood)}
.init-num{font-size:.55rem;opacity:.6;font-family:'Cinzel',serif;margin-left:.3rem}
.enemy-hpbar-w{background:var(--p2);border-radius:2px;height:3px;overflow:hidden;margin:.1rem 0}
.enemy-hpbar{height:100%;background:linear-gradient(90deg,var(--blood),var(--ember));border-radius:2px;transition:width .4s}
.tpill-enemy{background:rgba(139,26,26,.18);border-color:var(--blood);color:var(--blood);animation:pulse 1.2s infinite}

/* ── CONDITIONS ── */
.cond-badges{display:flex;flex-wrap:wrap;gap:.2rem;margin-top:.2rem}
.cond-badge{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.05em;background:rgba(139,26,26,.12);border:1px solid var(--blood);color:var(--blood);border-radius:2px;padding:.1rem .3rem}
.cond-badges-lg{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.25rem}
.cond-badge-lg{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.06em;background:rgba(196,86,10,.1);border:1px solid var(--ember);color:var(--ember);border-radius:2px;padding:.2rem .4rem}
.cond-danger{background:rgba(139,26,26,.15);border-color:var(--blood);color:var(--blood)}
.trow-skipped{opacity:.5}
.skip-badge{font-family:'Cinzel',serif;font-size:.48rem;background:var(--blood);color:var(--p0);border-radius:2px;padding:.05rem .25rem;margin-left:.2rem;letter-spacing:.05em}
.msg-cond{font-family:'Cinzel',serif;font-size:.66rem;text-align:center;color:var(--ember);letter-spacing:.08em;opacity:.85;padding:.15rem 0}

/* ── DEATH SAVES ── */
.death-save-box{background:linear-gradient(135deg,rgba(139,26,26,.15),rgba(139,26,26,.05));border:1px solid var(--blood);border-radius:3px;padding:.7rem;margin:.4rem 0}
.ds-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--blood);margin-bottom:.5rem;font-weight:600}
.ds-track{display:flex;align-items:center;gap:.3rem;margin-bottom:.5rem;flex-wrap:wrap}
.ds-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.ds-pip{width:14px;height:14px;border-radius:50%;border:1px solid var(--p2);background:rgba(255,255,255,.2);transition:all .2s}
.ds-success{background:var(--green);border-color:var(--green)}
.ds-fail{background:var(--blood);border-color:var(--blood)}
.ds-roll-btn{width:100%}
.death-banner{text-align:center;padding:.7rem;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;color:var(--blood);background:rgba(139,26,26,.1);border:1px solid var(--blood);border-radius:2px;animation:pulse 2s infinite}
.stable-banner{text-align:center;padding:.5rem;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;color:var(--green);background:rgba(58,120,64,.1);border:1px solid var(--green);border-radius:2px}
.api-banner{text-align:center;padding:.7rem;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;color:#ff6b35;background:rgba(255,107,53,.1);border:1px solid #ff6b35;border-radius:2px;margin-bottom:.5rem}
/* ADVANTAGE / DISADVANTAGE */
.adv-banner{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;padding:.3rem .6rem;border-radius:2px;margin-bottom:.4rem;border:1px solid;text-align:center}
.adv-on{background:rgba(58,120,64,.12);border-color:var(--green);color:var(--green)}
.dis-on{background:rgba(139,26,26,.12);border-color:var(--blood);color:var(--blood)}



/* ── API KEY SCREEN ── */
.api-key-info{background:rgba(255,255,255,.18);border:1px solid var(--p2);border-radius:2px;padding:.8rem;margin-bottom:1rem}
.api-step{font-size:.8rem;padding:.25rem 0;line-height:1.5}
.api-step strong{font-family:'Cinzel',serif;font-size:.75rem}
.api-privacy{font-size:.7rem;font-style:italic;opacity:.55;text-align:center;margin:.5rem 0;color:var(--green)}

/* ── RESUME CAMPAIGNS ── */
.resume-section{margin-top:1.5rem;border-top:1px solid rgba(201,168,76,.3);padding-top:1rem}
.resume-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:.6rem}
.resume-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem .6rem;background:rgba(255,255,255,.12);border:1px solid var(--p2);border-radius:2px;margin-bottom:.35rem;gap:.5rem}
.resume-info{flex:1}
.resume-code{font-family:'Cinzel Decorative',serif;font-size:.85rem;color:var(--blood);letter-spacing:.15em}
.resume-meta{font-size:.68rem;font-style:italic;opacity:.65;margin-top:.1rem}
.btn-resume{background:linear-gradient(135deg,var(--gold),#a8862e);border:1px solid var(--gold2);border-radius:2px;padding:.3rem .65rem;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--ink);font-weight:600;white-space:nowrap;transition:all .2s;flex-shrink:0}
.btn-resume:hover{background:linear-gradient(135deg,var(--gold2),var(--gold));box-shadow:0 2px 8px rgba(201,168,76,.3)}

/* ── LEVEL UP ── */
.levelup-section{background:rgba(255,255,255,.15);border:1px solid var(--p2);border-radius:2px;padding:.8rem;margin-bottom:.8rem}
.lu-hdr{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--blood);margin-bottom:.5rem;opacity:.85}
.lu-feature{font-size:.82rem;padding:.2rem 0;line-height:1.5;color:#3a2010}
.asi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin:.6rem 0}
.asi-box{background:rgba(255,255,255,.22);border:1px solid var(--p2);border-radius:2px;text-align:center;padding:.4rem .2rem}
.asi-btns{display:flex;gap:.2rem;justify-content:center;margin-top:.3rem}
.asi-btn{background:rgba(201,168,76,.15);border:1px solid var(--gold);border-radius:2px;padding:.15rem .35rem;font-family:'Cinzel',serif;font-size:.58rem;cursor:pointer;color:var(--ink);transition:all .15s}
.asi-btn:hover{background:linear-gradient(135deg,var(--gold2),var(--gold))}
.subrace-note{font-size:.68rem;font-style:italic;opacity:.5;margin-top:.25rem}

/* ── CAMPAIGN THEMES ── */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin:.4rem 0}
@media(max-width:500px){.theme-grid{grid-template-columns:1fr}}
.theme-card{background:rgba(255,255,255,.18);border:1px solid var(--p2);border-radius:3px;padding:.65rem .7rem;cursor:pointer;transition:all .2s;position:relative}
.theme-card:hover{border-color:var(--gold);background:rgba(255,255,255,.28)}
.theme-selected{background:rgba(201,168,76,.15)!important;border-color:var(--gold)!important;box-shadow:0 0 0 2px rgba(201,168,76,.25)}
.theme-selected::after{content:"✓";position:absolute;top:.3rem;right:.45rem;font-family:'Cinzel',serif;font-size:.6rem;color:var(--gold)}
.theme-icon{font-size:1.2rem;margin-bottom:.2rem}
.theme-name{font-family:'Cinzel',serif;font-size:.68rem;font-weight:600;letter-spacing:.08em;color:var(--ink);margin-bottom:.15rem}
.theme-desc{font-size:.68rem;font-style:italic;color:#5a3520;opacity:.75;line-height:1.35}
.theme-badge{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;color:var(--gold);margin-top:.3rem;opacity:.8}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px) {

  /* General */
  .fcenter { padding: 1rem; align-items: flex-start; }
  .card:not(.narc-card):not(.sc) { padding: 1.2rem 1rem; }
  .card.wide, .creation-card { max-width: 100%; }
  .two-col { grid-template-columns: 1fr; gap: .4rem; }

  /* Landing */
  .land-box { max-width: 100%; }
  .brand { font-size: clamp(1.6rem,8vw,2.8rem); }
  .brand-sub { font-size: .6rem; letter-spacing: .15em; }
  .resume-row { flex-direction: column; align-items: flex-start; gap: .4rem; }
  .btn-resume { width: 100%; text-align: center; }

  /* Theme grid */
  .theme-grid { grid-template-columns: 1fr; }

  /* Play layout */
  .play-wrap { min-height: 100dvh; }
  .phead { padding: .5rem .7rem; }
  .pbrand { font-size: .75rem; }
  .pcode { font-size: .5rem; }
  /* Play layout on mobile — scrollable full page */
  .pgrid {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
    padding: .5rem;
    gap: .6rem;
    height: auto;
    overflow: visible;
  }

  /* Narrative on mobile */
  .narc { display: flex; flex-direction: column; }
  .narc-card { display: flex; flex-direction: column; }
  .log {
    max-height: 45vh;
    min-height: 200px;
    padding: .8rem 1rem;
    font-size: .88rem;
  }
  .azone { padding: .6rem .8rem; }
  .arow { gap: .4rem; }
  #ainp { font-size: .9rem; min-height: 40px; }
  .declare-btns { flex-direction: row; gap: .3rem; }
  .btn-declare, .btn-bonus { padding: .4rem .6rem; font-size: .55rem; }

  /* Sidebar on mobile — vertical stack, full width */
  .sbar {
    display: flex;
    flex-direction: column;
    gap: .6rem;
    overflow-x: visible;
    padding-bottom: .5rem;
  }
  .sc {
    min-width: unset;
    max-width: 100%;
    width: 100%;
    padding: .75rem .85rem;
    font-size: .82rem;
  }

  /* HP controls on mobile */
  .hpctrl { gap: .3rem; }
  .hpinp { width: 42px; font-size: .7rem; }
  .hbtn { padding: .18rem 0; font-size: .55rem; }

  /* Dice grid on mobile — bigger targets */
  .dgrid { grid-template-columns: repeat(4,1fr); gap: .3rem; }
  .dbtn { padding: .45rem .1rem; font-size: .62rem; }

  /* Sheet panel on mobile — full width, readable */
  .sheet-tabs { gap: .2rem; flex-wrap: wrap; }
  .stab { font-size: .55rem; padding: .22rem .45rem; }
  .sheet-body { font-size: .88rem; }
  .combat-stats { grid-template-columns: repeat(4,1fr); gap: .3rem; }
  .cs-box { padding: .4rem .2rem; }
  .cs-lbl { font-size: .5rem; }
  .cs-val { font-size: 1rem; }
  .action-row-item { padding: .3rem .4rem; margin-bottom: .22rem; }
  .act-name { font-size: .72rem; }
  .act-detail { font-size: .65rem; }
  .slot-row { gap: .4rem; }
  .slot-pip { width: 14px; height: 14px; }
  .sheet-list { max-height: 200px; }
  .sheet-notes { min-height: 100px; }
  .prof-list { max-height: 160px; }
  .mstats { grid-template-columns: repeat(3,1fr); gap: .3rem; }
  .ms { padding: .3rem .15rem; }
  .msv { font-size: 1.05rem; }

  /* Mini stats in sidebar */
  .mini-stats { grid-template-columns: repeat(3,1fr); }

  /* XP bar */
  .xp-row { flex-wrap: wrap; gap: .2rem; }

  /* Death save on mobile */
  .ds-track { flex-wrap: wrap; gap: .3rem; }

  /* Character creation on mobile */
  .step-bar { gap: .15rem; }
  .step-pip { width: 18px; height: 18px; font-size: .48rem; }
  .step-label { display: none; } /* Hide labels on small screens */
  .skill-grid { grid-template-columns: 1fr; }
  .spell-grid { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(3,1fr); }
  .asi-grid { grid-template-columns: repeat(3,1fr); }

  /* Death save on mobile */
  .death-save-box { padding: .5rem; }
  .ds-track { gap: .25rem; }
  .ds-pip { width: 12px; height: 12px; }

  /* Spell popup on mobile */
  .spell-popup { padding: .55rem; }
  .sp-btns { flex-wrap: wrap; gap: .3rem; }

  /* Server banner */
  .server-banner { font-size: .58rem; padding: .35rem; }

  /* Lobby */
  .codebox { padding: .6rem; }
  .codevalue { font-size: 1.7rem; letter-spacing: .2em; }
  .roster-row { flex-direction: column; align-items: flex-start; gap: .25rem; }

  /* Level up */
  .levelup-section { padding: .6rem; }
  .review-grid { gap: .5rem; }
}

/* Extra small phones */
@media(max-width:380px) {
  .brand { font-size: 1.4rem; }
  .pgrid { padding: .35rem; gap: .35rem; }
  .log { padding: .6rem .7rem; font-size: .82rem; }
  .sc { min-width: 160px; }
  .combat-stats { grid-template-columns: repeat(2,1fr); }
}

/* ── ONBOARDING ── */
.onboard-tip{display:flex;gap:.7rem;align-items:flex-start;margin-top:1rem;padding:.8rem;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:3px;text-align:left}
.onboard-icon{font-size:1.2rem;flex-shrink:0}
.onboard-text{font-size:.75rem;line-height:1.55;color:var(--p2);opacity:.85}
.onboard-text strong{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.05em;color:var(--gold)}
.onboard-text em{font-style:italic;opacity:.8}

.tpill-roll{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold);animation:pulse 1.2s infinite}
.msg-hold{font-family:'Cinzel',serif;font-size:.65rem;text-align:center;color:var(--gold);letter-spacing:.1em;opacity:.7;padding:.2rem 0;font-style:italic}

/* ── HANDBOOK OVERLAY ── */
#handbook-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:1rem}
.hb-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75)}
.hb-panel{position:relative;z-index:1;background:linear-gradient(158deg,var(--p0) 0%,var(--p1) 55%,var(--p2) 100%);border:1px solid var(--gold);border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,.8);width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.hb-header{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1.2rem;border-bottom:1px solid var(--gold);flex-shrink:0;background:rgba(26,15,10,.15)}
.hb-title{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;color:var(--blood);font-weight:600}
.hb-close{background:transparent;border:1px solid var(--p2);border-radius:2px;padding:.25rem .6rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--ink);transition:all .15s}
.hb-close:hover{border-color:var(--blood);color:var(--blood)}
.hb-body{overflow-y:auto;padding:1.2rem 1.5rem;display:flex;flex-direction:column;gap:1.2rem}
.hb-body::-webkit-scrollbar{width:6px}
.hb-body::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
/* Cover */
.hb-cover{text-align:center;padding:1rem 0 .5rem}
.hb-cover-title{font-family:'Cinzel Decorative',serif;font-size:1.8rem;color:var(--blood);letter-spacing:.1em;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.hb-cover-sub{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);opacity:.7;margin-top:.3rem}
.hb-url{font-family:'Courier New',monospace;font-size:.72rem;color:var(--blood);margin-top:.4rem;opacity:.8}
/* Sections */
.hb-section{border-top:1px solid var(--p2);padding-top:1rem}
.hb-h1{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--blood);margin-bottom:.6rem}
.hb-h2{font-family:'Cinzel',serif;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin:.7rem 0 .3rem;opacity:.85}
.hb-p{font-size:.88rem;line-height:1.65;color:var(--ink);margin-bottom:.4rem}
.hb-ul{margin:.3rem 0 .5rem 1.2rem;display:flex;flex-direction:column;gap:.25rem}
.hb-ul li{font-size:.86rem;line-height:1.5;color:var(--ink)}
.hb-note{background:rgba(255,255,255,.3);border:1px solid var(--p2);border-radius:2px;padding:.5rem .7rem;font-size:.8rem;font-style:italic;color:#3a2010;margin:.4rem 0;line-height:1.5}
/* Steps */
.hb-steps{display:flex;flex-direction:column;gap:.4rem;margin:.4rem 0}
.hb-step{display:flex;gap:.7rem;align-items:flex-start}
.hb-step-num{width:22px;height:22px;border-radius:50%;background:var(--blood);color:var(--p0);font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem}
.hb-step div{font-size:.86rem;line-height:1.5;color:var(--ink)}
/* Class grid */
.hb-class-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.25rem .5rem;margin:.4rem 0}
.hb-class-item{font-size:.82rem;color:var(--ink);line-height:1.4}
/* Theme grid */
.hb-theme-grid{display:flex;flex-direction:column;gap:.35rem;margin:.4rem 0}
.hb-theme-item{display:flex;gap:.6rem;align-items:flex-start;padding:.3rem .4rem;border-radius:2px;background:rgba(255,255,255,.18)}
.hb-theme-icon{font-size:1rem;flex-shrink:0;width:20px;text-align:center}
.hb-theme-name{font-family:'Cinzel',serif;font-size:.68rem;font-weight:600;color:var(--ink)}
.hb-theme-desc{font-size:.72rem;color:#5a3520;opacity:.8;font-style:italic}
/* Table */
.hb-table{width:100%;border-collapse:collapse;font-size:.82rem;margin:.4rem 0}
.hb-table th{background:var(--blood);color:var(--p0);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .6rem;text-align:left}
.hb-table td{padding:.35rem .6rem;border-bottom:1px solid var(--p2);color:var(--ink);line-height:1.4}
.hb-table tr:nth-child(even) td{background:rgba(255,255,255,.2)}
@media(max-width:600px){
  .hb-panel{max-height:95vh}
  .hb-class-grid{grid-template-columns:1fr}
  .hb-table td,.hb-table th{padding:.28rem .4rem;font-size:.72rem}
}
.thinking-sub{display:block;font-size:.55rem;letter-spacing:.12em;opacity:.5;margin-top:.2rem;font-family:'Cinzel',serif}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1a0f0a;color:#c9a84c;font-family:serif;text-align:center;padding:2rem" id="loading-msg">
    <div>
      <div style="font-size:2rem;margin-bottom:1rem">⚔</div>
      <div style="font-size:1rem;letter-spacing:.2em">THE CHRONICLE</div>
      <div style="font-size:.7rem;margin-top:.5rem;opacity:.6">Loading...</div>
    </div>
  </div>
</div>
<script>
  window.onerror = function(msg, src, line) {
    document.getElementById('root').innerHTML =
      '<div style="padding:2rem;color:#e05050;font-family:monospace;background:#1a0f0a;min-height:100vh">' +
      '<h2 style="color:#c9a84c">Error Loading The Chronicle</h2>' +
      '<p>' + msg + '</p>' +
      '<p>Line: ' + line + '</p>' +
      '<p>Source: ' + src + '</p>' +
      '<p style="margin-top:1rem;color:#aaa">Try a hard refresh: hold Shift and tap the reload button</p>' +
      '</div>';
  };
</script>
</body>
</html>
