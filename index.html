}

function notesTab(sheet) {
  return `
    <textarea class="sheet-notes" id="notes-ta" placeholder="Quest notes, NPC names, clues...">${esc(sheet.notes||"")}</textarea>
    <button class="sheet-save-btn" id="notes-save">Save Notes</button>`;
}


// ── LOBBY ─────────────────────────────────────────────────────────────────────
function rLobby() {
  const camp=S.campaign;
  const allReady=camp.players.every(p=>p.char);
  q("root").innerHTML = `
    <div class="fcenter">
      <div class="card wide">
        <h2 class="ch">Campaign Lobby</h2>
        <div class="codebox">
          <div class="codelabel">Campaign Code</div>
          <div class="codevalue">${camp.id}</div>
          <div class="codehint">Share this code with your players</div>
          <div class="theme-badge">${THEMES[camp.theme||"Classic Fantasy"]?.icon||"⚔"} ${esc(camp.theme||"Classic Fantasy")}</div>
        </div>
        <div class="roster">${camp.players.map(p=>`
          <div class="rrow ${p.char?"rdy":"wait"}">
            <div>
              <div class="rname">${esc(p.name)}</div>
              ${p.char?`<div class="rchar">${esc(p.char.name)} · ${esc(p.char.race)}${p.char.subrace&&p.char.subrace!=="—"?" ("+esc(p.char.subrace)+")":""} ${esc(p.char.cls)}</div>`:`<div class="rwait">Forging their hero...</div>`}
            </div>
            <div class="rbadge">${p.char?"✦ Ready":"⏳"}</div>
          </div>`).join("")}
        </div>
        ${S.isCreator
          ?`<button class="btn-gold full" id="bstart" ${allReady?"":"disabled"}>${allReady?"⚔ Begin the Adventure":"Waiting for all characters to be ready..."}</button>`
          :`<div class="wait-msg">Waiting for the campaign creator to begin the adventure...</div>`}
        <button class="btn-ghost" id="babandon" style="margin-top:.5rem;opacity:.5;font-size:.58rem">✕ Abandon Campaign</button>
        <div class="err" id="er"></div>
      </div>
    </div>`;
  id("babandon").onclick = () => {
    const confirmed = confirm("Abandon this campaign? This will remove it from your recent campaigns. Other players will still see it if they rejoin directly.");
    if(!confirmed) return;
    clearSession();
    // Remove from history
    const hist = getCampaignHistory().filter(c=>c.id!==S.campaignId);
    localStorage.setItem("chronicle_history", JSON.stringify(hist));
    S.campaignId=null; S.myName=null; S.campaign=null;
    if(S.unsub){S.unsub();S.unsub=null;}
    go("landing");
  };

  if(S.isCreator && allReady) {
    id("bstart").onclick=async()=>{
      const btn=id("bstart"); btn.disabled=true; btn.textContent="Summoning the tale...";
      const camp=S.campaign, sys=buildSystem(camp), fp=camp.players[0].name;

      try {
        const result=await callDM(sys,[{role:"user",content:`Begin the campaign. ${(THEMES[camp.theme||"Classic Fantasy"]?.openingHints||"")} Open with a vivid atmospheric scene that brings all ${camp.players.length} adventurers together in this ${camp.theme||"Classic Fantasy"} setting. Establish immediate tension or a compelling hook. End by inviting ${fp} to act first.`}]);
        const txt=result.text||result;
        const msg={type:"dm",text:txt,ts:Date.now()};
        const aih=[{role:"user",content:"Begin the campaign."},{role:"assistant",content:txt}];
        await patch(camp.id,{phase:"play",messages:[msg],aiHistory:aih,turnIndex:0});
      } catch(e){id("er").textContent="Failed to reach AI: "+e.message;btn.disabled=false;btn.textContent="⚔ Begin the Adventure";}
    };
  }
}

// ── PLAY ──────────────────────────────────────────────────────────────────────
function rPlay() {
  const camp=S.campaign;
  if(!camp) return;
  const combatOrder = camp.initiativeOrder||[];
  const inCombat = camp.combat && combatOrder.length > 0;
  const combatSlot = inCombat ? combatOrder[(camp.combatTurnIdx||0)%combatOrder.length] : null;
  const isEnemyTurn = inCombat && combatSlot?.isEnemy;
  const cur = inCombat
    ? camp.players.find(p=>p.name===combatSlot?.name) || camp.players[camp.turnIndex%camp.players.length]
    : camp.players[camp.turnIndex%camp.players.length];
  // If DM is holding the turn, the player who just acted keeps control
  const heldPlayer = camp.holdTurn ? camp.players[camp.turnIndex%camp.players.length] : null;
  const isMyTurn = isEnemyTurn ? false
    : camp.holdTurn ? heldPlayer?.name===S.myName
    : (inCombat ? combatSlot?.name===S.myName : cur?.name===S.myName);
  const me=camp.players.find(p=>p.name===S.myName);

  q("root").innerHTML = `
    <div class="play-wrap">
      <header class="phead">
        <span class="pbrand">The Chronicle</span>
        <span class="pcode">Code: <strong>${camp.id}</strong> · ${THEMES[camp.theme||"Classic Fantasy"]?.icon||"⚔"} ${esc(camp.theme||"Classic Fantasy")}</span>
        <button class="btn-leave" id="btn-leave">✕ Leave</button>
        <button class="btn-leave" id="btn-abandon" style="opacity:.45;margin-left:.3rem">🗑 Abandon</button>
        <button class="btn-leave" id="btn-help-play" style="opacity:.55;margin-left:.3rem">📖</button>
      </header>
      ${S.isCreator && !camp.apiKey ? `<div class="api-banner">⚠️ No API key set for this campaign. <button class="btn-sm" id="btn-set-api-key">Set API Key</button></div>` : ""}
      <div class="pgrid">
        <section class="narc">
          <div class="card narc-card">
            <div class="log" id="log">
              ${camp.messages.map(msgHtml).join("")}
              ${S.submitting?`<div class="thinking">The Dungeon Master weighs the fates...<span class="thinking-sub">Keep this screen open</span></div>`:""}
            </div>
            <div class="azone">
              <div class="tpill ${isMyTurn?(camp.holdTurn?"tpill-roll":"tpill-on"):isEnemyTurn?"tpill-enemy":"tpill-off"}">
                ${isMyTurn
                  ? camp.holdTurn
                    ? `🎲 Roll requested — ${esc(S.myName)}`
                    : `⚔ Your turn, ${esc(S.myName)}`
                  : isEnemyTurn
                    ? `👹 ${esc(combatSlot?.name)} acts...`
                    : camp.holdTurn
                      ? `⏳ ${esc(heldPlayer?.name||cur?.name)} is rolling...`
                      : `⏳ Waiting on ${esc(inCombat?combatSlot?.name:cur?.name)}...`}
              </div>
              ${(()=>{
                const meP = camp.players.find(p=>p.name===S.myName);
                const isUnconscious = (meP?.conditions||[]).includes("Unconscious");
                const isDead = (meP?.conditions||[]).includes("Dead");
                const isStable = (meP?.conditions||[]).includes("Stable");
                const ds = meP ? getDeathSaveState(meP) : {successes:0,failures:0};

                if(isDead) return `<div class="death-banner">💀 ${esc(meP?.char?.name||S.myName)} has died. Your story ends here.</div>`;
                if(isStable) return `<div class="stable-banner">💚 ${esc(meP?.char?.name||S.myName)} is stable — awaiting healing.</div>`;

                if(isMyTurn && isUnconscious) return `
                  <div class="death-save-box">
                    <div class="ds-title">💀 Death Saving Throw</div>
                    <div class="ds-track">
                      <span class="ds-label">Successes:</span>
                      ${[0,1,2].map(i=>`<div class="ds-pip ${i<ds.successes?"ds-success":""}"></div>`).join("")}
                      <span class="ds-label" style="margin-left:.4rem">Failures:</span>
                      ${[0,1,2].map(i=>`<div class="ds-pip ${i<ds.failures?"ds-fail":""}"></div>`).join("")}
                    </div>
                    <button class="btn-declare ds-roll-btn" id="btn-death-save">Roll Death Save (d20)</button>
                  </div>`;

                if(S.pendingConCheck && S.pendingConCheck.name===S.myName) return `
                  <div class="spell-popup">
                    <div class="sp-title">🎯 Concentration Check — DC ${S.pendingConCheck.dc} (took ${S.pendingConCheck.damage} dmg)</div>
                    <div class="sp-btns">
                      <button class="btn-declare" id="btn-con-roll">Roll CON Save (d20)</button>
                      <button class="sp-cancel" id="btn-con-cancel">Dismiss</button>
                    </div>
                  </div>`;

                if(!isMyTurn) return "";

                const advBanner = (S.pendingAdvantage && S.pendingAdvantage.target===S.myName) ? `
                  <div class="adv-banner ${S.pendingAdvantage.type==="advantage"?"adv-on":"dis-on"}">
                    ${S.pendingAdvantage.type==="advantage"?"⬆ Advantage":"⬇ Disadvantage"}: ${esc(S.pendingAdvantage.reason)}
                  </div>` : "";

                return `${advBanner}<div class="arow">
                  <textarea id="ainp" placeholder="What does ${esc(meP?.char?.name||S.myName)} do?" rows="2">${esc(S.inputText)}</textarea>
                  <div class="declare-btns">
                    <button class="btn-declare" id="bdecl">Declare</button>
                    <button class="btn-bonus ${meP?.sheet?.bonusAction?"btn-bonus-used":""}" id="bdecl-bonus">+ Bonus</button>
                  </div>
                </div>
                ${S.pendingSpell?`<div class="spell-popup">
                  <div class="sp-title">🔮 Casting ${esc(S.pendingSpell.spell)} — choose slot level:</div>
                  <div class="sp-btns">
                    ${S.pendingSpell.availLevels.map(l=>`<button class="sp-slot-btn" data-lvl="${l}">Level ${l}</button>`).join("")}
                    <button class="sp-cancel">Cancel</button>
                  </div>
                </div>`:""}`;
              })()}
            </div>
          </div>
        </section>
        <aside class="sbar">
          <div class="card sc">
            <div class="st">${camp.combat?"⚔ Initiative Order":"Turn Order"}</div>
            ${camp.combat && (camp.initiativeOrder||[]).length > 0 ? `
              ${camp.initiativeOrder.map((e,i)=>{
                const isCur = i===((camp.combatTurnIdx||0)%camp.initiativeOrder.length);
                const hpPct = e.isEnemy ? Math.max(0,Math.round((e.hp/e.maxHp)*100)) : null;
                const eConds = e.conditions||[];
                const isSkipped = shouldSkipTurn(e);
                const condBadges = eConds.map(c=>`<span class="cond-badge">${CONDITION_ICONS[c]||""}${c}</span>`).join("");
                return `<div class="trow ${isCur?"trow-cur":""} ${isSkipped?"trow-skipped":""}">
                  <div style="flex:1">
                    <div class="tcn ${e.isEnemy?"tcn-enemy":""}">${esc(e.charName||e.name)} <span class="init-num">${e.initiative}</span>${isSkipped?` <span class="skip-badge">SKIP</span>`:""}</div>
                    ${e.isEnemy&&hpPct!==null?`<div class="enemy-hpbar-w"><div class="enemy-hpbar" style="width:${hpPct}%"></div></div>`:""}
                    ${!e.isEnemy?`<div class="tcs">${esc(e.name)}</div>`:`<div class="tcs">Enemy</div>`}
                    ${condBadges?`<div class="cond-badges">${condBadges}</div>`:""}
                  </div>
                  ${isCur?`<div class="tarr">▶</div>`:""}
                </div>`;
              }).join("")}` : `
              ${camp.players.map((p,i)=>`
                <div class="trow ${i===camp.turnIndex%camp.players.length?"trow-cur":""}">
                  <div>
                    <div class="tcn">${esc(p.char?p.char.name:p.name)}</div>
                    <div class="tcs">${p.char?esc(p.char.race)+" "+esc(p.char.cls):""}</div>
                  </div>
                  ${i===camp.turnIndex%camp.players.length?`<div class="tarr">▶</div>`:""}
                </div>`).join("")}`}
          </div>
          <div class="card sc">
            <div class="st">Hit Points</div>
            ${camp.players.map((p,i)=>{
              const hp=p.hp??0,mhp=p.maxHp??1,pct=Math.max(0,Math.round(hp/mhp*100));
              const mine=p.name===S.myName;
              const pConds = p.conditions||[];
              const pCondBadges = pConds.map(c=>`<span class="cond-badge">${CONDITION_ICONS[c]||""}${c}</span>`).join("");
              return `<div class="hpb">
                <div class="hpn">${esc(p.char?p.char.name:p.name)}${(p.hp||0)<=0?` <span class="skip-badge">KO</span>`:""}</div>
                <div class="hbar-w"><div class="hbar" style="width:${pct}%"></div></div>
                <div class="hpnum">${hp} / ${mhp}</div>
                ${pCondBadges?`<div class="cond-badges">${pCondBadges}</div>`:""}
                ${mine?`<div class="hpctrl">
                  <input class="hpinp" id="hpi${i}" type="number" min="0" placeholder="amt" value="${S.dmgInputs[i]||""}"/>
                  <button class="hbtn db" data-i="${i}">Dmg</button>
                  <button class="hbtn hb" data-i="${i}">Heal</button>
                </div>`:""}
              </div>`;
            }).join("")}
          </div>
          <div class="card sc">
            <div class="st">Dice — ${esc(S.myName)}</div>
            <div class="dgrid">${DICE.map(d=>`<button class="dbtn" data-d="${d}">d${d}</button>`).join("")}</div>
            ${S.diceResult
              ?`<div class="dres">${S.diceResult.result}<span>d${S.diceResult.sides}</span></div>`
              :`<div class="dempty">tap to roll</div>`}
          </div>
          ${me?.char ? sheetHtml(me, camp) : ""}
        </aside>
      </div>
    </div>`;

  const log=id("log"); if(log) log.scrollTop=log.scrollHeight;
  const bl=id("btn-leave"); if(bl) bl.onclick=()=>{ clearSession(); S.campaignId=null; S.myName=null; S.campaign=null; if(S.unsub){S.unsub();S.unsub=null;} go("landing"); };
  const bhp=id("btn-help-play"); if(bhp) bhp.onclick=()=>showHandbook();
  const setKeyBtn=id("btn-set-api-key"); if(setKeyBtn) setKeyBtn.onclick=()=>go("api-key");
  const ba=id("btn-abandon"); if(ba) ba.onclick=()=>{
    const confirmed = confirm("Abandon this campaign? It will be removed from your recent campaigns.");
    if(!confirmed) return;
    clearSession();
    const hist = getCampaignHistory().filter(c=>c.id!==S.campaignId);
    localStorage.setItem("chronicle_history", JSON.stringify(hist));
    S.campaignId=null; S.myName=null; S.campaign=null;
    if(S.unsub){S.unsub();S.unsub=null;}
    go("landing");
  };

  // Death save button
  const dsBtn=id("btn-death-save");
  if(dsBtn) dsBtn.onclick=async()=>{
    const roll=rollD(20);
    const camp=S.campaign;
    await patch(S.campaignId,{messages:[...camp.messages,{type:"roll",text:`${S.myName} rolls death save: ${roll}`,ts:Date.now()}]});
    await resolveDeathSave(roll);
  };

  // Concentration check buttons
  const conRollBtn=id("btn-con-roll");
  if(conRollBtn) conRollBtn.onclick=async()=>{
    const camp=S.campaign;
    const me=camp.players.find(p=>p.name===S.myName);
    const conMod=mod(me?.char?.stats?.CON||10);
    const roll=rollD(20)+conMod;
    await patch(S.campaignId,{messages:[...camp.messages,{type:"roll",text:`${S.myName} rolls CON save: ${roll} (d20${conMod>=0?"+"+conMod:conMod})`,ts:Date.now()}]});
    await resolveConCheck(roll, S.pendingConCheck?.dc||10);
  };
  const conCancelBtn=id("btn-con-cancel");
  if(conCancelBtn) conCancelBtn.onclick=()=>{ S.pendingConCheck=null; rPlay(); };

  // Clear advantage after declaring
  const clearAdv=()=>{ S.pendingAdvantage=null; };

  // Spell slot popup handlers
  qall(".sp-slot-btn").forEach(btn=>{
    btn.onclick=()=>{ submitAction(btn.dataset.lvl, S.pendingSpell?.useBonusAction||false); };
  });
  const spCancel=document.querySelector(".sp-cancel");
  if(spCancel) spCancel.onclick=()=>{ S.pendingSpell=null; rPlay(); };

  // Clear levelUpPending on dismiss
  const me2=camp.players.find(p=>p.name===S.myName);
  if(me2?.levelUpPending) {
    setTimeout(async()=>{
      const c2=S.campaign; if(!c2) return;
      const players=c2.players.map(p=>p.name===S.myName?{...p,levelUpPending:false}:p);
      await patch(S.campaignId,{players});
    }, 4000);
  }
  const ai=id("ainp");
  if(ai){ ai.oninput=e=>S.inputText=e.target.value; ai.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submitAction();}}; ai.focus(); }
  const bd=id("bdecl"); if(bd) bd.onclick=()=>{ clearAdv(); submitAction(undefined, false); };
  const bdb=id("bdecl-bonus"); if(bdb) bdb.onclick=()=>{ clearAdv(); submitAction(undefined, true); };

  // Retry button
  qall(".btn-retry").forEach(btn => {
    btn.onclick = async () => {
      const camp = S.campaign;
      const cleaned = camp.messages.filter(m => !(m.type==="dm" && m.text && m.text.startsWith("(The DM")));
      const cleanedHist = (camp.aiHistory||[]).filter(h => !(h.role==="assistant" && h.content && h.content.startsWith("(The DM")));
      await patch(S.campaignId, { messages: cleaned, aiHistory: cleanedHist });
      S.submitting = true; rPlay();
      try {
        const result = await callDM(buildSystem(camp), cleanedHist);
        const txt = result.text||result;
        const dm = { type:"dm", text:txt, ts:Date.now() };
        await patch(S.campaignId, { messages:[...cleaned, dm], aiHistory:[...cleanedHist, {role:"assistant",content:txt}], turnIndex:(camp.turnIndex+1)%camp.players.length });
      } catch(e) {
        const errText = e?.message?.includes("No API key")
          ? S.isCreator
            ? "(The DM cannot respond because no API key is configured. Enter your Claude API key in Settings and try again.)"
            : "(The DM cannot respond because the campaign creator hasn't configured an API key yet. Ask the creator to set it in Settings.)"
          : `(The DM's voice fades... connection lost. Try again.) ${e?.message||""}`;
        await patch(S.campaignId, { messages:[...cleaned, {type:"dm",text:errText,ts:Date.now()}] });
      }
      S.submitting = false;
    };
  });

  qall(".dbtn").forEach(b=>b.onclick=async()=>{
    const sides=parseInt(b.dataset.d), rollResult=rollD(sides);
    S.diceResult={sides,result:rollResult};
    const camp=S.campaign;

    // If DM is holding the turn for this player, trigger a DM response with the roll result
    if(camp.holdTurn && camp.players[camp.turnIndex%camp.players.length]?.name===S.myName) {
      // Calculate modifier FIRST before patching Firebase
      const me2 = camp.players.find(p=>p.name===S.myName);
      const c2 = me2?.char;
      let rollContext = `${S.myName} rolls d${sides}: ${rollResult}`;
      if(c2) {
        const lastDM = [...(camp.messages||[])].reverse().find(m=>m.type==="dm");
        const dmText = (lastDM?.text||"").toLowerCase();
        const pb2 = (me2?.level||1) >= 5 ? 3 : 2;
        const stats2 = c2.stats||{};
        const profSkills2 = c2.skills||[];
        const atkStatMod = ["Fighter","Barbarian","Paladin","Ranger","Monk"].includes(c2.cls)
          ? Math.max(mod(stats2.STR),mod(stats2.DEX))
          : ["Wizard","Sorcerer"].includes(c2.cls) ? mod(stats2.INT)
          : ["Cleric","Druid"].includes(c2.cls) ? mod(stats2.WIS)
          : ["Warlock","Bard"].includes(c2.cls) ? mod(stats2.CHA)
          : mod(stats2.STR);
        let modifier = 0, modLabel = "";
        if(sides === 20) {
          if(/attack|hit|strike/.test(dmText)) {
            modifier = atkStatMod + pb2; modLabel = "attack";
          } else {
            const skillDefs = [
              {pattern:/\bathletics\b/, name:"Athletics", ability:"STR"},
              {pattern:/\bacrobatics\b/, name:"Acrobatics", ability:"DEX"},
              {pattern:/\bstealth\b/, name:"Stealth", ability:"DEX"},
              {pattern:/\bperception\b/, name:"Perception", ability:"WIS"},
              {pattern:/\binsight\b/, name:"Insight", ability:"WIS"},
              {pattern:/\bpersuasion\b/, name:"Persuasion", ability:"CHA"},
              {pattern:/\bdeception\b/, name:"Deception", ability:"CHA"},
              {pattern:/\bintimidat\b/, name:"Intimidation", ability:"CHA"},
              {pattern:/\b(investigation|investigate|search|examin|inspect|scan)\b/, name:"Investigation", ability:"INT"},
              {pattern:/\barcana\b/, name:"Arcana", ability:"INT"},
              {pattern:/\bhistory\b/, name:"History", ability:"INT"},
              {pattern:/\breligion\b/, name:"Religion", ability:"INT"},
              {pattern:/\bnature\b/, name:"Nature", ability:"INT"},
              {pattern:/\bsurvival\b/, name:"Survival", ability:"WIS"},
              {pattern:/\bmedicine\b/, name:"Medicine", ability:"WIS"},
            ];
            const abilityMods = {STR:mod(stats2.STR), DEX:mod(stats2.DEX), CON:mod(stats2.CON), INT:mod(stats2.INT), WIS:mod(stats2.WIS), CHA:mod(stats2.CHA)};
            const getSkillMod = (skillName, ability) => abilityMods[ability] + (profSkills2.includes(skillName) ? pb2 : 0);
            let foundSkill = false;
            for(const def of skillDefs) {
              if(def.pattern.test(dmText)) {
                modifier = getSkillMod(def.name, def.ability);
                modLabel = def.name;
                foundSkill = true;
                break;
              }
            }
            if(!foundSkill) {
              if(/str\b|strength/.test(dmText)) { modifier = abilityMods.STR; modLabel = "STR"; }
              else if(/dex\b|dexterity/.test(dmText)) { modifier = abilityMods.DEX; modLabel = "DEX"; }
              else if(/con\b|constitution|concentration/.test(dmText)) { modifier = abilityMods.CON; modLabel = "CON save"; }
              else if(/wis\b|wisdom/.test(dmText)) { modifier = abilityMods.WIS; modLabel = "WIS save"; }
              else if(/int\b|intelligence/.test(dmText)) { modifier = abilityMods.INT; modLabel = "INT save"; }
              else if(/cha\b|charisma/.test(dmText)) { modifier = abilityMods.CHA; modLabel = "CHA save"; }
              else if(/spell|magic/.test(dmText)) {
                const spMod = ["Wizard","Sorcerer"].includes(c2.cls) ? abilityMods.INT
                  : ["Cleric","Druid"].includes(c2.cls) ? abilityMods.WIS
                  : ["Warlock","Bard","Paladin"].includes(c2.cls) ? abilityMods.CHA
                  : abilityMods.WIS;
                modifier = spMod + pb2;
                modLabel = "spell attack";
              }
            }
          }
        } else if([4,6,8,10,12].includes(sides)) {
          if(/damage|wound|strike|smite|sneak/.test(dmText)) { modifier = atkStatMod; modLabel = "damage"; }
          else if(/heal|rest|hit die|hit dice|recovery/.test(dmText)) { modifier = mod(stats2.CON); modLabel = "healing"; }
        }
        if(modLabel) {
          const total = rollResult + modifier;
          const modStr = modifier >= 0 ? `+${modifier}` : `${modifier}`;
          rollContext = `${S.myName} rolls d${sides} for ${modLabel}: ${rollResult} ${modStr} = ${total} total`;
        }
      }
      // Now patch Firebase with the correct (modifier-included) roll text
      const rollMsg = { type:"roll", text:rollContext, ts:Date.now() };
      const msgs = [...camp.messages, rollMsg];
      await patch(S.campaignId, { messages:msgs, holdTurn:false });
      S.submitting=true; rPlay();
      const nh=[...(camp.aiHistory||[]),{role:"user",content:rollContext}];
      try {
        const dmResult=await callDM(buildSystem(camp),nh);
        const dm={type:"dm",text:dmResult.text,ts:Date.now()};
        const ni=(camp.turnIndex+1)%camp.players.length;
        const holdMsg = dmResult.holdTurn ? [{type:"hold",text:`⏳ Waiting for ${S.myName} to roll...`,ts:Date.now()+1}] : [];
        await patch(S.campaignId,{
          messages:[...msgs,dm,...holdMsg],
          aiHistory:[...nh,{role:"assistant",content:dmResult.text}],
          turnIndex:dmResult.holdTurn?camp.turnIndex:ni,
          holdTurn:dmResult.holdTurn||false
        });
      } catch(e) {
        const errText = e?.message?.includes("No API key")
          ? S.isCreator
            ? "(The DM cannot respond because no API key is configured. Enter your Claude API key in Settings and try again.)"
            : "(The DM cannot respond because the campaign creator hasn't configured an API key yet. Ask the creator to set it in Settings.)"
          : `(The DM's voice fades... connection lost. Try again.) ${e?.message||""}`;
        await patch(S.campaignId,{messages:[...msgs,{type:"dm",text:errText,ts:Date.now()}]});
      }
      S.submitting=false;
    } else {
      await patch(S.campaignId,{messages:msgs});
    }
  });

  qall(".hbtn").forEach(b=>{
    b.onclick=async()=>{
      const i=parseInt(b.dataset.i), inp=id(`hpi${i}`), amt=parseInt(inp?.value)||0;
      const p=S.campaign.players[i], mhp=p.maxHp||1;
      const nhp=b.classList.contains("db")?Math.max(0,(p.hp||0)-amt):Math.min(mhp,(p.hp||0)+amt);
      const players=S.campaign.players.map((pl,idx)=>idx===i?{...pl,hp:nhp}:pl);
      S.dmgInputs[i]="";
      await patch(S.campaignId,{players});
    };
  });
  qall(".hpinp").forEach(inp=>{
    const i=parseInt(inp.id.replace("hpi",""));
    inp.oninput=e=>S.dmgInputs[i]=e.target.value;
  });

  bindSheetEvents(camp);
}

// ── SHEET EVENT HANDLERS ──────────────────────────────────────────────────────
function bindSheetEvents(camp) {
  const me = camp.players.find(p=>p.name===S.myName);
  if(!me?.char) return;

  // Toggle open/close
  const st=id("sheet-toggle");
  if(st) st.onclick=()=>{ S.sheetOpen=!S.sheetOpen; rPlay(); };

  // Tab switching
  qall(".stab").forEach(btn=>btn.onclick=()=>{ S.sheetTab=btn.dataset.tab; rPlay(); });

  // Action checkboxes
  ["action","bonus","reaction"].forEach(key=>{
    const cb=id(`chk-${key}`);
    if(cb) cb.onchange=async()=>{
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const field=key==="action"?"action":key==="bonus"?"bonusAction":"reaction";
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,[field]:cb.checked}}:p);
      await patch(S.campaignId,{players});
    };
  });

  // Rest button — reset actions + spell slots
  const rb=id("btn-rest");
  if(rb) rb.onclick=async()=>{
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,action:false,bonusAction:false,reaction:false,spellSlotsUsed:{},concentration:""}}:p);
    await patch(S.campaignId,{players});
  };

  // Use spell slot
  qall(".slot-use-btn").forEach(btn=>btn.onclick=async()=>{
    const lvl=btn.dataset.lvl;
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const used={...( sheet.spellSlotsUsed||{})};
    const total=(me.char.spellSlots||{})[lvl]||0;
    if((used[lvl]||0)>=total) return;
    used[lvl]=(used[lvl]||0)+1;
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,spellSlotsUsed:used}}:p);
    await patch(S.campaignId,{players});
  });

  // Regain spell slot
  qall(".slot-reg-btn").forEach(btn=>btn.onclick=async()=>{
    const lvl=btn.dataset.lvl;
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const used={...(sheet.spellSlotsUsed||{})};
    if(!used[lvl]||used[lvl]<1) return;
    used[lvl]=used[lvl]-1;
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,spellSlotsUsed:used}}:p);
    await patch(S.campaignId,{players});
  });

  // Concentration
  const ci=id("conc-inp");
  if(ci) {
    ci.oninput=e=>{};
    ci.onblur=async()=>{
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,concentration:ci.value}}:p);
      await patch(S.campaignId,{players});
    };
  }

  // Add item/spell/skill
  qall(".sheet-add-btn").forEach(btn=>{
    btn.onclick=async()=>{
      const type=btn.dataset.type;
      const inpId=type==="inventory"?"inv-inp":type==="spells"?"spell-inp":"skill-inp";
      const val=id(inpId)?.value.trim();
      if(!val) return;
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const arr=[...(sheet[type]||[]),val];
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,[type]:arr}}:p);
      await patch(S.campaignId,{players});
    };
  });

  // Enter key on add inputs
  ["inv-inp","spell-inp","skill-inp"].forEach(inpId=>{
    const inp=id(inpId);
    if(inp) inp.onkeydown=e=>{ if(e.key==="Enter"){e.preventDefault(); inp.nextElementSibling?.click();} };
  });

  // Equip/unequip toggle
  qall(".equip-btn").forEach(btn=>{
    btn.onclick=async()=>{
      const i=parseInt(btn.dataset.i);
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const equipped=[...(sheet.equipped||[])];
      const idx=equipped.indexOf(i);
      if(idx>-1) equipped.splice(idx,1);
      else equipped.push(i);
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,equipped}}:p);
      await patch(S.campaignId,{players});
    };
  });

  // Delete item
  qall(".del-btn").forEach(btn=>{
    btn.onclick=async()=>{
      const type=btn.dataset.type, i=parseInt(btn.dataset.i);
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const arr=[...(sheet[type]||[])];
      arr.splice(i,1);
      // If deleting from inventory, fix equipped indices
      let equipped=sheet.equipped||[];
      if(type==="inventory"){
        equipped=equipped.filter(e=>e!==i).map(e=>e>i?e-1:e);
      }
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,[type]:arr,equipped}}:p);
      await patch(S.campaignId,{players});
    };
  });

  // Gold save
  const gs=id("gp-save");
  if(gs) gs.onclick=async()=>{
    const val=parseInt(id("gp-sm")?.value)||0;
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,gp:val}}:p);
    await patch(S.campaignId,{players});
  };

  // Save notes
  const ns=id("notes-save");
  if(ns) ns.onclick=async()=>{
    const val=id("notes-ta")?.value||"";
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,notes:val}}:p);
    await patch(S.campaignId,{players});
    ns.textContent="Saved ✓";
    setTimeout(()=>{ if(id("notes-save")) id("notes-save").textContent="Save Notes"; },1500);
  };
}


function msgHtml(m) {
  if(!m || !m.type) return "";
  const t = m.text ? String(m.text) : "";
  if(m.type==="dm") {
    const isErr = t.startsWith("(The DM");
    return `<div class="mdm"><div class="mlbl">⚔ Dungeon Master</div>${esc(t)}${isErr ? `<button class="btn-retry" data-ts="${m.ts||''}">↺ Retry</button>` : ""}</div>`;
  }
  if(m.type==="player") return `<div class="mpl"><div class="mlbl">↳ ${esc(m.who)}</div>${esc(t)}</div>`;
  if(m.type==="roll")   return `<div class="mroll">🎲 ${esc(t)}</div>`;
  if(m.type==="xp")     return `<div class="msg-xp">✦ ${esc(t)}</div>`;
  if(m.type==="hp")     return `<div class="msg-hp ${t.includes('UNCONSCIOUS')?"msg-hp-dead":""}">❤ ${esc(t)}</div>`;
  if(m.type==="initiative") return `<div class="msg-init">⚔ ${esc(t)}</div>`;
  if(m.type==="condition")  return `<div class="msg-cond">${esc(t)}</div>`;
  if(m.type==="hold")       return `<div class="msg-hold">${esc(t)}</div>`;
  return "";
}

// ── CONDITIONS ────────────────────────────────────────────────────────────────
const TURN_SKIP_CONDITIONS = ["Unconscious","Asleep","Paralyzed","Stunned","Petrified"];
const CONDITION_ICONS = {
  Unconscious:"💀", Asleep:"😴", Paralyzed:"🔒", Stunned:"⭐", Petrified:"🗿",
  Frightened:"😨", Poisoned:"☠", Prone:"⬇", Blinded:"👁", Deafened:"👂",
  Restrained:"⛓", Exhausted:"😓"
};

function applyConditions(players, initiativeOrder, conditions) {
  let updatedPlayers = [...players];
  let updatedOrder = [...(initiativeOrder||[])];
  const condMsgs = [];

  (conditions||[]).forEach(c => {
    const name = c.name;
    const cond = c.condition;
    const active = c.active !== false;

    // Apply to player
    updatedPlayers = updatedPlayers.map(p => {
      if(p.name.toLowerCase() !== name.toLowerCase()) return p;
      const current = [...(p.conditions||[])];
      const idx = current.indexOf(cond);
      if(active && idx===-1) current.push(cond);
      if(!active && idx>-1) current.splice(idx,1);
      condMsgs.push({
        type:"condition",
        text:`${p.char?.name||p.name} is ${active?"now "+cond:"no longer "+cond} ${CONDITION_ICONS[cond]||""}`,
        ts: Date.now()+condMsgs.length
      });
      return {...p, conditions:current};
    });

    // Apply to enemy in initiative order
    updatedOrder = updatedOrder.map(e => {
      if(!e.isEnemy || e.name.toLowerCase()!==name.toLowerCase()) return e;
      const current = [...(e.conditions||[])];
      const idx = current.indexOf(cond);
      if(active && idx===-1) current.push(cond);
      if(!active && idx>-1) current.splice(idx,1);
      if(!condMsgs.find(m=>m.text.includes(e.name))) {
        condMsgs.push({
          type:"condition",
          text:`${e.name} is ${active?"now "+cond:"no longer "+cond} ${CONDITION_ICONS[cond]||""}`,
          ts: Date.now()+condMsgs.length
        });
      }
      return {...e, conditions:current};
    });
  });

  return { updatedPlayers, updatedOrder, condMsgs };
}

function shouldSkipTurn(entity) {
  const conds = entity.conditions||[];
  if(entity.hp !== undefined && entity.hp <= 0) return true;
  return conds.some(c => TURN_SKIP_CONDITIONS.includes(c));
}

function nextActiveCombatSlot(order, currentIdx) {
  if(!order || order.length===0) return 0;
  let next = (currentIdx+1) % order.length;
  let attempts = 0;
  while(shouldSkipTurn(order[next]) && attempts < order.length) {
    next = (next+1) % order.length;
    attempts++;
  }
  return next;
}


// ── DEATH SAVES / ADVANTAGE / CONCENTRATION ──────────────────────────────────
function getDeathSaveState(player) {
  const conds = player.conditions||[];
  const successes = conds.filter(c=>c==="DeathSuccess").length;
  const failures  = conds.filter(c=>c==="DeathFail").length;
  return { successes, failures, stable: successes>=3, dead: failures>=3 };
}

async function resolveDeathSave(roll) {
  const camp = S.campaign;
  const me = camp.players.find(p=>p.name===S.myName);
  if(!me) return;
  const ds = getDeathSaveState(me);
  let conds = [...(me.conditions||[])];
  const msgs = [];

  if(roll===20) {
    // Nat 20 — regain 1 HP, remove Unconscious
    conds = conds.filter(c=>c!=="Unconscious"&&c!=="DeathSuccess"&&c!=="DeathFail");
    const players = camp.players.map(p=>p.name===S.myName?{...p,hp:1,conditions:conds}:p);
    msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls a 20 on their death save — they regain consciousness with 1 HP! 🌟`,ts:Date.now()});
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
  } else if(roll===1) {
    // Nat 1 — 2 failures
    conds.push("DeathFail","DeathFail");
    const newDs = getDeathSaveState({conditions:conds});
    if(newDs.dead) {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls a 1 — two failures! They have died. ☠️`,ts:Date.now()});
      conds.push("Dead");
    } else {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls a 1 — two death save failures (${newDs.failures}/3).`,ts:Date.now()});
    }
    const players = camp.players.map(p=>p.name===S.myName?{...p,conditions:conds}:p);
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
  } else if(roll>=10) {
    // Success
    conds.push("DeathSuccess");
    const newDs = getDeathSaveState({conditions:conds});
    if(newDs.stable) {
      conds = conds.filter(c=>c!=="DeathSuccess"&&c!=="DeathFail");
      conds.push("Stable");
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} — 3 successes! They are stable. 💚`,ts:Date.now()});
    } else {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} — death save success (${newDs.successes}/3).`,ts:Date.now()});
    }
    const players = camp.players.map(p=>p.name===S.myName?{...p,conditions:conds}:p);
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
  } else {
    // Failure
    conds.push("DeathFail");
    const newDs = getDeathSaveState({conditions:conds});
    if(newDs.dead) {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} — 3 failures. They have died. ☠️`,ts:Date.now()});
      conds.push("Dead");
    } else {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} — death save failure (${newDs.failures}/3).`,ts:Date.now()});
    }
    const players = camp.players.map(p=>p.name===S.myName?{...p,conditions:conds}:p);
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
  }

  S.pendingDeathSave=false;
  // Advance combat turn
  const updatedCamp = await (async()=>{ const s=await (await fetch).call(null); })().catch(()=>S.campaign);
  const order = camp.initiativeOrder||[];
  if(order.length>0) await patch(S.campaignId,{combatTurnIdx:nextActiveCombatSlot(order,camp.combatTurnIdx||0)});
}

async function resolveConCheck(roll, dc) {
  const camp = S.campaign;
  const me = camp.players.find(p=>p.name===S.myName);
  if(!me) return;
  const msgs = [];
  if(roll >= dc) {
    msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} for CON save (DC ${dc}) — concentration maintained! ✓`,ts:Date.now()});
  } else {
    const sheet = me.sheet||{};
    const players = camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,concentration:""}}:p);
    msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} for CON save (DC ${dc}) — concentration broken! The spell ends.`,ts:Date.now()});
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
    S.pendingConCheck=null;
    return;
  }
  await patch(S.campaignId,{messages:[...camp.messages,...msgs]});
  S.pendingConCheck=null;
}


// ── INITIATIVE HELPERS ────────────────────────────────────────────────────────
function rollInitiative(dexMod) {
  return rollD(20) + dexMod;
}

function buildInitiativeOrder(players, enemyInitiatives) {
  const entries = [];
  // Player entries — track raw d20 roll and modifier separately
  players.forEach(p => {
    if(!p.char) return;
    const dexMod = mod(p.char.stats.DEX);
    const d20roll = rollD(20);
    const total = d20roll + dexMod;
    entries.push({
      name: p.name,
      charName: p.char.name,
      initiative: total,
      d20roll,
      dexMod,
      isEnemy: false,
      hp: p.hp,
      maxHp: p.maxHp,
    });
  });
  // Enemy entries
  (enemyInitiatives||[]).forEach(e => {
    entries.push({
      name: e.name,
      charName: e.name,
      initiative: e.initiative,
      isEnemy: true,
      hp: e.hp || 10,
      maxHp: e.maxHp || e.hp || 10,
    });
  });
  // Sort highest to lowest, ties broken randomly
  entries.sort((a,b) => b.initiative - a.initiative || Math.random()-0.5);
  return entries;
}

function advanceCombatTurn(order, currentIdx) {
  return (currentIdx + 1) % order.length;
}


function detectSpellUse(action, knownSpells) {
  if(!knownSpells || !knownSpells.length) return null;
  const lower = action.toLowerCase();
  return knownSpells.find(s => lower.includes(s.toLowerCase())) || null;
}

function detectUnknownSpell(action, knownSpells) {
  // Check if action mentions any spell from the full spell database that player doesn't know
  const lower = action.toLowerCase();
  const allSpells = Object.values(SPELLS_BY_LEVEL).flatMap(cls =>
    Object.values(cls).flat()
  );
  const mentioned = allSpells.find(s => lower.includes(s.toLowerCase()));
  if(!mentioned) return null;
  // If it's mentioned but not in known spells, it's unknown
  const known = (knownSpells||[]).map(s=>s.toLowerCase());
  if(!known.includes(mentioned.toLowerCase())) return mentioned;
  return null;
}

async function submitAction(confirmedSlot, useBonusAction=false) {
  if(S.submitting) return;
  const action=S.inputText.trim(); if(!action) return;

  const camp=S.campaign;
  const me=camp.players.find(p=>p.name===S.myName);
  const sheet=me?.sheet||{};
  const char=me?.char||{};

  // App-layer spell enforcement warning
  if(confirmedSlot===undefined) {
    const unknownSpell = detectUnknownSpell(action, sheet.spells||[]);
    if(unknownSpell && !S.spellWarningDismissed) {
      S.spellWarningDismissed = false;
      // Show warning — user can still proceed
      if(!window.__spellWarnShown) {
        window.__spellWarnShown = true;
        const proceed = confirm(`"${unknownSpell}" isn't in ${char.name||S.myName}'s known spells. The DM will rule this fails. Declare anyway?`);
        window.__spellWarnShown = false;
        if(!proceed) { S.submitting=false; return; }
      }
    }
  }

  // Spell slot detection — if a spell is detected and no slot confirmed yet, show popup
  if(confirmedSlot===undefined) {
    const detectedSpell = detectSpellUse(action, sheet.spells||[]);
    const slots = char.spellSlots||{};
    const usedSlots = sheet.spellSlotsUsed||{};
    const availLevels = Object.entries(slots).filter(([l,t])=>(usedSlots[l]||0)<t).map(([l])=>l);
    const isCantripOrNoSlots = !detectedSpell || !availLevels.length ||
      (char.cantrips||[]).map(c=>c.toLowerCase()).some(c=>action.toLowerCase().includes(c));

    if(detectedSpell && !isCantripOrNoSlots) {
      S.pendingSpell = { spell: detectedSpell, availLevels, useBonusAction };
      rPlay();
      return;
    }
  }

  S.inputText=""; S.submitting=true;
  S.pendingSpell=null;

  let newSheet = { ...sheet, action: true, bonusAction: useBonusAction ? true : sheet.bonusAction };
  if(confirmedSlot !== undefined && confirmedSlot !== null) {
    const used = { ...(sheet.spellSlotsUsed||{}) };
    used[confirmedSlot] = (used[confirmedSlot]||0)+1;
    newSheet.spellSlotsUsed = used;
  }

  const nextIdx = (camp.turnIndex+1)%camp.players.length;
  const players = camp.players.map((p,i) => {
    if(p.name===S.myName) return {...p, sheet:newSheet};
    if(i===nextIdx) return {...p, sheet:{...(p.sheet||{}), action:false, bonusAction:false, reaction:false}};
    return p;
  });

  rPlay();

  const pm={type:"player",text:action,who:S.myName,ts:Date.now()};
  const nm=[...camp.messages,pm];
  const ue={role:"user",content:`${S.myName}: ${action}`};
  const nh=[...(camp.aiHistory||[]),ue];

  await patch(S.campaignId,{messages:nm,aiHistory:nh,players});

  try {
    const result = await callDM(buildSystem({...camp,players}), nh);
    const dm={type:"dm",text:result.text,ts:Date.now()};
    const ni = nextIdx;

    let updatedPlayers = [...players];
    const hpMessages = [];
    if(result.hpChanges && result.hpChanges.length>0) {
      result.hpChanges.forEach(change => {
        updatedPlayers = updatedPlayers.map(p => {
          if(p.name.toLowerCase()!==change.name.toLowerCase()) return p;
          const oldHp = p.hp||0;
          const newHp = Math.max(0, Math.min(p.maxHp||oldHp, oldHp + change.delta));
          const status = newHp===0 ? " — UNCONSCIOUS" : "";
          hpMessages.push({
            type:"hp",
            text:`${p.char?.name||p.name} ${change.delta>0?"heals":"takes"} ${Math.abs(change.delta)} ${change.delta>0?"HP":"damage"} (${change.reason}) — ${newHp}/${p.maxHp||oldHp} HP${status}`,
            ts:Date.now()+(hpMessages.length)
          });
          return {...p, hp:newHp};
        });
      });
    }

    if(result.xpAward>0) {
      updatedPlayers = updatedPlayers.map(p => {
        const newXp = (p.xp||0)+result.xpAward;
        const oldLevel = xpToLevel(p.xp||0);
        const newLevel = xpToLevel(newXp);
        if(newLevel>oldLevel) {
          const newMaxHp = (CLASS_HP[p.char?.cls]||8)*newLevel + mod(p.char?.stats?.CON||10)*newLevel;
          const newSlots = (SPELL_SLOTS_BY_LEVEL[p.char?.cls]||[])[newLevel-1]||{};
          return {...p, xp:newXp, level:newLevel, maxHp:newMaxHp, hp:Math.min(p.hp||0,newMaxHp),
            char:{...p.char, spellSlots:newSlots}, levelUpPending:true};
        }
        return {...p, xp:newXp};
      });
    }

    const extraMsgs = [];
    if(hpMessages.length>0) extraMsgs.push(...hpMessages);
    if(result.xpAward>0) extraMsgs.push({type:"xp",text:`+${result.xpAward} XP — ${result.xpReason}`,ts:Date.now()+100});

    let combatUpdate = {};
    const initMsgs = [];

    if(result.initiativeStart && result.enemyInitiatives) {
      const order = buildInitiativeOrder(updatedPlayers, result.enemyInitiatives);
      combatUpdate = { combat: true, initiativeOrder: order, combatTurnIdx: 0 };
      initMsgs.push({ type:"initiative", text:`⚔ INITIATIVE — Everyone rolls for combat order!`, ts: Date.now() });
      order.forEach((e, i) => {
        let rollText;
        if(e.isEnemy) {
          rollText = `${e.name} → ${e.initiative} (enemy)`;
        } else {
          const modStr = e.dexMod >= 0 ? `+${e.dexMod}` : `${e.dexMod}`;
          rollText = `${e.charName} rolls d20: ${e.d20roll} ${modStr} DEX = ${e.initiative}`;
        }
        initMsgs.push({ type:"initiative", text: rollText, ts: Date.now() + i + 1 });
      });
      initMsgs.push({ type:"initiative", text:`⚔ COMBAT BEGINS — Turn order: ${order.map(e=>e.charName||e.name).join(" → ")}`, ts: Date.now() + order.length + 2 });
    } else if(camp.combat && result.enemyHp) {
      const updatedOrder = (camp.initiativeOrder||[]).map(e => {
        if(!e.isEnemy) return e;
        const update = result.enemyHp.find(h=>h.name.toLowerCase()===e.name.toLowerCase());
        if(update) return {...e, hp:update.hp, maxHp:update.maxHp||e.maxHp};
        return e;
      });
      const livingOrder = updatedOrder.filter(e => !e.isEnemy || e.hp > 0);
      const nextTurnIdx = camp.combatTurnIdx % Math.max(1, livingOrder.length);
      combatUpdate = { initiativeOrder: livingOrder, combatTurnIdx: nextActiveCombatSlot(livingOrder, nextTurnIdx) };
    } else if(camp.combat && !result.combatEnd) {
      const order = camp.initiativeOrder||[];
      combatUpdate = { combatTurnIdx: nextActiveCombatSlot(order, camp.combatTurnIdx||0) };
    }

    if(result.combatEnd) {
      combatUpdate = { combat: false, initiativeOrder: [], combatTurnIdx: 0 };
      initMsgs.push({ type:"initiative", text:"⚔ COMBAT ENDS — returning to exploration.", ts: Date.now() });
    }

    if(result.rollMod && result.rollMod.target) {
      const targetPlayer = updatedPlayers.find(p=>p.name===result.rollMod.target);
      if(targetPlayer) S.pendingAdvantage = result.rollMod;
    }

    if(result.concCheck) {
      const targetPlayer = updatedPlayers.find(p=>p.name===result.concCheck.name);
      if(targetPlayer && (targetPlayer.sheet?.concentration||"").length>0) {
        const dc = Math.max(10, Math.floor(result.concCheck.damage/2));
        S.pendingConCheck = { dc, damage:result.concCheck.damage, name:result.concCheck.name };
      }
    }

    let condMsgs = [];
    if(result.conditions && result.conditions.length > 0) {
      const condResult = applyConditions(
        updatedPlayers,
        combatUpdate.initiativeOrder || camp.initiativeOrder || [],
        result.conditions
      );
      updatedPlayers = condResult.updatedPlayers;
      if(combatUpdate.initiativeOrder) combatUpdate.initiativeOrder = condResult.updatedOrder;
      else if(camp.combat) combatUpdate.initiativeOrder = condResult.updatedOrder;
      condMsgs = condResult.condMsgs;

      if(camp.combat && combatUpdate.initiativeOrder) {
        const curIdx = combatUpdate.combatTurnIdx ?? camp.combatTurnIdx ?? 0;
        const curSlot = combatUpdate.initiativeOrder[curIdx % combatUpdate.initiativeOrder.length];
        if(curSlot && shouldSkipTurn(curSlot)) {
          combatUpdate.combatTurnIdx = nextActiveCombatSlot(combatUpdate.initiativeOrder, curIdx);
        }
      }
    }

    updatedPlayers = updatedPlayers.map(p => {
      if((p.hp||0) <= 0 && !(p.conditions||[]).includes("Unconscious")) {
        condMsgs.push({ type:"condition", text:`${p.char?.name||p.name} falls unconscious! 💀`, ts:Date.now()+condMsgs.length });
        return {...p, conditions:[...(p.conditions||[]), "Unconscious"]};
      }
      if((p.hp||0) > 0 && (p.conditions||[]).includes("Unconscious")) {
        condMsgs.push({ type:"condition", text:`${p.char?.name||p.name} regains consciousness!`, ts:Date.now()+condMsgs.length });
        return {...p, conditions:(p.conditions||[]).filter(c=>c!=="Unconscious")};
      }
      return p;
    });

    const effectiveNi = result.holdTurn ? camp.turnIndex : ni;
    if(result.holdTurn && camp.combat) {
      combatUpdate = { ...combatUpdate, combatTurnIdx: camp.combatTurnIdx };
    }
    const holdMsg = result.holdTurn ? [{ type:"hold", text:`⏳ Waiting for ${S.myName} to roll...`, ts:Date.now()+999 }] : [];

    await patch(S.campaignId,{
      messages:[...nm,dm,...extraMsgs,...initMsgs,...condMsgs,...holdMsg],
      aiHistory:[...nh,{role:"assistant",content:result.text}],
      turnIndex:effectiveNi,
      holdTurn:result.holdTurn||false,
      players:updatedPlayers,
      ...combatUpdate
    });
  } catch(e) {
    const errText = e?.message?.includes("No API key")
      ? S.isCreator
        ? "(The DM cannot respond because no API key is configured. Enter your Claude API key in Settings and try again.)"
        : "(The DM cannot respond because the campaign creator hasn't configured an API key yet. Ask the creator to set it in Settings.)"
      : `(The DM's voice fades... connection lost. Try again.) ${e?.message||""}`;
    await patch(S.campaignId,{messages:[...nm,{type:"dm",text:errText,ts:Date.now()}]});
  }

  S.submitting=false;
}

const id   = i => document.getElementById(i);
const q    = i => document.getElementById(i);
const qall = s => document.querySelectorAll(s);

tryAutoRejoin();
</script>
