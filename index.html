  Bard:      [0,4,5,6,7,8],

  Fighter:   null,

  Barbarian: null,
};

// New spells gained when leveling up
function getNewSpellsOnLevelUp(cls, newLevel) {
  const table = SPELLS_KNOWN_TABLE[cls];
  if(!table) return 0; // prepared caster or non-caster
  const prev = table[newLevel-1]||0;
  const curr = table[newLevel]||0;
  return Math.max(0, curr-prev);
}

// Get all spells available to a class at or below a given spell level
function getSpellsForClassLevel(cls, maxSpellLevel) {
  const lists = SPELLS_BY_LEVEL[cls]||{};
  const result = [];
  for(let i=1; i<=maxSpellLevel; i++) {
    result.push(...(lists[i]||[]));
  }
  return result;
}

// Get max spell level a class can cast at character level
function maxSpellLevelForCharLevel(cls, charLevel) {
  const slots = SPELL_SLOTS_FULL[cls]?.[charLevel]||{};
  const levels = Object.keys(slots).map(Number);
  return levels.length ? Math.max(...levels) : 0;
}

function getWeaponActions(inventory, equipped, stats, cls) {
  const actions = [];
  const profBonus = 2;

  // Only use equipped items (or all if nothing equipped yet)
  const equippedItems = (equipped||[]).length > 0
    ? (inventory||[]).filter((_,i) => (equipped||[]).includes(i))
    : (inventory||[]);  // fallback: show all weapons if nothing equipped

  equippedItems.forEach(item => {
    const lower = item.toLowerCase().replace(/\s*\(.*?\)/g,"").trim();
    const key = Object.keys(WEAPON_DAMAGE).find(w => lower.includes(w));
    if(key) {
      const w = WEAPON_DAMAGE[key];
      const abilityMod = w.ability.includes("DEX") && w.ability.includes("STR")
        ? Math.max(mod(stats.STR), mod(stats.DEX))
        : w.ability.includes("DEX") ? mod(stats.DEX)
        : w.ability.includes("WIS") ? mod(stats.WIS)
        : mod(stats.STR);
      const hitBonus = abilityMod + profBonus;
      const dmgBonus = abilityMod;
      actions.push({
        name: key.charAt(0).toUpperCase()+key.slice(1),
        type: "action",
        hit: hitBonus>=0?`+${hitBonus}`:`${hitBonus}`,
        dmg: `${w.dmg}${dmgBonus>=0?`+${dmgBonus}`:`${dmgBonus}`}`,
        dmgType: w.type,
        prop: w.prop,
      });
    }
  });

  // Always add unarmed strike
  const strMod = mod(stats.STR);
  actions.push({
    name:"Unarmed Strike",
    type:"action",
    hit: strMod+profBonus>=0?`+${strMod+profBonus}`:`${strMod+profBonus}`,
    dmg:`1${strMod>=0?`+${strMod}`:`${strMod}`}`,
    dmgType:"bludgeoning",
    prop:"",
  });

  return actions;
}

function stripUndefined(obj) {
  if(Array.isArray(obj)) return obj.map(stripUndefined);
  if(obj && typeof obj === 'object') {
    return Object.fromEntries(
      Object.entries(obj)
        .filter(([,v]) => v !== undefined)
        .map(([k,v]) => [k, stripUndefined(v)])
    );
  }
  return obj;
}

function buildSystem(camp) {
  const chars = camp.players.map(p => {
    if(!p.char) return `${p.name}: no character yet`;
    const c = p.char;
    const sheet = p.sheet || {};
    const slots = c.spellSlots || {};
    const usedSlots = sheet.spellSlotsUsed || {};
    const availSlots = Object.entries(slots).map(([l,t])=>`Lv${l}:${t-(usedSlots[l]||0)}/${t}`).join(" ");
    const spellList = (sheet.spells||[]).slice(0,8).join(", ");
    const inv = (sheet.inventory||[]).slice(0,6).join(", ");
    return `${p.name} plays ${c.name}, ${c.race} ${c.cls} (bg: ${c.background||"none"}) — STR${c.stats.STR} DEX${c.stats.DEX} CON${c.stats.CON} INT${c.stats.INT} WIS${c.stats.WIS} CHA${c.stats.CHA}. HP:${p.hp}/${p.maxHp}.${availSlots?` Spell slots: ${availSlots}.`:""}${spellList?` Spells: ${spellList}.`:""}${inv?` Inventory: ${inv}.`:""}${c.skills?.length?` Proficient: ${c.skills.slice(0,5).join(", ")}.`:""}${c.backstory?` ${c.backstory}`:""}`;
  }).join("\n");
  const cur = camp.players[camp.turnIndex % camp.players.length];
  return `You are the sole Dungeon Master for a classic fantasy D&D 5e campaign with ${camp.players.length} players. There is no human DM.

PARTY:\n${chars}

RULES:
- Narrate vividly in 2–4 paragraphs. Make the world, NPCs, and atmosphere feel real and alive.
- SPELL ENFORCEMENT: If a player attempts to cast a spell not in their known spells list, narrate that it fails — they simply don't know that spell. If they have no remaining slots for that spell level, narrate that their magical energy is spent. Never grant spell effects outside a player's actual known spells or available slots.
- This is strictly turn-based. One player acts per turn; you respond, then the next player goes.
- Always end your response by clearly naming whose turn it is next (e.g. "What do you do, ${cur?.name}?").
- When rolls are needed, name the player and die explicitly (e.g. "Roll a d20 for Stealth, ${cur?.name}.").
- Let choices have real weight — good ideas succeed, recklessness backfires.
- Keep all players engaged through vivid narration even when it's not their turn.
- Classic fantasy tone: dungeons, intrigue, wonder, moral weight, memorable NPCs.

COMBAT & INITIATIVE:
${camp.combat ? `Currently IN COMBAT. Initiative order: ${(camp.initiativeOrder||[]).map((e,i)=>`${i+1}. ${e.name}(${e.initiative})`).join(", ")}. Current turn: ${(camp.initiativeOrder||[])[camp.combatTurnIdx%Math.max(1,(camp.initiativeOrder||[]).length)]?.name||"unknown"}.
- On enemy turns: narrate what the enemy does, apply any damage via HP_CHANGES, then state who is next.
- When ALL enemies are defeated or combat clearly ends, append: COMBAT_END
- Always append ENEMY_HP:[{"name":"EnemyName","hp":X,"maxHp":Y}] with current enemy HP after each combat action.` : `NOT in combat.
- When combat begins (enemies attack or initiative would be rolled): append INITIATIVE_START:["EnemyName1","EnemyName2"] listing ALL enemies entering combat. The app will auto-roll player initiatives.
- Also append ENEMY_INITIATIVES:[{"name":"EnemyName","initiative":X,"hp":Y,"maxHp":Y}] with enemy initiative rolls (d20 + their DEX mod, typically +0 to +3 for most monsters).`}

XP AWARDS:
After your narrative, append these two JSON blocks on their own lines (no markdown, no code fences):
XP_AWARD:{"xp":0,"reason":""}
HP_CHANGES:[]

XP rules: Award XP only when something meaningful happens — defeating enemies (10-200 XP), solving puzzles (25-100 XP), major story milestones (50-500 XP), clever roleplay (10-50 XP). Award 0 for normal conversation/movement. Split XP equally among all players.

HP_CHANGES rules: Include an entry for every player whose HP changes this turn. Format each entry as:
{"name":"PlayerName","delta":-8,"reason":"hit by goblin sword"}
Use negative delta for damage, positive for healing. For a long rest use delta equal to their full max HP (they fully restore). For a short rest, use a reasonable Hit Die roll. If no HP changes, leave the array empty: [].
Always use the player's real name (not character name) exactly as listed in the party.

CONDITIONS: Append this block when any character gains or loses a condition:
CONDITIONS:[{"name":"CharacterName","condition":"Poisoned","active":true}]
Use active:true when applied, active:false when it ends. Conditions: Unconscious, Asleep, Paralyzed, Stunned, Petrified, Frightened, Poisoned, Prone, Blinded, Deafened, Restrained, Exhausted. Use player real name for players, enemy name for enemies. Omit if no changes.

DEATH SAVING THROWS: When an unconscious player at 0 HP takes their turn, do NOT ask them to act. The app handles death saves automatically. When a player takes damage while unconscious, append:
CONDITIONS:[{"name":"PlayerName","condition":"DeathFail","active":true}]
Add one entry per hit. The app tracks successes/failures.

ADVANTAGE/DISADVANTAGE: When the next player's roll clearly has advantage or disadvantage due to conditions or circumstances, append:
ROLL_MOD:{"type":"advantage","reason":"target is Prone","target":"PlayerName"}
or ROLL_MOD:{"type":"disadvantage","reason":"you are Blinded","target":"PlayerName"}
Omit if neither applies.

CONCENTRATION: When a concentrating player takes damage, append:
CON_CHECK:{"name":"PlayerName","damage":8}
The app will prompt them to roll a CON save. If they fail, remove their concentration spell automatically.`;
}

async function callDM(system, history) {
  const apiKey = getApiKey();
  if(!apiKey) { go("api-key"); throw new Error("No API key set"); }
  const res  = await fetch(`${PROXY}/api/dm`, {
    method:"POST", headers:{"Content-Type":"application/json","X-API-Key":apiKey},
    body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1200, system, messages:history })
  });
  const data = await res.json();
  const raw  = data.content?.[0]?.text || "...";
  // Parse XP award
  const xpMatch = raw.match(/XP_AWARD:(\{.*?\})/);
  let xpAward = 0, xpReason = "";
  if(xpMatch) {
    try { const j=JSON.parse(xpMatch[1]); xpAward=j.xp||0; xpReason=j.reason||""; } catch(e){}
  }
  // Parse HP changes
  const hpMatch = raw.match(/HP_CHANGES:(\[.*?\])/s);
  let hpChanges = [];
  if(hpMatch) {
    try { hpChanges = JSON.parse(hpMatch[1])||[]; } catch(e){}
  }
  // Parse initiative signals
  const initStartMatch = raw.match(/INITIATIVE_START:(\[.*?\])/);
  let initiativeStart = null;
  if(initStartMatch) { try { initiativeStart = JSON.parse(initStartMatch[1]); } catch(e){} }

  const enemyInitMatch = raw.match(/ENEMY_INITIATIVES:(\[.*?\])/s);
  let enemyInitiatives = [];
  if(enemyInitMatch) { try { enemyInitiatives = JSON.parse(enemyInitMatch[1])||[]; } catch(e){} }

  const combatEnd = /COMBAT_END/.test(raw);

  const enemyHpMatch = raw.match(/ENEMY_HP:(\[.*?\])/s);
  let enemyHp = [];
  if(enemyHpMatch) { try { enemyHp = JSON.parse(enemyHpMatch[1])||[]; } catch(e){} }

  // Strip all JSON/signal blocks from displayed text
  const text = raw
    .replace(/\nXP_AWARD:\{.*?\}/g,"")
    .replace(/\nHP_CHANGES:\[.*?\]/gs,"")
    .replace(/\nINITIATIVE_START:\[.*?\]/g,"")
    .replace(/\nENEMY_INITIATIVES:\[.*?\]/gs,"")
    .replace(/\nENEMY_HP:\[.*?\]/gs,"")
    .replace(/\nCOMBAT_END/g,"")
    .trim();
  // Parse conditions
  const condMatch = raw.match(/CONDITIONS:(\[.*?\])/s);
  let conditions = [];
  if(condMatch) { try { conditions = JSON.parse(condMatch[1])||[]; } catch(e){} }

  // Parse roll modifier (advantage/disadvantage)
  const rollModMatch = raw.match(/ROLL_MOD:(\{.*?\})/);
  let rollMod = null;
  if(rollModMatch) { try { rollMod = JSON.parse(rollModMatch[1]); } catch(e){} }

  // Parse concentration check
  const concCheckMatch = raw.match(/CON_CHECK:(\{.*?\})/);
  let concCheck = null;
  if(concCheckMatch) { try { concCheck = JSON.parse(concCheckMatch[1]); } catch(e){} }

  // Strip all blocks from text
  const text2 = text
    .replace(/\nCONDITIONS:\[.*?\]/gs,"")
    .replace(/\nROLL_MOD:\{.*?\}/g,"")
    .replace(/\nCON_CHECK:\{.*?\}/g,"")
    .trim();

  return { text:text2, xpAward, xpReason, hpChanges, initiativeStart, enemyInitiatives, combatEnd, enemyHp, conditions, rollMod, concCheck };
}

function render() {
  ({ landing:rLanding, "new-campaign":rNew, "join-campaign":rJoin,
     "char-creation":rChar, lobby:rLobby, play:rPlay, "api-key":rApiKey, "level-up":rLevelUp }[S.screen] || rLanding)();

function saveSession() {
  try { localStorage.setItem("chronicle_session", JSON.stringify({ campaignId:S.campaignId, myName:S.myName })); } catch(e){}
}
function clearSession() {
  try { localStorage.removeItem("chronicle_session"); } catch(e){}
}

function attach(id) {
  if(S.unsub) S.unsub();
  saveSession();
  S.unsub = subscribe(id, camp => {
    S.campaign = camp;
    S.isCreator = camp.creatorName === S.myName;
    saveCampaignToHistory(camp, S.myName);
    routePhase();
  });
}

function routePhase() {
  const c = S.campaign;
  if(!c) return;
  if(c.phase==="char-creation") {
    const me = c.players.find(p=>p.name===S.myName);
    go(me?.char ? "lobby" : "char-creation");
  } else if(c.phase==="play") {
    // Check if this player needs to level up
    const me = c.players.find(p=>p.name===S.myName);
    if(me?.levelUpPending) { go("level-up"); return; }
    go("play");
  }
}

async function tryAutoRejoin() {
  try {
    const saved = JSON.parse(localStorage.getItem("chronicle_session")||"{}");
    if(!saved.campaignId || !saved.myName) { render(); return; }
    const camp = await fetchCamp(saved.campaignId);
    if(!camp) { clearSession(); render(); return; }
    const pl = camp.players.find(p=>p.name===saved.myName);
    if(!pl) { clearSession(); render(); return; }
    S.campaignId = saved.campaignId;
    S.myName     = saved.myName;
    attach(S.campaignId);
  } catch(e) { render(); }
}

function getCampaignHistory() {
  try { return JSON.parse(localStorage.getItem("chronicle_history")||"[]"); } catch(e){ return []; }
}

function saveCampaignToHistory(camp, myName) {
  try {
    const history = getCampaignHistory().filter(c=>c.id!==camp.id);
    history.unshift({
      id: camp.id,
      myName,
      playerNames: camp.players.map(p=>p.name),
      phase: camp.phase,
      msgCount: (camp.messages||[]).length,
      lastPlayed: Date.now(),
    });
    localStorage.setItem("chronicle_history", JSON.stringify(history.slice(0,5)));
  } catch(e){}
}

async function resumeCampaign(id, myName) {
  const camp = await fetchCamp(id);
  if(!camp){ alert("Campaign not found — it may have been deleted."); return; }
  const pl = camp.players.find(p=>p.name===myName);
  if(!pl){ alert(`Player "${myName}" not found in this campaign.`); return; }
  S.campaignId = id;
  S.myName = myName;
  attach(id);
}

  Druid:     {2:["Wild Shape improvement","Druid Circle (choose subclass)"],3:[],4:["ASI: +2 to one stat or +1 to two","Wild Shape CR 1/2"],5:["3rd-level spells unlocked"]},
  Barbarian: {2:["Reckless Attack","Danger Sense"],3:["Primal Path (choose subclass)"],4:["ASI: +2 to one stat or +1 to two"],5:["Extra Attack","Fast Movement (+10ft speed)"]},
  Warlock:   {2:["Eldritch Invocations (choose 2)"],3:["Pact Boon (Pact of the Chain/Blade/Tome)","2nd-level spell slots"],4:["ASI: +2 to one stat or +1 to two"],5:["3rd-level spells unlocked"]},
};

const NEW_SPELLS_PER_LEVEL = { Wizard:2, Bard:1, Warlock:1 };

function rLevelUp() {
  const camp = S.campaign;
  if(!camp) { go("play"); return; }
  const me = camp.players.find(p=>p.name===S.myName);
  if(!me||!me.char) { go("play"); return; }
  const c = me.char;
  const newLevel = me.level||1;
  const features = (LEVEL_FEATURES[c.cls]||{})[newLevel]||[];
  const newSpellCount = getNewSpellsOnLevelUp(c.cls, newLevel);
  const maxSlotLevel = maxSpellLevelForCharLevel(c.cls, newLevel);
  const isPrepared = SPELLS_KNOWN_TABLE[c.cls]===null && maxSlotLevel>0;
  const allClassSpells = getSpellsForClassLevel(c.cls, maxSlotLevel);
  const availableSpells = allClassSpells.filter(s=>!(me.sheet?.spells||[]).includes(s));
  const hasASI = features.some(f=>f.includes("ASI"));

  q("root").innerHTML = `
    <div class="fcenter">
      <div class="card wide">
        <h2 class="ch">🎉 Level Up! — Level ${newLevel} ${esc(c.cls)}</h2>
        <p class="csub">${esc(c.name)} has grown in power. Review your new abilities.</p>

        <div class="levelup-section">
          <div class="lu-hdr">New Features</div>
          ${features.length ? features.map(f=>`<div class="lu-feature">✦ ${esc(f)}</div>`).join("") : `<div class="lu-feature" style="opacity:.5">No new features at this level.</div>`}
        </div>

        <div class="levelup-section">
          <div class="lu-hdr">Hit Points</div>
          <div class="lu-feature">Max HP increased to <strong>${me.maxHp}</strong> (${CLASS_HP[c.cls]}d${CLASS_HP[c.cls]} + CON modifier per level)</div>
        </div>

        ${isPrepared && maxSlotLevel>0 ? `
        <div class="levelup-section">
          <div class="lu-hdr">Spellcasting — Prepared Caster</div>
          <div class="lu-feature">As a ${esc(c.cls)}, you prepare spells each day. You now have access to all ${esc(c.cls)} spells up to level ${maxSlotLevel}. Your full spell list is available in the Spells tab of your character sheet.</div>
          <div class="lu-feature" style="margin-top:.3rem">Spells available: ${allClassSpells.length} spells across ${maxSlotLevel} spell level${maxSlotLevel>1?"s":""}</div>
        </div>` : newSpellCount>0 && availableSpells.length>0 ? `
        <div class="levelup-section">
          <div class="lu-hdr">New Spells — Choose ${newSpellCount} (up to level ${maxSlotLevel})</div>
          <div id="spell-picks-count" class="spell-count">0/${newSpellCount} chosen</div>
          <div class="spell-grid">
            ${availableSpells.map(s=>`<label class="spell-check">
              <input type="checkbox" data-spell="${esc(s)}" class="lu-spbox"/> ${esc(s)}
            </label>`).join("")}
          </div>
        </div>` : newSpellCount===0 && maxSlotLevel===0 ? "" : `
        <div class="levelup-section">
          <div class="lu-hdr">Spellcasting</div>
          <div class="lu-feature" style="opacity:.6">No new spells to select at this level.</div>
        </div>`}

        ${hasASI ? `
        <div class="levelup-section">
          <div class="lu-hdr">Ability Score Improvement</div>
          <p class="csub">Choose +2 to one ability or +1 to two different abilities.</p>
          <div class="asi-grid">
            ${Object.entries(c.stats).map(([k,v])=>`
              <div class="asi-box">
                <div class="msk">${k}</div>
                <div class="msv" id="asi-val-${k}">${v}</div>
                <div class="asi-btns">
                  <button class="asi-btn" data-stat="${k}" data-amt="1">+1</button>
                  <button class="asi-btn" data-stat="${k}" data-amt="2">+2</button>
                </div>
              </div>`).join("")}
          </div>
          <div id="asi-status" class="csub" style="margin-top:.5rem">No ASI applied yet (optional)</div>
        </div>` : ""}

        <button class="btn-gold full" id="btn-levelup-done">⚔ Continue Adventure</button>
        <div class="err" id="er"></div>
      </div>
    </div>`;

  // Track selections
  let newSpells = [];
  let asiApplied = {};

  qall(".lu-spbox").forEach(cb => {
    cb.onchange = () => {
      newSpells = [...qall(".lu-spbox:checked")].map(c=>c.dataset.spell);
      if(newSpells.length>newSpellCount){ cb.checked=false; newSpells = [...qall(".lu-spbox:checked")].map(c=>c.dataset.spell); return; }
      id("spell-picks-count").textContent = `${newSpells.length}/${newSpellCount} chosen`;
      qall(".lu-spbox").forEach(c=>{ c.closest("label").classList.toggle("sp-on",c.checked); });
    };
  });

  qall(".asi-btn").forEach(btn => {
    btn.onclick = () => {
      const stat = btn.dataset.stat, amt = parseInt(btn.dataset.amt);
      const totalPoints = Object.values(asiApplied).reduce((a,b)=>a+b,0);
      if(totalPoints+amt>2){ id("er").textContent="You can only spend 2 total ASI points."; return; }
      if(amt===2 && totalPoints>0){ id("er").textContent="+2 must be applied to a single stat with no other increases."; return; }
      id("er").textContent="";
      asiApplied = amt===2 ? {[stat]:2} : {...asiApplied, [stat]:(asiApplied[stat]||0)+amt};
      // Update displayed values
      Object.entries(asiApplied).forEach(([k,v])=>{ const el=id(`asi-val-${k}`); if(el) el.textContent=c.stats[k]+v; });
      id("asi-status").textContent = `ASI: ${Object.entries(asiApplied).map(([k,v])=>"+"+v+" "+k).join(", ")}`;
    };
  });

  id("btn-levelup-done").onclick = async () => {
    const btn = id("btn-levelup-done");
    btn.disabled=true; btn.textContent="Saving...";
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);

    // Apply new spells
    const updatedSheet = {...(me.sheet||{})};
    if(newSpells.length>0) updatedSheet.spells = [...(updatedSheet.spells||[]), ...newSpells];

    // Apply ASI
    const updatedStats = {...c.stats};
    Object.entries(asiApplied).forEach(([k,v])=>{ updatedStats[k]=(updatedStats[k]||10)+v; });

    // Add new features to char
    const updatedFeatures = [...(c.features||[]), ...features.filter(f=>!f.includes("ASI"))];

    const players = camp.players.map(p => p.name===S.myName ? {
      ...p,
      char: {...c, stats:updatedStats, features:updatedFeatures},
      sheet: updatedSheet,
      levelUpPending: false,
    } : p);

    await patch(S.campaignId, {players});

    // Add level up message to narrative
    const luMsg = {type:"xp", text:`${c.name} reaches Level ${newLevel}! ${features.length?features[0]:"New power awakens."}`, ts:Date.now()};
    const messages = [...camp.messages, luMsg];
    await patch(S.campaignId, {messages});

    go("play");
  };
}

// ── CHARACTER CREATION (multi-step) ──────────────────────────────────────────
// Steps: race/class → background → skills → equipment → spells → review

function rChar() {
  const step = S.charDraft.step || 1;
  const d = S.charDraft;
  const steps = ["Race & Class","Background","Skills","Equipment","Spells","Review"];

  const stepBar = `<div class="step-bar">${steps.map((s,i)=>`<div class="step-pip ${i+1===step?"pip-on":i+1<step?"pip-done":""}">${i+1<step?"✓":i+1}</div><div class="step-label ${i+1===step?"slbl-on":""}">${s}</div>`).join("")}</div>`;

  let body = "";

  if(step===1) body = stepRaceClass(d);
  else if(step===2) body = stepBackground(d);
  else if(step===3) body = stepSkills(d);
  else if(step===4) body = stepEquipment(d);
  else if(step===5) body = stepSpells(d);
  else if(step===6) body = stepReview(d);

  q("root").innerHTML = `
    <div class="fcenter">
      <div class="card wide creation-card">
        <h2 class="ch">Forge Your Hero <span class="step-sub">Step ${step} of ${steps.length}</span></h2>
        <p class="csub">Welcome, ${esc(S.myName)}.</p>
        ${stepBar}
        <div id="step-body">${body}</div>
        <div class="step-nav">
          ${step>1?`<button class="btn-ghost step-back" id="step-back">← Back</button>`:""}
          ${step<6?`<button class="btn-gold step-next" id="step-next">Next →</button>`:`<button class="btn-gold step-next" id="step-save">⚔ Save Character</button>`}
        </div>
        <div class="err" id="er"></div>
      </div>
    </div>`;

  bindStep(step, d);
}

function stepRaceClass(d) {
  return `
    <div class="f"><label>Character Name</label><input id="cc-n" value="${esc(d.name)}" placeholder="Your hero's name..."/></div>
    <div class="two-col">
      <div class="f"><label>Race</label><select id="cc-r">${RACES.map(r=>`<option${r===d.race?" selected":""}>${r}</option>`).join("")}</select></div>
      <div class="f"><label>Class</label><select id="cc-c">${CLASSES.map(c=>`<option${c===d.cls?" selected":""}>${c}</option>`).join("")}</select></div>
    </div>
    <div class="f"><label>Backstory <span class="dim">(optional)</span></label><textarea id="cc-b" placeholder="A wandering sellsword, a disgraced noble's heir...">${esc(d.backstory||"")}</textarea></div>
    <div class="f">
      <label>Ability Scores <span class="dim">(4d6 drop lowest)</span></label>
      <div class="stat-grid">${Object.entries(d.stats).map(([k,v])=>`<div class="stat-box"><div class="sk">${k}</div><div class="sv">${v}</div><div class="sm">${modStr(v)}</div></div>`).join("")}</div>
      <button class="btn-sm rmt" id="reroll">⚄ Reroll Stats</button>
    </div>
    <div class="f class-feature-box">
      <label>Class Features at Level 1</label>
      <div class="feature-list">${(CLASS_FEATURES[d.cls]||[]).map(f=>`<div class="feature-item">✦ ${f}</div>`).join("")}</div>
    </div>`;
}

function stepBackground(d) {
  const bg = d.background || "";
  const bgData = bg ? BACKGROUNDS[bg] : null;
  return `
    <div class="f"><label>Background</label>
      <select id="bg-sel">
        <option value="">— Choose background —</option>
        ${Object.keys(BACKGROUNDS).map(b=>`<option${b===bg?" selected":""}>${b}</option>`).join("")}
      </select>
    </div>
    ${bgData ? `
      <div class="bg-info">
        <div class="bg-row"><span class="bg-lbl">Bonus Skills:</span> ${bgData.skills.join(", ")}</div>
        <div class="bg-row"><span class="bg-lbl">Feature:</span> ${bgData.feature}</div>
        <div class="bg-row"><span class="bg-lbl">Starting Equipment:</span> ${bgData.equipment.join(", ")}</div>
      </div>` : `<div class="bg-hint">Select a background to see its benefits.</div>`}`;
}

function stepSkills(d) {
  const cls = d.cls;
  const bgSkills = d.background ? BACKGROUNDS[d.background]?.skills || [] : [];
  const clsData = CLASS_SKILLS[cls];
  const chosen = d.skills || [];
  const needed = clsData.choices;
  return `
    <div class="skill-header">
      <span>Choose <strong>${needed}</strong> skill proficiencies from your class list.</span>
      <span class="skill-count">${chosen.length}/${needed} chosen</span>
    </div>
    ${bgSkills.length?`<div class="bg-skill-note">From background (${d.background}): <strong>${bgSkills.join(", ")}</strong> — already included.</div>`:""}
    <div class="skill-grid">
      ${clsData.from.map(sk => {
        const fromBg = bgSkills.includes(sk);
        const isChosen = chosen.includes(sk) || fromBg;
        return `<label class="skill-check ${fromBg?"skill-bg":""}">
          <input type="checkbox" ${isChosen?"checked":""} ${fromBg?"disabled":""} data-skill="${sk}" class="skbox"/>
          <span>${sk}</span>
        </label>`;
      }).join("")}
    </div>
    <div class="f" style="margin-top:.8rem"><label>All Proficiencies (auto-listed, editable)</label>
      <textarea id="prof-ta" rows="2" placeholder="Add any extra proficiencies...">${esc((d.extraProfs||[]).join(", "))}</textarea>
    </div>`;
}

function stepEquipment(d) {
  const classEq = CLASS_EQUIPMENT[d.cls] || [];
  const bgEq    = d.background ? BACKGROUNDS[d.background]?.equipment || [] : [];
  const combined = d.equipment || [...classEq, ...bgEq];
  return `
    <div class="eq-note">Starting equipment from your class and background — edit as needed.</div>
    <div class="f"><label>Equipment</label>
      <div class="eq-list" id="eq-list">
        ${combined.map((item,i)=>`<div class="eq-item"><input class="eq-inp" data-i="${i}" value="${esc(item)}"/><button class="del-btn eq-del" data-i="${i}">✕</button></div>`).join("")}
      </div>
      <button class="btn-sm" id="add-eq">+ Add item</button>
    </div>
    <div class="f"><label>Gold Pieces</label><input id="gp-inp" type="number" value="${d.gp||0}" min="0" style="width:100px"/></div>`;
}

function stepSpells(d) {
  const cls = d.cls;
  const cantripList = SPELLS_BY_LEVEL[cls]?.cantrips||[];
  const spellList   = SPELLS_BY_LEVEL[cls]?.[1]||[];
  const cantripPicks = CANTRIP_PICKS[cls] || 0;
  const spellPicks   = SPELL_PICKS[cls];
  const isPreparedCaster = SPELLS_KNOWN_TABLE[cls]===null;
  const chosenCan = d.cantrips || [];
  const chosenSp  = d.spells   || [];

  if(!cantripList.length && !spellList.length) return `<div class="no-spells"><p>${cls}s do not cast spells.</p><p style="margin-top:.5rem;opacity:.7">Your class features (like Rage or Second Wind) are already noted on your sheet.</p></div>`;
  const isPrepared = SPELLS_KNOWN_TABLE[cls]===null && spellList.length>0;

  return `
    ${cantripList ? `
      <div class="spell-section">
        <div class="spell-hdr">Cantrips — choose <strong>${cantripPicks}</strong> <span class="spell-count">(${chosenCan.length}/${cantripPicks})</span></div>
        <div class="spell-grid">

        <div class="spell-hdr">${isPrepared?"All 1st-Level Spells (prepared caster — you know all of them)":"1st-Level Spells — choose "+spellPicks} ${!isPrepared?`<span class="spell-count">(${chosenSp.length}/${spellPicks})</span>`:""}</div>

function bindStep(step, d) {
  const nextBtn = id("step-next") || id("step-save");
  const backBtn = id("step-back");
  if(backBtn) backBtn.onclick = () => { S.charDraft.step = step-1; rChar(); };

  if(step===1) {
    id("cc-n").oninput = e => S.charDraft.name=e.target.value;
    id("cc-r").onchange= e => S.charDraft.race=e.target.value;
    id("cc-c").onchange= e => {
      S.charDraft.cls=e.target.value;
      // Reset equipment/spells when class changes
      delete S.charDraft.equipment;
      delete S.charDraft.spells;
      delete S.charDraft.cantrips;
      rChar();
    };
    id("cc-b").oninput = e => S.charDraft.backstory=e.target.value;
    id("reroll").onclick= () => { S.charDraft.stats=rollAll(); rChar(); };
    if(nextBtn) nextBtn.onclick = () => {
      if(!S.charDraft.name?.trim()){ id("er").textContent="Name your character."; return; }
      S.charDraft.step=2; rChar();
    };
  }

  if(step===2) {
    id("bg-sel").onchange = e => {
      S.charDraft.background = e.target.value;
      delete S.charDraft.equipment; // reset equipment when background changes
      rChar();
    };
    if(nextBtn) nextBtn.onclick = () => {
      if(!S.charDraft.background){ id("er").textContent="Choose a background."; return; }
      S.charDraft.step=3; rChar();
    };
  }

  if(step===3) {
    const bgSkills = d.background ? BACKGROUNDS[d.background]?.skills||[] : [];
    qall(".skbox").forEach(cb => {
      cb.onchange = () => {
        const chosen = [...qall(".skbox:checked")].map(c=>c.dataset.skill).filter(s=>!bgSkills.includes(s));
        S.charDraft.skills = chosen;
        // re-render count
        const cnt = document.querySelector(".skill-count");
        if(cnt) cnt.textContent = `${chosen.length}/${CLASS_SKILLS[d.cls].choices} chosen`;
      };
    });
    id("prof-ta").oninput = e => S.charDraft.extraProfs = e.target.value.split(",").map(s=>s.trim()).filter(Boolean);
    if(nextBtn) nextBtn.onclick = () => {
      const needed = CLASS_SKILLS[d.cls].choices;
      const chosen = (S.charDraft.skills||[]).length;
      if(chosen < needed){ id("er").textContent=`Choose ${needed} skills (${chosen} selected).`; return; }
      S.charDraft.step=4; rChar();
    };
  }

  if(step===4) {
    // Initialize equipment if not set
    if(!S.charDraft.equipment) {
      S.charDraft.equipment = [...(CLASS_EQUIPMENT[d.cls]||[]), ...(d.background?BACKGROUNDS[d.background]?.equipment||[]:[])] ;
    }
    qall(".eq-inp").forEach(inp => {
      inp.oninput = e => { const i=parseInt(inp.dataset.i); S.charDraft.equipment[i]=e.target.value; };
    });
    qall(".eq-del").forEach(btn => {
      btn.onclick = () => { const i=parseInt(btn.dataset.i); S.charDraft.equipment.splice(i,1); rChar(); };
    });
    id("add-eq").onclick = () => { S.charDraft.equipment.push(""); rChar(); };
    id("gp-inp").oninput = e => S.charDraft.gp = parseInt(e.target.value)||0;
    if(nextBtn) nextBtn.onclick = () => { S.charDraft.step=5; rChar(); };
  }

  if(step===5) {
    const cantripPicks = CANTRIP_PICKS[d.cls]||0;
    const spellPicks   = SPELL_PICKS[d.cls];
    const isPrepared   = spellPicks===999;

    qall(".canbox").forEach(cb => {
      cb.onchange = () => {
        const chosen=[...qall(".canbox:checked")].map(c=>c.dataset.spell);
        if(chosen.length>cantripPicks){ cb.checked=false; id("er").textContent=`Max ${cantripPicks} cantrips.`; return; }
        id("er").textContent="";
        S.charDraft.cantrips=chosen;
        qall(".canbox").forEach(c=>{ c.closest("label").classList.toggle("sp-on",c.checked); });
      };
    });
    qall(".spbox").forEach(cb => {
      cb.onchange = () => {
        const chosen=[...qall(".spbox:checked")].map(c=>c.dataset.spell);
        if(!isPrepared && chosen.length>spellPicks){ cb.checked=false; id("er").textContent=`Max ${spellPicks} spells.`; return; }
        id("er").textContent="";
        S.charDraft.spells=chosen;
        qall(".spbox").forEach(c=>{ c.closest("label").classList.toggle("sp-on",c.checked); });
      };
    });
    if(nextBtn) nextBtn.onclick = () => {
      const needCan = CANTRIP_PICKS[d.cls]||0;
      if(needCan>0 && (S.charDraft.cantrips||[]).length<needCan && CANTRIPS[d.cls]){
        id("er").textContent=`Choose ${needCan} cantrips.`; return;
      }
      S.charDraft.step=6; rChar();
    };
  }

  if(step===6) {
    const saveBtn = id("step-save");
    if(saveBtn) saveBtn.onclick = async () => {
      const d=S.charDraft;
      const bgSkills = d.background ? BACKGROUNDS[d.background]?.skills||[] : [];
      const allSkills= [...new Set([...bgSkills,...(d.skills||[])])];
      const char = {
        name:d.name, race:d.race, cls:d.cls, background:d.background||"",
        backstory:d.backstory||"", stats:d.stats,
        skills:allSkills, extraProfs:d.extraProfs||[],
        equipment:d.equipment||[], gp:d.gp||0,
        cantrips:d.cantrips||[], spells:d.spells||[],
        features:CLASS_FEATURES[d.cls]||[],
        spellSlots:CLASS_SPELL_SLOTS[d.cls]||{},
      };
      const hp = calcHp(d.cls, d.stats.CON);
      // Initial sheet state
      const sheet = {
        inventory: [...(d.equipment||[])],
        spells: [...(d.cantrips||[]), ...(d.spells||[])],
        skills: allSkills,
        notes: "",
        spellSlotsUsed: {},
        action: false, bonusAction: false, reaction: false,
        concentration: "",
        gp: d.gp||0,
      };
      saveBtn.disabled=true; saveBtn.textContent="Saving...";
      const players=S.campaign.players.map(p=>p.name===S.myName?{...p,char,hp,maxHp:hp,sheet}:p);
      await patch(S.campaignId,{players});
    };
  }
}

function rLobby() {
  const camp=S.campaign;
  const allReady=camp.players.every(p=>p.char);
  q("root").innerHTML = `
    <div class="fcenter">
      <div class="card wide">
        <h2 class="ch">Campaign Lobby</h2>
        <div class="codebox">
          <div class="codelabel">Campaign Code</div>
          <div class="codevalue">${camp.id}</div>
          <div class="codehint">Share this code with your players</div>
        </div>
        <div class="roster">${camp.players.map(p=>`
          <div class="rrow ${p.char?"rdy":"wait"}">
            <div>
              <div class="rname">${esc(p.name)}</div>
              ${p.char?`<div class="rchar">${esc(p.char.name)} · ${esc(p.char.race)} ${esc(p.char.cls)}</div>`:`<div class="rwait">Forging their hero...</div>`}
            </div>
            <div class="rbadge">${p.char?"✦ Ready":"⏳"}</div>
          </div>`).join("")}
        </div>
        ${S.isCreator
          ?`<button class="btn-gold full" id="bstart" ${allReady?"":"disabled"}>${allReady?"⚔ Begin the Adventure":"Waiting for all characters to be ready..."}</button>`
          :`<div class="wait-msg">Waiting for the campaign creator to begin the adventure...</div>`}
        <div class="err" id="er"></div>
      </div>
    </div>`;
  if(S.isCreator && allReady) {
    id("bstart").onclick=async()=>{
      const btn=id("bstart"); btn.disabled=true; btn.textContent="Summoning the tale...";
      const camp=S.campaign, sys=buildSystem(camp), fp=camp.players[0].name;
      if(!serverReady){ id("er").textContent="DM server is still warming up — wait a moment and try again."; btn.disabled=false; btn.textContent="⚔ Begin the Adventure"; return; }
      try {
        const txt=await callDM(sys,[{role:"user",content:`Begin the campaign. Open with a vivid atmospheric scene that brings all ${camp.players.length} adventurers together. Establish immediate tension or a compelling hook. End by inviting ${fp} to act first.`}]);
        const msg={type:"dm",text:txt,ts:Date.now()};
        const aih=[{role:"user",content:"Begin the campaign."},{role:"assistant",content:txt}];
        await patch(camp.id,{phase:"play",messages:[msg],aiHistory:aih,turnIndex:0});
      } catch(e){id("er").textContent="Failed to reach AI: "+e.message;btn.disabled=false;btn.textContent="⚔ Begin the Adventure";}
    };
  }
}

// ── PLAY ──────────────────────────────────────────────────────────────────────
function rPlay() {
  const camp=S.campaign;
  if(!camp) return;
  const combatOrder = camp.initiativeOrder||[];
  const inCombat = camp.combat && combatOrder.length > 0;
  const combatSlot = inCombat ? combatOrder[(camp.combatTurnIdx||0)%combatOrder.length] : null;
  const isEnemyTurn = inCombat && combatSlot?.isEnemy;
  const cur = inCombat
    ? camp.players.find(p=>p.name===combatSlot?.name) || camp.players[camp.turnIndex%camp.players.length]
    : camp.players[camp.turnIndex%camp.players.length];
  const isMyTurn = isEnemyTurn ? false : (inCombat ? combatSlot?.name===S.myName : cur?.name===S.myName);

// ── SHEET EVENT HANDLERS ──────────────────────────────────────────────────────
function bindSheetEvents(camp) {
  const me = camp.players.find(p=>p.name===S.myName);
  if(!me?.char) return;

  // Toggle open/close
  const st=id("sheet-toggle");
  if(st) st.onclick=()=>{ S.sheetOpen=!S.sheetOpen; rPlay(); };

  // Tab switching
  qall(".stab").forEach(btn=>btn.onclick=()=>{ S.sheetTab=btn.dataset.tab; rPlay(); });

  // Action checkboxes
  ["action","bonus","reaction"].forEach(key=>{
    const cb=id(`chk-${key}`);
    if(cb) cb.onchange=async()=>{
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const field=key==="action"?"action":key==="bonus"?"bonusAction":"reaction";
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,[field]:cb.checked}}:p);
      await patch(S.campaignId,{players});
    };
  });

  // Rest button — reset actions + spell slots
  const rb=id("btn-rest");
  if(rb) rb.onclick=async()=>{
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,action:false,bonusAction:false,reaction:false,spellSlotsUsed:{},concentration:""}}:p);
    await patch(S.campaignId,{players});
  };

  // Use spell slot
  qall(".slot-use-btn").forEach(btn=>btn.onclick=async()=>{
    const lvl=btn.dataset.lvl;
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const used={...( sheet.spellSlotsUsed||{})};
    const total=(me.char.spellSlots||{})[lvl]||0;
    if((used[lvl]||0)>=total) return;
    used[lvl]=(used[lvl]||0)+1;
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,spellSlotsUsed:used}}:p);
    await patch(S.campaignId,{players});
  });

  // Regain spell slot
  qall(".slot-reg-btn").forEach(btn=>btn.onclick=async()=>{
    const lvl=btn.dataset.lvl;
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const used={...(sheet.spellSlotsUsed||{})};
    if(!used[lvl]||used[lvl]<1) return;
    used[lvl]=used[lvl]-1;
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,spellSlotsUsed:used}}:p);
    await patch(S.campaignId,{players});
  });

  // Concentration
  const ci=id("conc-inp");
  if(ci) {
    ci.oninput=e=>{};
    ci.onblur=async()=>{
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,concentration:ci.value}}:p);
      await patch(S.campaignId,{players});
    };
  }

  // Add item/spell/skill
  qall(".sheet-add-btn").forEach(btn=>{
    btn.onclick=async()=>{
      const type=btn.dataset.type;
      const inpId=type==="inventory"?"inv-inp":type==="spells"?"spell-inp":"skill-inp";
      const val=id(inpId)?.value.trim();
      if(!val) return;
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const arr=[...(sheet[type]||[]),val];
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,[type]:arr}}:p);
      await patch(S.campaignId,{players});
    };
  });

  // Enter key on add inputs
  ["inv-inp","spell-inp","skill-inp"].forEach(inpId=>{
    const inp=id(inpId);
    if(inp) inp.onkeydown=e=>{ if(e.key==="Enter"){e.preventDefault(); inp.nextElementSibling?.click();} };
  });

  // Equip/unequip toggle
  qall(".equip-btn").forEach(btn=>{
    btn.onclick=async()=>{
      const i=parseInt(btn.dataset.i);
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const equipped=[...(sheet.equipped||[])];
      const idx=equipped.indexOf(i);
      if(idx>-1) equipped.splice(idx,1);
      else equipped.push(i);
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,equipped}}:p);
      await patch(S.campaignId,{players});
    };
  });

  // Delete item
  qall(".del-btn").forEach(btn=>{
    btn.onclick=async()=>{
      const type=btn.dataset.type, i=parseInt(btn.dataset.i);
      const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
      const sheet=me.sheet||{};
      const arr=[...(sheet[type]||[])];
      arr.splice(i,1);
      // If deleting from inventory, fix equipped indices
      let equipped=sheet.equipped||[];
      if(type==="inventory"){
        equipped=equipped.filter(e=>e!==i).map(e=>e>i?e-1:e);
      }
      const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,[type]:arr,equipped}}:p);
      await patch(S.campaignId,{players});
    };
  });

  // Gold save
  const gs=id("gp-save");
  if(gs) gs.onclick=async()=>{
    const val=parseInt(id("gp-sm")?.value)||0;
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,gp:val}}:p);
    await patch(S.campaignId,{players});
  };

  // Save notes
  const ns=id("notes-save");
  if(ns) ns.onclick=async()=>{
    const val=id("notes-ta")?.value||"";
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);
    const sheet=me.sheet||{};
    const players=camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,notes:val}}:p);
    await patch(S.campaignId,{players});
    ns.textContent="Saved ✓";
    setTimeout(()=>{ if(id("notes-save")) id("notes-save").textContent="Save Notes"; },1500);
  };
}


function msgHtml(m) {
  if(m.type==="dm") {
    const isErr = m.text && m.text.startsWith("(The DM");
    return `<div class="mdm"><div class="mlbl">⚔ Dungeon Master</div>${esc(m.text)}${isErr ? `<button class="btn-retry" data-ts="${m.ts||''}">↺ Retry</button>` : ""}</div>`;
  }
  if(m.type==="player") return `<div class="mpl"><div class="mlbl">↳ ${esc(m.who)}</div>${esc(m.text)}</div>`;
  if(m.type==="roll")   return `<div class="mroll">🎲 ${esc(m.text)}</div>`;
  if(m.type==="xp")     return `<div class="msg-xp">✦ ${esc(m.text)}</div>`;
  if(m.type==="hp")     return `<div class="msg-hp ${m.text&&m.text.includes('UNCONSCIOUS')?"msg-hp-dead":""}">❤ ${esc(m.text)}</div>`;
  if(m.type==="initiative") return `<div class="msg-init">⚔ ${esc(m.text)}</div>`;
  if(m.type==="condition")  return `<div class="msg-cond">${esc(m.text)}</div>`;
  return "";
}

// ── CONDITIONS ────────────────────────────────────────────────────────────────
const TURN_SKIP_CONDITIONS = ["Unconscious","Asleep","Paralyzed","Stunned","Petrified"];
const CONDITION_ICONS = {
  Unconscious:"💀", Asleep:"😴", Paralyzed:"🔒", Stunned:"⭐", Petrified:"🗿",
  Frightened:"😨", Poisoned:"☠", Prone:"⬇", Blinded:"👁", Deafened:"👂",
  Restrained:"⛓", Exhausted:"😓"
};

function applyConditions(players, initiativeOrder, conditions) {
  let updatedPlayers = [...players];
  let updatedOrder = [...(initiativeOrder||[])];
  const condMsgs = [];

  (conditions||[]).forEach(c => {
    const name = c.name;
    const cond = c.condition;
    const active = c.active !== false;

    // Apply to player
    updatedPlayers = updatedPlayers.map(p => {
      if(p.name.toLowerCase() !== name.toLowerCase()) return p;
      const current = [...(p.conditions||[])];
      const idx = current.indexOf(cond);
      if(active && idx===-1) current.push(cond);
      if(!active && idx>-1) current.splice(idx,1);
      condMsgs.push({
        type:"condition",
        text:`${p.char?.name||p.name} is ${active?"now "+cond:"no longer "+cond} ${CONDITION_ICONS[cond]||""}`,
        ts: Date.now()+condMsgs.length
      });
      return {...p, conditions:current};
    });

    // Apply to enemy in initiative order
    updatedOrder = updatedOrder.map(e => {
      if(!e.isEnemy || e.name.toLowerCase()!==name.toLowerCase()) return e;
      const current = [...(e.conditions||[])];
      const idx = current.indexOf(cond);
      if(active && idx===-1) current.push(cond);
      if(!active && idx>-1) current.splice(idx,1);
      if(!condMsgs.find(m=>m.text.includes(e.name))) {
        condMsgs.push({
          type:"condition",
          text:`${e.name} is ${active?"now "+cond:"no longer "+cond} ${CONDITION_ICONS[cond]||""}`,
          ts: Date.now()+condMsgs.length
        });
      }
      return {...e, conditions:current};
    });
  });

  return { updatedPlayers, updatedOrder, condMsgs };
}

function shouldSkipTurn(entity) {
  const conds = entity.conditions||[];
  if(entity.hp !== undefined && entity.hp <= 0) return true;
  return conds.some(c => TURN_SKIP_CONDITIONS.includes(c));
}

function nextActiveCombatSlot(order, currentIdx) {
  if(!order || order.length===0) return 0;
  let next = (currentIdx+1) % order.length;
  let attempts = 0;
  while(shouldSkipTurn(order[next]) && attempts < order.length) {
    next = (next+1) % order.length;
    attempts++;
  }
  return next;
}


// ── DEATH SAVES / ADVANTAGE / CONCENTRATION ──────────────────────────────────
function getDeathSaveState(player) {
  const conds = player.conditions||[];
  const successes = conds.filter(c=>c==="DeathSuccess").length;
  const failures  = conds.filter(c=>c==="DeathFail").length;
  return { successes, failures, stable: successes>=3, dead: failures>=3 };
}

async function resolveDeathSave(roll) {
  const camp = S.campaign;
  const me = camp.players.find(p=>p.name===S.myName);
  if(!me) return;
  const ds = getDeathSaveState(me);
  let conds = [...(me.conditions||[])];
  const msgs = [];

  if(roll===20) {
    // Nat 20 — regain 1 HP, remove Unconscious
    conds = conds.filter(c=>c!=="Unconscious"&&c!=="DeathSuccess"&&c!=="DeathFail");
    const players = camp.players.map(p=>p.name===S.myName?{...p,hp:1,conditions:conds}:p);
    msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls a 20 on their death save — they regain consciousness with 1 HP! 🌟`,ts:Date.now()});
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
  } else if(roll===1) {
    // Nat 1 — 2 failures
    conds.push("DeathFail","DeathFail");
    const newDs = getDeathSaveState({conditions:conds});
    if(newDs.dead) {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls a 1 — two failures! They have died. ☠️`,ts:Date.now()});
      conds.push("Dead");
    } else {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls a 1 — two death save failures (${newDs.failures}/3).`,ts:Date.now()});
    }
    const players = camp.players.map(p=>p.name===S.myName?{...p,conditions:conds}:p);
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
  } else if(roll>=10) {
    // Success
    conds.push("DeathSuccess");
    const newDs = getDeathSaveState({conditions:conds});
    if(newDs.stable) {
      conds = conds.filter(c=>c!=="DeathSuccess"&&c!=="DeathFail");
      conds.push("Stable");
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} — 3 successes! They are stable. 💚`,ts:Date.now()});
    } else {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} — death save success (${newDs.successes}/3).`,ts:Date.now()});
    }
    const players = camp.players.map(p=>p.name===S.myName?{...p,conditions:conds}:p);
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
  } else {
    // Failure
    conds.push("DeathFail");
    const newDs = getDeathSaveState({conditions:conds});
    if(newDs.dead) {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} — 3 failures. They have died. ☠️`,ts:Date.now()});
      conds.push("Dead");
    } else {
      msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} — death save failure (${newDs.failures}/3).`,ts:Date.now()});
    }
    const players = camp.players.map(p=>p.name===S.myName?{...p,conditions:conds}:p);
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
  }

  S.pendingDeathSave=false;
  // Advance combat turn
  const updatedCamp = await (async()=>{ const s=await (await fetch).call(null); })().catch(()=>S.campaign);
  const order = camp.initiativeOrder||[];
  if(order.length>0) await patch(S.campaignId,{combatTurnIdx:nextActiveCombatSlot(order,camp.combatTurnIdx||0)});
}

async function resolveConCheck(roll, dc) {
  const camp = S.campaign;
  const me = camp.players.find(p=>p.name===S.myName);
  if(!me) return;
  const msgs = [];
  if(roll >= dc) {
    msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} for CON save (DC ${dc}) — concentration maintained! ✓`,ts:Date.now()});
  } else {
    const sheet = me.sheet||{};
    const players = camp.players.map(p=>p.name===S.myName?{...p,sheet:{...sheet,concentration:""}}:p);
    msgs.push({type:"condition",text:`${me.char?.name||me.name} rolls ${roll} for CON save (DC ${dc}) — concentration broken! The spell ends.`,ts:Date.now()});
    await patch(S.campaignId,{players,messages:[...camp.messages,...msgs]});
    S.pendingConCheck=null;
    return;
  }
  await patch(S.campaignId,{messages:[...camp.messages,...msgs]});
  S.pendingConCheck=null;
}


// ── INITIATIVE HELPERS ────────────────────────────────────────────────────────
function rollInitiative(dexMod) {
  return rollD(20) + dexMod;
}

function buildInitiativeOrder(players, enemyInitiatives) {
  const entries = [];
  // Player entries
  players.forEach(p => {
    if(!p.char) return;
    const dexMod = mod(p.char.stats.DEX);
    const roll = rollInitiative(dexMod);
    entries.push({
      name: p.name,
      charName: p.char.name,
      initiative: roll,
      isEnemy: false,
      hp: p.hp,
      maxHp: p.maxHp,
    });
  });
  // Enemy entries
  (enemyInitiatives||[]).forEach(e => {
    entries.push({
      name: e.name,
      charName: e.name,
      initiative: e.initiative,
      isEnemy: true,
      hp: e.hp || 10,
      maxHp: e.maxHp || e.hp || 10,
    });
  });
  // Sort highest to lowest, ties broken randomly
  entries.sort((a,b) => b.initiative - a.initiative || Math.random()-0.5);
  return entries;
}

function advanceCombatTurn(order, currentIdx) {
  return (currentIdx + 1) % order.length;
}


function detectSpellUse(action, knownSpells) {
  if(!knownSpells || !knownSpells.length) return null;
  const lower = action.toLowerCase();
  return knownSpells.find(s => lower.includes(s.toLowerCase())) || null;
}

function detectUnknownSpell(action, knownSpells) {
  // Check if action mentions any spell from the full spell database that player doesn't know
  const lower = action.toLowerCase();
  const allSpells = Object.values(SPELLS_BY_LEVEL).flatMap(cls =>
    Object.values(cls).flat()
  );
  const mentioned = allSpells.find(s => lower.includes(s.toLowerCase()));
  if(!mentioned) return null;
  // If it's mentioned but not in known spells, it's unknown
  const known = (knownSpells||[]).map(s=>s.toLowerCase());
  if(!known.includes(mentioned.toLowerCase())) return mentioned;
  return null;
}

async function submitAction(confirmedSlot, useBonusAction=false) {
  if(S.submitting) return;
  const action=S.inputText.trim(); if(!action) return;

  const camp=S.campaign;
  const me=camp.players.find(p=>p.name===S.myName);
  const sheet=me?.sheet||{};
  const char=me?.char||{};

  // App-layer spell enforcement warning
  if(confirmedSlot===undefined) {
    const unknownSpell = detectUnknownSpell(action, sheet.spells||[]);
    if(unknownSpell && !S.spellWarningDismissed) {
      S.spellWarningDismissed = false;
      // Show warning — user can still proceed
      if(!window.__spellWarnShown) {
        window.__spellWarnShown = true;
        const proceed = confirm(`"${unknownSpell}" isn't in ${char.name||S.myName}'s known spells. The DM will rule this fails. Declare anyway?`);
        window.__spellWarnShown = false;
        if(!proceed) { S.submitting=false; return; }
      }
    }
  }

  // Spell slot detection — if a spell is detected and no slot confirmed yet, show popup
  if(confirmedSlot===undefined) {
    const detectedSpell = detectSpellUse(action, sheet.spells||[]);
    const slots = char.spellSlots||{};
    const usedSlots = sheet.spellSlotsUsed||{};
    const availLevels = Object.entries(slots).filter(([l,t])=>(usedSlots[l]||0)<t).map(([l])=>l);
    const isCantripOrNoSlots = !detectedSpell || !availLevels.length ||
      (char.cantrips||[]).map(c=>c.toLowerCase()).some(c=>action.toLowerCase().includes(c));

    if(detectedSpell && !isCantripOrNoSlots) {
      // Show slot selection popup
      S.pendingSpell = { spell: detectedSpell, availLevels, useBonusAction };
      rPlay();
      return;
    }
  }

  S.inputText=""; S.submitting=true;
  S.pendingSpell=null;

  // Auto-mark action used + bonus action if used + spell slot if confirmed
  let newSheet = { ...sheet, action: true, bonusAction: useBonusAction ? true : sheet.bonusAction };
  if(confirmedSlot !== undefined && confirmedSlot !== null) {
    const used = { ...(sheet.spellSlotsUsed||{}) };
    used[confirmedSlot] = (used[confirmedSlot]||0)+1;
    newSheet.spellSlotsUsed = used;
  }

  // Reset next player's actions
  const nextIdx = (camp.turnIndex+1)%camp.players.length;
  const players = camp.players.map((p,i) => {
    if(p.name===S.myName) return {...p, sheet:newSheet};
    if(i===nextIdx) return {...p, sheet:{...(p.sheet||{}), action:false, bonusAction:false, reaction:false}};
    return p;
  });

  rPlay();

  const pm={type:"player",text:action,who:S.myName,ts:Date.now()};
  const nm=[...camp.messages,pm];
  const ue={role:"user",content:`${S.myName}: ${action}`};
  const nh=[...(camp.aiHistory||[]),ue];
  await patch(S.campaignId,{messages:nm,aiHistory:nh,players});
  try {
    const result=await callDM(buildSystem({...camp,players}),nh);
    const dm={type:"dm",text:result.text,ts:Date.now()};
    const ni=nextIdx;

    // Apply HP changes first
    let updatedPlayers = [...players];
    const hpMessages = [];
    if(result.hpChanges && result.hpChanges.length>0) {
      result.hpChanges.forEach(change => {
        updatedPlayers = updatedPlayers.map(p => {
          if(p.name.toLowerCase()!==change.name.toLowerCase()) return p;
          const oldHp = p.hp||0;
          const newHp = Math.max(0, Math.min(p.maxHp||oldHp, oldHp + change.delta));
          const deltaStr = change.delta>0 ? `+${change.delta}` : `${change.delta}`;
          const status = newHp===0 ? " — UNCONSCIOUS" : "";
          hpMessages.push({
            type:"hp",
            text:`${p.char?.name||p.name} ${change.delta>0?"heals":"takes"} ${Math.abs(change.delta)} ${change.delta>0?"HP":"damage"} (${change.reason}) — ${newHp}/${p.maxHp||oldHp} HP${status}`,
            ts:Date.now()+(hpMessages.length)
          });
          return {...p, hp:newHp};
        });
      });
    }

    // Award XP
    if(result.xpAward>0) {
      updatedPlayers = updatedPlayers.map(p => {
        const newXp = (p.xp||0)+result.xpAward;
        const oldLevel = xpToLevel(p.xp||0);
        const newLevel = xpToLevel(newXp);
        if(newLevel>oldLevel) {
          const newMaxHp = (CLASS_HP[p.char?.cls]||8)*newLevel + mod(p.char?.stats?.CON||10)*newLevel;
          const newSlots = (SPELL_SLOTS_BY_LEVEL[p.char?.cls]||[])[newLevel-1]||{};
          return {...p, xp:newXp, level:newLevel, maxHp:newMaxHp, hp:Math.min(p.hp||0,newMaxHp),
            char:{...p.char, spellSlots:newSlots}, levelUpPending:true};
        }
        return {...p, xp:newXp};
      });
    }

    // Build final message list
    const extraMsgs = [];
    if(hpMessages.length>0) extraMsgs.push(...hpMessages);
    if(result.xpAward>0) extraMsgs.push({type:"xp",text:`+${result.xpAward} XP — ${result.xpReason}`,ts:Date.now()+100});

    // Handle initiative start
    let combatUpdate = {};
    const initMsgs = [];

    if(result.initiativeStart && result.enemyInitiatives) {
      const order = buildInitiativeOrder(updatedPlayers, result.enemyInitiatives);
      combatUpdate = { combat: true, initiativeOrder: order, combatTurnIdx: 0 };
      // Log initiative rolls
      order.forEach(e => {
        initMsgs.push({
          type:"initiative",
          text:`${e.charName||e.name} rolls initiative: ${e.initiative}${e.isEnemy?" (enemy)":""}`,
          ts: Date.now() + initMsgs.length
        });
      });
      initMsgs.push({
        type:"initiative",
        text:`⚔ COMBAT BEGINS — Turn order: ${order.map(e=>e.charName||e.name).join(" → ")}`,
        ts: Date.now() + initMsgs.length + 1
      });
    } else if(camp.combat && result.enemyHp) {
      // Update enemy HP in initiative order
      const updatedOrder = (camp.initiativeOrder||[]).map(e => {
        if(!e.isEnemy) return e;
        const update = result.enemyHp.find(h=>h.name.toLowerCase()===e.name.toLowerCase());
        if(update) return {...e, hp:update.hp, maxHp:update.maxHp||e.maxHp};
        return e;
      });
      // Remove dead enemies (hp <= 0)
      const livingOrder = updatedOrder.filter(e => !e.isEnemy || e.hp > 0);
      const nextTurnIdx = camp.combatTurnIdx % Math.max(1, livingOrder.length);
      combatUpdate = { initiativeOrder: livingOrder, combatTurnIdx: nextActiveCombatSlot(livingOrder, nextTurnIdx) };
    } else if(camp.combat && !result.combatEnd) {
      // Advance combat turn, skipping incapacitated slots
      const order = camp.initiativeOrder||[];
      combatUpdate = { combatTurnIdx: nextActiveCombatSlot(order, camp.combatTurnIdx||0) };
    }

    if(result.combatEnd) {
      combatUpdate = { combat: false, initiativeOrder: [], combatTurnIdx: 0 };
      initMsgs.push({ type:"initiative", text:"⚔ COMBAT ENDS — returning to exploration.", ts:Date.now() });
    }

    // Set advantage/disadvantage for next roll
    if(result.rollMod && result.rollMod.target) {
      const targetPlayer = updatedPlayers.find(p=>p.name===result.rollMod.target);
      if(targetPlayer) S.pendingAdvantage = result.rollMod;
    }

    // Set concentration check if needed
    if(result.concCheck) {
      const targetPlayer = updatedPlayers.find(p=>p.name===result.concCheck.name);
      if(targetPlayer && (targetPlayer.sheet?.concentration||"").length>0) {
        const dc = Math.max(10, Math.floor(result.concCheck.damage/2));
        S.pendingConCheck = { dc, damage:result.concCheck.damage, name:result.concCheck.name };
      }
    }

    // Apply conditions
    let condMsgs = [];
    if(result.conditions && result.conditions.length > 0) {
      const condResult = applyConditions(
        updatedPlayers,
        combatUpdate.initiativeOrder || camp.initiativeOrder || [],
        result.conditions
      );
      updatedPlayers = condResult.updatedPlayers;
      if(combatUpdate.initiativeOrder) combatUpdate.initiativeOrder = condResult.updatedOrder;
      else if(camp.combat) combatUpdate.initiativeOrder = condResult.updatedOrder;
      condMsgs = condResult.condMsgs;

      // Re-check if current combat slot should now be skipped after conditions applied
      if(camp.combat && combatUpdate.initiativeOrder) {
        const curIdx = combatUpdate.combatTurnIdx ?? camp.combatTurnIdx ?? 0;
        const curSlot = combatUpdate.initiativeOrder[curIdx % combatUpdate.initiativeOrder.length];
        if(curSlot && shouldSkipTurn(curSlot)) {
          combatUpdate.combatTurnIdx = nextActiveCombatSlot(combatUpdate.initiativeOrder, curIdx);
        }
      }
    }

    // Also auto-knock-unconscious players at 0 HP
    updatedPlayers = updatedPlayers.map(p => {
      if((p.hp||0) <= 0 && !(p.conditions||[]).includes("Unconscious")) {
        condMsgs.push({ type:"condition", text:`${p.char?.name||p.name} falls unconscious! 💀`, ts:Date.now()+condMsgs.length });
        return {...p, conditions:[...(p.conditions||[]), "Unconscious"]};
      }
      if((p.hp||0) > 0 && (p.conditions||[]).includes("Unconscious")) {
        condMsgs.push({ type:"condition", text:`${p.char?.name||p.name} regains consciousness!`, ts:Date.now()+condMsgs.length });
        return {...p, conditions:(p.conditions||[]).filter(c=>c!=="Unconscious")};
      }
      return p;
    });

    await patch(S.campaignId,{
      messages:[...nm,dm,...extraMsgs,...initMsgs,...condMsgs],
      aiHistory:[...nh,{role:"assistant",content:result.text}],
      turnIndex:ni,
      players:updatedPlayers,
      ...combatUpdate
    });
  } catch(e) {
    await patch(S.campaignId,{messages:[...nm,{type:"dm",text:"(The DM's voice fades... connection lost. Try again.)",ts:Date.now()}]});
  }
  S.submitting=false;
}

const id   = i => document.getElementById(i);
const q    = i => document.getElementById(i);
const qall = s => document.querySelectorAll(s);

warmupServer();
tryAutoRejoin();
</script>
