// New spells gained when leveling up
function getNewSpellsOnLevelUp(cls, newLevel) {
  const table = SPELLS_KNOWN_TABLE[cls];
  if(!table) return 0; // prepared caster or non-caster
  const prev = table[newLevel-1]||0;
  const curr = table[newLevel]||0;
  return Math.max(0, curr-prev);
}

// Get all spells available to a class at or below a given spell level
function getSpellsForClassLevel(cls, maxSpellLevel) {
  const lists = SPELLS_BY_LEVEL[cls]||{};
  const result = [];
  for(let i=1; i<=maxSpellLevel; i++) {
    result.push(...(lists[i]||[]));
  }
  return result;
}

// Get max spell level a class can cast at character level
function maxSpellLevelForCharLevel(cls, charLevel) {
  const slots = SPELL_SLOTS_FULL[cls]?.[charLevel]||{};
  const levels = Object.keys(slots).map(Number);
  return levels.length ? Math.max(...levels) : 0;
}

function getWeaponActions(inventory, equipped, stats, cls) {
  const actions = [];
  const profBonus = 2;

  // Only use equipped items (or all if nothing equipped yet)
  const equippedItems = (equipped||[]).length > 0
    ? (inventory||[]).filter((_,i) => (equipped||[]).includes(i))
    : (inventory||[]);  // fallback: show all weapons if nothing equipped

  equippedItems.forEach(item => {
    const lower = item.toLowerCase().replace(/\s*\(.*?\)/g,"").trim();
    const key = Object.keys(WEAPON_DAMAGE).find(w => lower.includes(w));
    if(key) {
      const w = WEAPON_DAMAGE[key];
      const abilityMod = w.ability.includes("DEX") && w.ability.includes("STR")
        ? Math.max(mod(stats.STR), mod(stats.DEX))
        : w.ability.includes("DEX") ? mod(stats.DEX)
        : w.ability.includes("WIS") ? mod(stats.WIS)
        : mod(stats.STR);
      const hitBonus = abilityMod + profBonus;
      const dmgBonus = abilityMod;
      actions.push({
        name: key.charAt(0).toUpperCase()+key.slice(1),
        type: "action",
        hit: hitBonus>=0?`+${hitBonus}`:`${hitBonus}`,
        dmg: w.dmg+(dmgBonus>=0?"+"+dmgBonus:""+dmgBonus),
        dmgType: w.type,
        prop: w.prop,
      });
    }
  });

  // Unarmed strike — Monks use Martial Arts die (d4 at level 1) and can use DEX
  const strMod = mod(stats.STR);
  const dexMod = mod(stats.DEX);
  const isMonk = cls === "Monk";
  const unarmedMod = isMonk ? Math.max(strMod, dexMod) : strMod;
  const unarmedDmg = isMonk ? "1d4" : "1";
  actions.push({
    name: isMonk ? "Martial Arts Strike" : "Unarmed Strike",
    type:"action",
    hit: unarmedMod+profBonus>=0?`+${unarmedMod+profBonus}`:`${unarmedMod+profBonus}`,
    dmg:unarmedDmg+(unarmedMod>=0?"+"+unarmedMod:""+unarmedMod),
    dmgType:"bludgeoning",
    prop: isMonk ? "finesse, Martial Arts" : "",
  });

  return actions;
}

// ── DM RESULT PROCESSING ─────────────────────────────────────────────────────
function processDMResult(result, camp) {
  const players = camp.players;
  const ni = (camp.turnIndex + 1) % camp.players.length;
  const dm = {type:"dm",text:result.text,ts:Date.now()};

  let updatedPlayers = [...players];
  const hpMessages = [];
  if(result.hpChanges && result.hpChanges.length>0) {
    result.hpChanges.forEach(change => {
      updatedPlayers = updatedPlayers.map(p => {
        if(p.name.toLowerCase()!==change.name.toLowerCase()) return p;
        const oldHp = p.hp||0;
        const newHp = Math.max(0, Math.min(p.maxHp||oldHp, oldHp + change.delta));
        const deltaStr = change.delta>0 ? `+${change.delta}` : `${change.delta}`;
        const status = newHp===0 ? " — UNCONSCIOUS" : "";
        hpMessages.push({
          type:"hp",
          text:`${p.char?.name||p.name} ${change.delta>0?"heals":"takes"} ${Math.abs(change.delta)} ${change.delta>0?"HP":"damage"} (${change.reason}) — ${newHp}/${p.maxHp||oldHp} HP${status}`,
          ts:Date.now()+(hpMessages.length)
        });
        return {...p, hp:newHp};
      });
    });
  }

  if(result.xpAward>0) {
    updatedPlayers = updatedPlayers.map(p => {
      const newXp = (p.xp||0)+result.xpAward;
      const oldLevel = xpToLevel(p.xp||0);
      const newLevel = xpToLevel(newXp);
      if(newLevel>oldLevel) {
        const newMaxHp = (CLASS_HP[p.char?.cls]||8)*newLevel + mod(p.char?.stats?.CON||10)*newLevel;
        const newSlots = (SPELL_SLOTS_BY_LEVEL[p.char?.cls]||[])[newLevel-1]||{};
        return {...p, xp:newXp, level:newLevel, maxHp:newMaxHp, hp:Math.min(p.hp||0,newMaxHp),
          char:{...p.char, spellSlots:newSlots}, levelUpPending:true};
      }
      return {...p, xp:newXp};
    });
  }

  const extraMsgs = [];
  if(hpMessages.length>0) extraMsgs.push(...hpMessages);
  if(result.xpAward>0) extraMsgs.push({type:"xp",text:`+${result.xpAward} XP — ${result.xpReason}`,ts:Date.now()+100});

  let combatUpdate = {};
  const initMsgs = [];

  if(result.initiativeStart && result.enemyInitiatives) {
    const order = buildInitiativeOrder(updatedPlayers, result.enemyInitiatives);
    combatUpdate = { combat: true, initiativeOrder: order, combatTurnIdx: 0 };
    initMsgs.push({
      type:"initiative",
      text:`⚔ INITIATIVE — Everyone rolls for combat order!`,
      ts: Date.now()
    });
    order.forEach((e, i) => {
      let rollText;
      if(e.isEnemy) {
        rollText = `${e.name} → ${e.initiative} (enemy)`;
      } else {
        const modStr = e.dexMod >= 0 ? `+${e.dexMod}` : `${e.dexMod}`;
        rollText = `${e.charName} rolls d20: ${e.d20roll} ${modStr} DEX = ${e.initiative}`;
      }
      initMsgs.push({
        type:"initiative",
        text: rollText,
        ts: Date.now() + i + 1
      });
    });
    initMsgs.push({
      type:"initiative",
      text:`⚔ COMBAT BEGINS — Turn order: ${order.map(e=>e.charName||e.name).join(" → ")}`,
      ts: Date.now() + order.length + 2
    });
  } else if(camp.combat && result.enemyHp) {
    const updatedOrder = (camp.initiativeOrder||[]).map(e => {
      if(!e.isEnemy) return e;
      const update = result.enemyHp.find(h=>h.name.toLowerCase()===e.name.toLowerCase());
      if(update) return {...e, hp:update.hp, maxHp:update.maxHp||e.maxHp};
      return e;
    });
    const livingOrder = updatedOrder.filter(e => !e.isEnemy || e.hp > 0);
    const nextTurnIdx = camp.combatTurnIdx % Math.max(1, livingOrder.length);
    combatUpdate = { initiativeOrder: livingOrder, combatTurnIdx: nextActiveCombatSlot(livingOrder, nextTurnIdx) };
  } else if(camp.combat && !result.combatEnd) {
    const order = camp.initiativeOrder||[];
    combatUpdate = { combatTurnIdx: nextActiveCombatSlot(order, camp.combatTurnIdx||0) };
  }

  if(result.combatEnd) {
    combatUpdate = { combat: false, initiativeOrder: [], combatTurnIdx: 0 };
    initMsgs.push({ type:"initiative", text:"⚔ COMBAT ENDS — returning to exploration.", ts:Date.now() });
  }

  if(result.rollMod && result.rollMod.target) {
    const targetPlayer = updatedPlayers.find(p=>p.name===result.rollMod.target);
    if(targetPlayer) S.pendingAdvantage = result.rollMod;
  }

  if(result.concCheck) {
    const targetPlayer = updatedPlayers.find(p=>p.name===result.concCheck.name);
    if(targetPlayer && (targetPlayer.sheet?.concentration||"").length>0) {
      const dc = Math.max(10, Math.floor(result.concCheck.damage/2));
      S.pendingConCheck = { dc, damage:result.concCheck.damage, name:result.concCheck.name };
    }
  }

  let condMsgs = [];
  if(result.conditions && result.conditions.length > 0) {
    const condResult = applyConditions(
      updatedPlayers,
      combatUpdate.initiativeOrder || camp.initiativeOrder || [],
      result.conditions
    );
    updatedPlayers = condResult.updatedPlayers;
    if(combatUpdate.initiativeOrder) combatUpdate.initiativeOrder = condResult.updatedOrder;
    else if(camp.combat) combatUpdate.initiativeOrder = condResult.updatedOrder;
    condMsgs = condResult.condMsgs;

    if(camp.combat && combatUpdate.initiativeOrder) {
      const curIdx = combatUpdate.combatTurnIdx ?? camp.combatTurnIdx ?? 0;
      const curSlot = combatUpdate.initiativeOrder[curIdx % combatUpdate.initiativeOrder.length];
      if(curSlot && shouldSkipTurn(curSlot)) {
        combatUpdate.combatTurnIdx = nextActiveCombatSlot(combatUpdate.initiativeOrder, curIdx);
      }
    }
  }

  updatedPlayers = updatedPlayers.map(p => {
    if((p.hp||0) <= 0 && !(p.conditions||[]).includes("Unconscious")) {
      condMsgs.push({ type:"condition", text:`${p.char?.name||p.name} falls unconscious! 💀`, ts:Date.now()+condMsgs.length });
      return {...p, conditions:[...(p.conditions||[]), "Unconscious"]};
    }
    if((p.hp||0) > 0 && (p.conditions||[]).includes("Unconscious")) {
      condMsgs.push({ type:"condition", text:`${p.char?.name||p.name} regains consciousness!`, ts:Date.now()+condMsgs.length });
      return {...p, conditions:(p.conditions||[]).filter(c=>c!=="Unconscious")};
    }
    return p;
  });

  const effectiveNi = result.holdTurn ? camp.turnIndex : ni;
  if(result.holdTurn && camp.combat) {
    combatUpdate = { ...combatUpdate, combatTurnIdx: camp.combatTurnIdx };
  }
  const holdMsg = result.holdTurn
    ? [{ type:"hold", text:`⏳ Waiting for ${camp.players[camp.turnIndex % camp.players.length].name} to roll...`, ts:Date.now()+999 }]
    : [];

  return {
    messages: [...camp.messages, dm, ...extraMsgs, ...initMsgs, ...condMsgs, ...holdMsg],
    aiHistory: [...(camp.aiHistory||[]), {role:"assistant",content:result.text}],
    turnIndex: effectiveNi,
    holdTurn: result.holdTurn||false,
    players: updatedPlayers,
    ...combatUpdate
  };
}

function subscribe(id, cb) {

}

function stripUndefined(obj) {
  if(Array.isArray(obj)) return obj.map(stripUndefined);
  if(obj && typeof obj === 'object') {
    return Object.fromEntries(
      Object.entries(obj)
        .filter(([,v]) => v !== undefined)
        .map(([k,v]) => [k, stripUndefined(v)])
    );
  }
  return obj;
}
const patch = (id, data) => updateDoc(cref(id), stripUndefined(data));

// ── AI ───────────────────────────────────────────────────────────────────────
function buildSystem(camp) {
  const chars = camp.players.map(p => {
    if(!p.char) return `${p.name}: no character yet`;
    const c = p.char;
    const sheet = p.sheet || {};
    const slots = c.spellSlots || {};
    const usedSlots = sheet.spellSlotsUsed || {};
    const availSlots = Object.entries(slots).map(([l,t])=>`Lv${l}:${t-(usedSlots[l]||0)}/${t}`).join(" ");
    const spellList = (sheet.spells||[]).slice(0,8).join(", ");
    const inv = (sheet.inventory||[]).slice(0,6).join(", ");
    // Calculate all modifiers explicitly for Claude
    const s = c.stats;
    const pb = p.level >= 5 ? 3 : 2; // proficiency bonus
    const strMod=mod(s.STR), dexMod=mod(s.DEX), conMod=mod(s.CON);
    const intMod=mod(s.INT), wisMod=mod(s.WIS), chaMod=mod(s.CHA);
    // Attack modifiers by class
    const attackStat = ["Fighter","Barbarian","Paladin","Ranger","Monk"].includes(c.cls)
      ? Math.max(strMod, dexMod) : ["Wizard","Sorcerer"].includes(c.cls) ? intMod
      : ["Cleric","Druid"].includes(c.cls) ? wisMod
      : ["Warlock","Bard"].includes(c.cls) ? chaMod : strMod;
    const attackBonus = attackStat + pb;
    const spellBonus = ["Wizard","Sorcerer"].includes(c.cls) ? intMod+pb
      : ["Cleric","Druid"].includes(c.cls) ? wisMod+pb
      : ["Warlock","Bard","Paladin"].includes(c.cls) ? chaMod+pb
      : ["Ranger"].includes(c.cls) ? wisMod+pb : null;
    // Skill modifiers (proficient skills get +pb)
    const profSkills = c.skills||[];
    const skillMods = {
      "Athletics": strMod + (profSkills.includes("Athletics")?pb:0),
      "Acrobatics": dexMod + (profSkills.includes("Acrobatics")?pb:0),
      "Stealth": dexMod + (profSkills.includes("Stealth")?pb:0),
      "Perception": wisMod + (profSkills.includes("Perception")?pb:0),
      "Insight": wisMod + (profSkills.includes("Insight")?pb:0),
      "Persuasion": chaMod + (profSkills.includes("Persuasion")?pb:0),
      "Deception": chaMod + (profSkills.includes("Deception")?pb:0),
      "Intimidation": chaMod + (profSkills.includes("Intimidation")?pb:0),
      "Investigation": intMod + (profSkills.includes("Investigation")?pb:0),
      "Arcana": intMod + (profSkills.includes("Arcana")?pb:0),
      "History": intMod + (profSkills.includes("History")?pb:0),
      "Survival": wisMod + (profSkills.includes("Survival")?pb:0),
      "Medicine": wisMod + (profSkills.includes("Medicine")?pb:0),
    };
    const keySkills = Object.entries(skillMods).filter(([k,v])=>v!==0).map(([k,v])=>`${k}:${v>=0?"+"+v:v}`).join(", ");
    const saveMods = `STR:${strMod>=0?"+"+strMod:strMod} DEX:${dexMod>=0?"+"+dexMod:dexMod} CON:${conMod>=0?"+"+conMod:conMod} INT:${intMod>=0?"+"+intMod:intMod} WIS:${wisMod>=0?"+"+wisMod:wisMod} CHA:${chaMod>=0?"+"+chaMod:chaMod}`;

    return `${p.name} plays ${c.name}, ${c.race}${c.subrace&&c.subrace!=="—"?" ("+c.subrace+")":""} ${c.cls} Lv${p.level||1} (bg: ${c.background||"none"}) — HP:${p.hp}/${p.maxHp} AC:${c.ac||10} Prof:+${pb}. Stats: STR${s.STR}(${strMod>=0?"+"+strMod:strMod}) DEX${s.DEX}(${dexMod>=0?"+"+dexMod:dexMod}) CON${s.CON}(${conMod>=0?"+"+conMod:conMod}) INT${s.INT}(${intMod>=0?"+"+intMod:intMod}) WIS${s.WIS}(${wisMod>=0?"+"+wisMod:wisMod}) CHA${s.CHA}(${chaMod>=0?"+"+chaMod:chaMod}). Attack bonus:${attackBonus>=0?"+"+attackBonus:attackBonus}${spellBonus!==null?` Spell attack:${spellBonus>=0?"+"+spellBonus:spellBonus} Spell save DC:${8+spellBonus}`:""}.${availSlots?` Spell slots: ${availSlots}.`:""}${spellList?` Spells: ${spellList}.`:""} Saving throws: ${saveMods}. Key skills: ${keySkills}.${inv?` Inventory: ${inv}.`:""}${c.backstory?` ${c.backstory}`:""}`;
  }).join("\n");
  const cur = camp.players[camp.turnIndex % camp.players.length];
  const theme = camp.theme||"Classic Fantasy";
  const themeData = THEMES[theme]||THEMES["Classic Fantasy"];
  const themeTone = theme==="Custom" && camp.customPremise
    ? camp.customPremise
    : themeData.tone;

  return `You are the sole Dungeon Master for a ${theme} D&D 5e campaign with ${camp.players.length} players. There is no human DM.

CAMPAIGN THEME: ${theme}
${themeTone}
${camp.customPremise && theme!=="Custom" ? `\nCREATOR'S PREMISE: ${camp.customPremise}` : ""}

PARTY:\n${chars}

RULES:
- Narrate vividly in 2–4 paragraphs. Make the world, NPCs, and atmosphere feel real and alive. Stay true to the campaign theme at all times.
- SPELL ENFORCEMENT: If a player attempts to cast a spell not in their known spells list, narrate that it fails — they simply don't know that spell. If they have no remaining slots for that spell level, narrate that their magical energy is spent. Never grant spell effects outside a player's actual known spells or available slots.
- If a spell can be avoided by a saving throw or an attack roll, you must ask for that roll before narrating whether it hits or how much damage it does. For example, Fireball needs a Dexterity save, Eldritch Blast needs an attack roll, and magic missile hits automatically but still follows the spell’s rules.
- This is strictly turn-based. One player acts per turn; you respond, then the next player goes.
- Always end your response by clearly naming whose turn it is next (e.g. "What do you do, ${cur?.name}?").
- When rolls are needed, name the player and die explicitly (e.g. "Roll a d20 for Stealth, ${cur?.name}.").
- Determine whether the player's action requires an ability check, skill check, or saving throw. If the outcome depends on a roll or would normally be uncertain to the player, request a roll rather than narrating the result automatically.
- For any action that includes investigating, searching, examining, inspecting, scanning, looking for, noticing, sensing, spotting, recalling, or probing, you should usually ask for a skill check instead of revealing hidden details directly.
- When a player says something like "investigate the scene," "search the wagon," "examine the carving," or "look for traps," this should usually be handled as an Investigation or Perception check. If the player is actively analyzing details or hidden clues, use Investigation; if they are noticing obvious sensory detail, use Perception.
- For every skill check, whether it is Stealth, Acrobatics, Athletics, Arcana, Insight, Investigation, Medicine, Nature, Perception, Performance, Persuasion, Deception, Intimidation, Sleight of Hand, Survival, or any other skill, always include the exact skill name and the full modifier from the current player's character sheet.
- When requesting a skill or saving throw, always include the exact skill or ability and the full modifier from the current player's character sheet. If the modifier is +0, write "+0"; if it is negative, include the sign (e.g. "Roll a d20 for Investigation (+7), Jenn." or "Roll a CON save (-1), Jenn.").
- Always include the modifier in parentheses immediately after the skill or ability name. Do not omit the modifier or say "Roll a d20 for Investigation" without it.
- HOLD TURN: This is critical. If your response asks the current player to roll ANY die (d20, d6, etc.), you MUST append HOLD_TURN on its own line at the end. Do not narrate the outcome of the roll before they roll it — stop the narrative, ask for the roll, and append HOLD_TURN. The app will automatically send their roll result back to you so you can then narrate the outcome. Only skip HOLD_TURN when no roll is needed and the turn should pass to the next player.
  Example correct usage: "Roll a d20 for Stealth, Jenn.\nHOLD_TURN"
  Example incorrect usage: narrating success/failure before the player has rolled.
- Let choices have real weight — good ideas succeed, recklessness backfires.
- Keep all players engaged through vivid narration even when it's not their turn.

COMBAT & INITIATIVE:
${(()=>{
  if(!camp.combat) return "NOT in combat.\n- When combat begins: append INITIATIVE_START:[\"EnemyName1\"] with enemy names only. Do NOT ask players to roll initiative. Do NOT append HOLD_TURN on this response.\n- Also append ENEMY_INITIATIVES:[{\"name\":\"EnemyName\",\"initiative\":X,\"hp\":Y,\"maxHp\":Y}] with enemy initiative rolls and starting HP.";
  const ord=(camp.initiativeOrder||[]);
  const ordStr=ord.map(function(e,i){return (i+1)+". "+e.name+"("+e.initiative+")";}).join(", ");
  const curN=ord[camp.combatTurnIdx%Math.max(1,ord.length)]?.name||"unknown";
  return "Currently IN COMBAT. Initiative order: "+ordStr+". Current turn: "+curN+".\n- On enemy turns: narrate what the enemy does, apply any damage via HP_CHANGES, then state who is next.\n- When ALL enemies are defeated or combat clearly ends, append: COMBAT_END\n- Always append ENEMY_HP:[{\"name\":\"EnemyName\",\"hp\":X,\"maxHp\":Y}] with current enemy HP after each combat action.";
})()}

XP AWARDS:
After your narrative, append these two JSON blocks on their own lines (no markdown, no code fences):
XP_AWARD:{"xp":0,"reason":""}
HP_CHANGES:[]

XP rules: Award XP only when something meaningful happens — defeating enemies (10-200 XP), solving puzzles (25-100 XP), major story milestones (50-500 XP), clever roleplay (10-50 XP). Award 0 for normal conversation/movement. Split XP equally among all players.

HP_CHANGES rules: Include an entry for every player whose HP changes this turn. Format each entry as:
{"name":"PlayerName","delta":-8,"reason":"hit by goblin sword"}
Use negative delta for damage, positive for healing. For a long rest use delta equal to their full max HP (they fully restore). For a short rest, use a reasonable Hit Die roll. If no HP changes, leave the array empty: [].
Always use the player's real name (not character name) exactly as listed in the party.

CONDITIONS: Append this block when any character gains or loses a condition:
CONDITIONS:[{"name":"CharacterName","condition":"Poisoned","active":true}]
Use active:true when applied, active:false when it ends. Conditions: Unconscious, Asleep, Paralyzed, Stunned, Petrified, Frightened, Poisoned, Prone, Blinded, Deafened, Restrained, Exhausted. Use player real name for players, enemy name for enemies. Omit if no changes.

DEATH SAVING THROWS: When an unconscious player at 0 HP takes their turn, do NOT ask them to act. The app handles death saves automatically. When a player takes damage while unconscious, append:
CONDITIONS:[{"name":"PlayerName","condition":"DeathFail","active":true}]
Add one entry per hit. The app tracks successes/failures.

ADVANTAGE/DISADVANTAGE: When the next player's roll clearly has advantage or disadvantage due to conditions or circumstances, append:
ROLL_MOD:{"type":"advantage","reason":"target is Prone","target":"PlayerName"}
or ROLL_MOD:{"type":"disadvantage","reason":"you are Blinded","target":"PlayerName"}
Omit if neither applies.

CONCENTRATION: When a concentrating player takes damage, append:
CON_CHECK:{"name":"PlayerName","damage":8}
The app will prompt them to roll a CON save. If they fail, remove their concentration spell automatically.`;
}

const PROXY = (() => {
  const host = location.hostname || "";
  const isLocal = host === "localhost" || host === "127.0.0.1" || host.endsWith(".local") || /^10\.|^192\.168\.|^172\.(1[6-9]|2[0-9]|3[0-1])\./.test(host);
  return isLocal ? `http://${host}:3000` : "https://dnd-proxy.onrender.com";
})();

function getApiKey() {
  // First check if the campaign has a shared API key
  if(S.campaign?.apiKey) return S.campaign.apiKey;

}

  }
}

// Wake lock — prevent mobile screen from sleeping during DM response
let _wakeLock = null;
async function acquireWakeLock() {
  try {
    if("wakeLock" in navigator) _wakeLock = await navigator.wakeLock.request("screen");
  } catch(e) {}
}
function releaseWakeLock() {
  try { if(_wakeLock) { _wakeLock.release(); _wakeLock = null; } } catch(e) {}
}

async function callDM(system, history) {
  const apiKey = getApiKey();
  if(!apiKey) { go("api-key"); throw new Error("No API key set"); }

  await acquireWakeLock();

  // Retry up to 2 times on network failure
  let lastError;
  for(let attempt = 0; attempt < 3; attempt++) {
    try {
      const controller = new AbortController();
      // 90 second timeout — generous for slow mobile connections
      const timeout = setTimeout(() => controller.abort(), 90000);
      const res = await fetch(`${PROXY}/api/dm`, {
        method:"POST",
        headers:{"Content-Type":"application/json","X-API-Key":apiKey},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1200, system, messages:history }),
        signal: controller.signal,
      });
      clearTimeout(timeout);
      const responseText = await res.text();
      releaseWakeLock();
      let data = null;
      try { data = JSON.parse(responseText); } catch(e) { }
      if(!res.ok) {
        const serverMsg = data?.error ? `: ${data.error}` : responseText ? `: ${responseText}` : "";
        throw new Error(`DM proxy error ${res.status} ${res.statusText}${serverMsg}`);
      }
      if(data?.error) throw new Error(data.error);
      const raw  = data?.content?.[0]?.text || "...";
  // Parse XP award
  const xpMatch = raw.match(/XP_AWARD:(\{.*?\})/);
  let xpAward = 0, xpReason = "";
  if(xpMatch) {
    try { const j=JSON.parse(xpMatch[1]); xpAward=j.xp||0; xpReason=j.reason||""; } catch(e){}
  }
  // Parse HP changes
  const hpMatch = raw.match(/HP_CHANGES:(\[.*?\])/s);
  let hpChanges = [];
  if(hpMatch) {
    try { hpChanges = JSON.parse(hpMatch[1])||[]; } catch(e){}
  }
  // Parse initiative signals
  const initStartMatch = raw.match(/\*{0,2}INITIATIVE_START:(\[.*?\])\*{0,2}/);
  let initiativeStart = null;
  if(initStartMatch) { try { initiativeStart = JSON.parse(initStartMatch[1]); } catch(e){} }

  const enemyInitMatch = raw.match(/\*{0,2}ENEMY_INITIATIVES:(\[.*?\])\*{0,2}/s);
  let enemyInitiatives = [];
  if(enemyInitMatch) { try { enemyInitiatives = JSON.parse(enemyInitMatch[1])||[]; } catch(e){} }

  const combatEnd = /COMBAT_END/.test(raw);

  const enemyHpMatch = raw.match(/ENEMY_HP:(\[.*?\])/s);
  let enemyHp = [];
  if(enemyHpMatch) { try { enemyHp = JSON.parse(enemyHpMatch[1])||[]; } catch(e){} }

  // Strip all JSON/signal blocks from displayed text
  // Handle both bare signals and markdown-wrapped (**SIGNAL:**) versions
  const text = raw
    .replace(/\*{0,2}\nXP_AWARD:\{.*?\}\*{0,2}/g,"")
    .replace(/\*{0,2}\nHP_CHANGES:\[.*?\]\*{0,2}/gs,"")
    .replace(/\*{0,2}\n?INITIATIVE_START:\[.*?\]\*{0,2}/g,"")
    .replace(/\*{0,2}\n?ENEMY_INITIATIVES:\[.*?\]\*{0,2}/gs,"")
    .replace(/\*{0,2}\nENEMY_HP:\[.*?\]\*{0,2}/gs,"")
    .replace(/\*{0,2}\nCOMBAT_END\*{0,2}/g,"")
    .replace(/\*\*/g,"")
    .trim();
  // Parse conditions
  const condMatch = raw.match(/CONDITIONS:(\[.*?\])/s);
  let conditions = [];
  if(condMatch) { try { conditions = JSON.parse(condMatch[1])||[]; } catch(e){} }

  // Parse roll modifier (advantage/disadvantage)
  const rollModMatch = raw.match(/ROLL_MOD:(\{.*?\})/);
  let rollMod = null;
  if(rollModMatch) { try { rollMod = JSON.parse(rollModMatch[1]); } catch(e){} }

  // Parse concentration check
  const concCheckMatch = raw.match(/CON_CHECK:(\{.*?\})/);
  let concCheck = null;
  if(concCheckMatch) { try { concCheck = JSON.parse(concCheckMatch[1]); } catch(e){} }

  // Parse HOLD_TURN signal — either explicit or detected from text
  const explicitHold = /\*{0,2}HOLD[_\s]TURN\*{0,2}/.test(raw);
  // Auto-detect roll requests — look for "roll a dX", "make a X check/save", "roll for X", "test your X", or "attempt a X check/save"
  const rollDetectPattern = /roll\s+a?\s*d\d+|roll\s+for\s+\w+|make\s+a\s+\w+\s+(check|save|saving\s+throw)|test\s+.*\b(check|save|saving\s+throw)\b|attempt\s+.*\b(check|save|saving\s+throw)\b|\b\w+\s+save\b|\bsave\s+vs?\s*\w+\b|\bsaving\s+throw\b/i;
  // Don't hold for initiative rolls — those are auto-handled by the app
  const isInitiativeRoll = /INITIATIVE_START/i.test(raw);
  const holdTurn = !isInitiativeRoll && (explicitHold || rollDetectPattern.test(raw));

  // Strip all blocks from text
  let text2 = text
    .replace(/\nCONDITIONS:\[.*?\]/gs,"")
    .replace(/\nROLL_MOD:\{.*?\}/g,"")
    .replace(/\nCON_CHECK:\{.*?\}/g,"")
    .replace(/\n?\*{0,2}HOLD[_\s]TURN\*{0,2}/g,"")
    .trim();

  // If holding for a roll, truncate at the roll request line so Claude's pre-rolled
  // narrative doesn't show. Keep everything up to and including the roll request sentence.
  if(holdTurn && !explicitHold) {
    const rollTruncPattern = /^(.*?(?:roll\s+a?\s*d\d+[^.!\n]*|make\s+a\s+\w+\s+(?:check|save|saving\s+throw)[^.!\n]*|roll\s+for\s+\w+[^.!\n]*|test\s+.*\b(?:check|save|saving\s+throw)\b[^.!\n]*|attempt\s+.*\b(?:check|save|saving\s+throw)\b[^.!\n]*)[.!]?)/is;
    const truncMatch = rollTruncPattern.exec(text2);
    if(truncMatch) text2 = truncMatch[1].trim();
  }

      return { text:text2, xpAward, xpReason, hpChanges, initiativeStart, enemyInitiatives, combatEnd, enemyHp, conditions, rollMod, concCheck, holdTurn };
    } catch(e) {
      lastError = e;
      releaseWakeLock();
      if(e.name === "AbortError") {
        // Timeout — wait 2s then retry
        if(attempt < 2) await new Promise(r => setTimeout(r, 2000));
      } else if(attempt < 2) {
        // Network error — wait 3s then retry
        await new Promise(r => setTimeout(r, 3000));
      }
    }
  }
  releaseWakeLock();
  throw lastError || new Error("DM connection failed after 3 attempts");
}

const go = screen => { S.screen=screen; render(); };

function render() {
  // Clear loading message on first render
  const lm = document.getElementById("loading-msg");
  if(lm) lm.remove();
  ({ landing:rLanding, "new-campaign":rNew, "join-campaign":rJoin,
     "char-creation":rChar, lobby:rLobby, play:rPlay, "api-key":rApiKey, "level-up":rLevelUp }[S.screen] || rLanding)();
}

function saveSession() {
  try { localStorage.setItem("chronicle_session", JSON.stringify({ campaignId:S.campaignId, myName:S.myName })); } catch(e){}
}
function clearSession() {
  try { localStorage.removeItem("chronicle_session"); } catch(e){}
}

function attach(id) {
  if(S.unsub) S.unsub();
  saveSession();
  S.unsub = subscribe(id, camp => {
    S.campaign = camp;
    S.isCreator = camp.creatorName === S.myName;
    saveCampaignToHistory(camp, S.myName);
    routePhase();
  });
}

function routePhase() {
  const c = S.campaign;
  if(!c) return;
  if(c.phase==="char-creation") {
    const me = c.players.find(p=>p.name===S.myName);
    go(me?.char ? "lobby" : "char-creation");
  } else if(c.phase==="play") {
    // Check if this player needs to level up
    const me = c.players.find(p=>p.name===S.myName);
    if(me?.levelUpPending) { go("level-up"); return; }
    go("play");
  }
}

async function tryAutoRejoin() {
  try {
    const saved = JSON.parse(localStorage.getItem("chronicle_session")||"{}");
    if(!saved.campaignId || !saved.myName) { render(); return; }
    const camp = await fetchCamp(saved.campaignId);
    if(!camp) { clearSession(); render(); return; }
    const pl = camp.players.find(p=>p.name===saved.myName);
    if(!pl) { clearSession(); render(); return; }
    S.campaignId = saved.campaignId;
    S.myName     = saved.myName;
    attach(S.campaignId);
  } catch(e) { render(); }
}

function getCampaignHistory() {
  try { return JSON.parse(localStorage.getItem("chronicle_history")||"[]"); } catch(e){ return []; }
}

function saveCampaignToHistory(camp, myName) {
  try {
    const history = getCampaignHistory().filter(c=>c.id!==camp.id);
    history.unshift({
      id: camp.id,
      myName,
      playerNames: camp.players.map(p=>p.name),
      phase: camp.phase,
      msgCount: (camp.messages||[]).length,
      lastPlayed: Date.now(),
    });
    localStorage.setItem("chronicle_history", JSON.stringify(history.slice(0,5)));
  } catch(e){}
}

async function resumeCampaign(id, myName) {
  const camp = await fetchCamp(id);
  if(!camp){ alert("Campaign not found — it may have been deleted."); return; }
  const pl = camp.players.find(p=>p.name===myName);
  if(!pl){ alert(`Player "${myName}" not found in this campaign.`); return; }
  S.campaignId = id;
  S.myName = myName;
  attach(id);
}

const NEW_SPELLS_PER_LEVEL = { Wizard:2, Bard:1, Warlock:1 };

function rLevelUp() {
  const camp = S.campaign;
  if(!camp) { go("play"); return; }
  const me = camp.players.find(p=>p.name===S.myName);
  if(!me||!me.char) { go("play"); return; }
  const c = me.char;
  const newLevel = me.level||1;
  const features = (LEVEL_FEATURES[c.cls]||{})[newLevel]||[];
  const newSpellCount = getNewSpellsOnLevelUp(c.cls, newLevel);
  const maxSlotLevel = maxSpellLevelForCharLevel(c.cls, newLevel);
  const isPrepared = SPELLS_KNOWN_TABLE[c.cls]===null && maxSlotLevel>0;
  const allClassSpells = getSpellsForClassLevel(c.cls, maxSlotLevel);
  const availableSpells = allClassSpells.filter(s=>!(me.sheet?.spells||[]).includes(s));
  const hasASI = features.some(f=>f.includes("ASI"));

  q("root").innerHTML = `
    <div class="fcenter">
      <div class="card wide">
        <h2 class="ch">🎉 Level Up! — Level ${newLevel} ${esc(c.cls)}</h2>
        <p class="csub">${esc(c.name)} has grown in power. Review your new abilities.</p>

        <div class="levelup-section">
          <div class="lu-hdr">New Features</div>
          ${features.length ? features.map(f=>`<div class="lu-feature">✦ ${esc(f)}</div>`).join("") : `<div class="lu-feature" style="opacity:.5">No new features at this level.</div>`}
        </div>

        <div class="levelup-section">
          <div class="lu-hdr">Hit Points</div>
          <div class="lu-feature">Max HP increased to <strong>${me.maxHp}</strong> (${CLASS_HP[c.cls]}d${CLASS_HP[c.cls]} + CON modifier per level)</div>
        </div>

        ${isPrepared && maxSlotLevel>0 ? `
        <div class="levelup-section">
          <div class="lu-hdr">Spellcasting — Prepared Caster</div>
          <div class="lu-feature">As a ${esc(c.cls)}, you prepare spells each day. You now have access to all ${esc(c.cls)} spells up to level ${maxSlotLevel}. Your full spell list is available in the Spells tab of your character sheet.</div>
          <div class="lu-feature" style="margin-top:.3rem">Spells available: ${allClassSpells.length} spells across ${maxSlotLevel} spell level${maxSlotLevel>1?"s":""}</div>
        </div>` : newSpellCount>0 && availableSpells.length>0 ? `
        <div class="levelup-section">
          <div class="lu-hdr">New Spells — Choose ${newSpellCount} (up to level ${maxSlotLevel})</div>
          <div id="spell-picks-count" class="spell-count">0/${newSpellCount} chosen</div>
          <div class="spell-grid">
            ${availableSpells.map(s=>`<label class="spell-check">
              <input type="checkbox" data-spell="${esc(s)}" class="lu-spbox"/> ${esc(s)}
            </label>`).join("")}
          </div>
        </div>` : newSpellCount===0 && maxSlotLevel===0 ? "" : `
        <div class="levelup-section">
          <div class="lu-hdr">Spellcasting</div>
          <div class="lu-feature" style="opacity:.6">No new spells to select at this level.</div>
        </div>`}

        ${hasASI ? `
        <div class="levelup-section">
          <div class="lu-hdr">Ability Score Improvement</div>
          <p class="csub">Choose +2 to one ability or +1 to two different abilities.</p>
          <div class="asi-grid">
            ${Object.entries(c.stats).map(([k,v])=>`
              <div class="asi-box">
                <div class="msk">${k}</div>
                <div class="msv" id="asi-val-${k}">${v}</div>
                <div class="asi-btns">
                  <button class="asi-btn" data-stat="${k}" data-amt="1">+1</button>
                  <button class="asi-btn" data-stat="${k}" data-amt="2">+2</button>
                </div>
              </div>`).join("")}
          </div>
          <div id="asi-status" class="csub" style="margin-top:.5rem">No ASI applied yet (optional)</div>
        </div>` : ""}

        <button class="btn-gold full" id="btn-levelup-done">⚔ Continue Adventure</button>
        <div class="err" id="er"></div>
      </div>
    </div>`;

  // Track selections
  let newSpells = [];
  let asiApplied = {};

  qall(".lu-spbox").forEach(cb => {
    cb.onchange = () => {
      newSpells = [...qall(".lu-spbox:checked")].map(c=>c.dataset.spell);
      if(newSpells.length>newSpellCount){ cb.checked=false; newSpells = [...qall(".lu-spbox:checked")].map(c=>c.dataset.spell); return; }
      id("spell-picks-count").textContent = `${newSpells.length}/${newSpellCount} chosen`;
      qall(".lu-spbox").forEach(c=>{ c.closest("label").classList.toggle("sp-on",c.checked); });
    };
  });

  qall(".asi-btn").forEach(btn => {
    btn.onclick = () => {
      const stat = btn.dataset.stat, amt = parseInt(btn.dataset.amt);
      const totalPoints = Object.values(asiApplied).reduce((a,b)=>a+b,0);
      if(totalPoints+amt>2){ id("er").textContent="You can only spend 2 total ASI points."; return; }
      if(amt===2 && totalPoints>0){ id("er").textContent="+2 must be applied to a single stat with no other increases."; return; }
      id("er").textContent="";
      asiApplied = amt===2 ? {[stat]:2} : {...asiApplied, [stat]:(asiApplied[stat]||0)+amt};
      // Update displayed values
      Object.entries(asiApplied).forEach(([k,v])=>{ const el=id(`asi-val-${k}`); if(el) el.textContent=c.stats[k]+v; });
      id("asi-status").textContent = `ASI: ${Object.entries(asiApplied).map(([k,v])=>"+"+v+" "+k).join(", ")}`;
    };
  });

  id("btn-levelup-done").onclick = async () => {
    const btn = id("btn-levelup-done");
    btn.disabled=true; btn.textContent="Saving...";
    const camp=S.campaign, me=camp.players.find(p=>p.name===S.myName);

    // Apply new spells
    const updatedSheet = {...(me.sheet||{})};
    if(newSpells.length>0) updatedSheet.spells = [...(updatedSheet.spells||[]), ...newSpells];

    // Apply ASI
    const updatedStats = {...c.stats};
    Object.entries(asiApplied).forEach(([k,v])=>{ updatedStats[k]=(updatedStats[k]||10)+v; });

    // Add new features to char
    const updatedFeatures = [...(c.features||[]), ...features.filter(f=>!f.includes("ASI"))];

    const players = camp.players.map(p => p.name===S.myName ? {
      ...p,
      char: {...c, stats:updatedStats, features:updatedFeatures},
      sheet: updatedSheet,
      levelUpPending: false,
    } : p);

    await patch(S.campaignId, {players});

    // Add level up message to narrative
    const luMsg = {type:"xp", text:`${c.name} reaches Level ${newLevel}! ${features.length?features[0]:"New power awakens."}`, ts:Date.now()};
    const messages = [...camp.messages, luMsg];
    await patch(S.campaignId, {messages});

    go("play");
  };
}

            You'll need a free <a href="https://console.anthropic.com" target="_blank" style="color:var(--gold)">Anthropic API key</a> to play.
            Add $5 in credits — it lasts many sessions. Hit <em>API Key Settings</em> to get started.
          </div>
        </div>` : ""}
        ${(()=>{
          const hist = getCampaignHistory();
          if(!hist.length) return "";
          return `<div class="resume-section">
            <div class="resume-title">↩ Resume Campaign</div>
            ${hist.map(c=>`
              <div class="resume-row" data-id="${c.id}" data-name="${c.myName}">
                <div class="resume-info">
                  <div class="resume-code">${c.id}</div>
                  <div class="resume-meta">${c.myName} · ${c.playerNames.join(", ")} · ${c.msgCount} messages</div>
                </div>
                <button class="btn-resume" data-id="${c.id}" data-name="${c.myName}">Resume →</button>
              </div>`).join("")}
          </div>`;
        })()}
      </div>
    </div>`;
  id("b-new").onclick  = () => { if(!getApiKey()) go("api-key"); else go("new-campaign"); };
  id("b-join").onclick = () => go("join-campaign");
  id("b-key").onclick  = () => go("api-key");
  id("b-help").onclick = () => showHandbook();
  qall(".btn-resume").forEach(btn => {
    btn.onclick = () => resumeCampaign(btn.dataset.id, btn.dataset.name);
  });
}

function rNew() {
  q("root").innerHTML = `
    <div class="fcenter">
      <div class="card wide">
        <h2 class="ch">Create a Campaign</h2>
        <p class="csub">You'll play as a full party member. Enter your name, choose a theme, then name your other players.</p>
        <div class="f"><label>Your Name</label><input id="cn" placeholder="Your name..."/></div>
        <div class="f">
          <label>Campaign Theme</label>
          <div class="theme-grid" id="theme-grid">
            ${Object.entries(THEMES).map(([key,t])=>`
              <div class="theme-card ${key==="Classic Fantasy"?"theme-selected":""}" data-theme="${key}">
                <div class="theme-icon">${t.icon}</div>
                <div class="theme-name">${key}</div>
                <div class="theme-desc">${t.desc}</div>
              </div>`).join("")}
          </div>
        </div>
        <div class="f" id="custom-premise-field" style="display:none">
          <label>Your Campaign Premise <span class="dim">(describe the setting, tone, and world)</span></label>
          <textarea id="custom-premise" rows="3" placeholder="A dark steampunk city where magic is illegal and the underground resistance fights the iron-fisted Arcane Authority..."></textarea>
        </div>
        <div class="f">
          <label>Additional Notes <span class="dim">(optional — any extra context for the DM)</span></label>
          <textarea id="camp-notes" rows="2" placeholder="e.g. Keep it family friendly, focus on mystery over combat, we're experienced players..."></textarea>
        </div>
        <div class="f"><label>Other Players <span class="dim">(optional, up to 3)</span></label>
          <div id="pl"><input class="pn" placeholder="Player 2..." style="margin-bottom:.4rem"/>
          <input class="pn" placeholder="Player 3..." style="margin-bottom:.4rem"/></div>
          <button class="btn-sm" id="addp">+ Add player</button>
        </div>
        <button class="btn-gold full" id="bcreate">Create &amp; Get Code</button>
        <button class="btn-ghost" id="bback">← Back</button>
        <div class="err" id="er"></div>
      </div>
    </div>`;
  id("bback").onclick = () => go("landing");
  let selectedTheme = "Classic Fantasy";

      qall(".theme-card").forEach(c=>c.classList.remove("theme-selected"));
      card.classList.add("theme-selected");
      selectedTheme = card.dataset.theme;
      id("custom-premise-field").style.display = selectedTheme==="Custom" ? "block" : "none";
    };

  id("addp").onclick = () => {

    id("pl").appendChild(i);
    if(pc>=4) id("addp").style.display="none";

    const creator=id("cn").value.trim();
    if(!creator){id("er").textContent="Enter your name.";return;}
    if(selectedTheme==="Custom" && !id("custom-premise")?.value.trim()){id("er").textContent="Describe your custom campaign premise.";return;}
    const others=[...qall(".pn")].map(i=>i.value.trim()).filter(Boolean);
    const notes = id("camp-notes")?.value.trim()||"";
    const customPremise = (id("custom-premise")?.value.trim()||"") + (notes?" Additional notes: "+notes:"");
    const btn=id("bcreate"); btn.disabled=true; btn.textContent="Creating...";
    try {
      const cid=await createCampaign(creator,others,selectedTheme,customPremise);
      S.campaignId=cid; S.myName=creator; S.isCreator=true;

// ── JOIN ──────────────────────────────────────────────────────────────────────
function rJoin() {
  q("root").innerHTML = `
    <div class="fcenter">
      <div class="card">
        <h2 class="ch">Join a Campaign</h2>
        <div class="f"><label>Campaign Code</label><input id="ci" placeholder="e.g. AB12CD" style="text-transform:uppercase;letter-spacing:.2em;font-size:1.1rem"/></div>
        <div class="f"><label>Your Name <span class="dim">(exactly as the creator entered it)</span></label><input id="ni" placeholder="Your name..."/></div>
        <button class="btn-gold full" id="bjoin">Join</button>
        <button class="btn-ghost" id="bback">← Back</button>
        <div class="err" id="er"></div>
      </div>
    </div>`;
  id("bback").onclick = () => go("landing");
  id("ci").oninput    = e => e.target.value=e.target.value.toUpperCase();
  id("bjoin").onclick = async () => {
    const code=id("ci").value.trim().toUpperCase(), name=id("ni").value.trim();
    if(!code||!name){id("er").textContent="Fill in both fields.";return;}
    const btn=id("bjoin"); btn.disabled=true; btn.textContent="Joining...";
    const camp=await fetchCamp(code);
    if(!camp){id("er").textContent="Campaign not found.";btn.disabled=false;btn.textContent="Join";return;}
    const pl=camp.players.find(p=>p.name.toLowerCase()===name.toLowerCase());
    if(!pl){id("er").textContent=`"${name}" isn't in this campaign — check with whoever created it.`;btn.disabled=false;btn.textContent="Join";return;}
    const players=camp.players.map(p=>p.name.toLowerCase()===name.toLowerCase()?{...p,joined:true}:p);
    await patch(code,{players});
    S.campaignId=code; S.myName=pl.name; S.isCreator=false;
    S.charDraft={name:"",race:"Human",cls:"Fighter",backstory:"",stats:rollAll()};
    attach(code);
  };
}

// ── CHARACTER CREATION (multi-step) ──────────────────────────────────────────
// Steps: race/class → background → skills → equipment → spells → review

function rChar() {
  const step = S.charDraft.step || 1;
  const d = S.charDraft;
  const steps = ["Race & Class","Background","Skills","Equipment","Spells","Review"];

  const stepBar = `<div class="step-bar">${steps.map((s,i)=>`<div class="step-pip ${i+1===step?"pip-on":i+1<step?"pip-done":""}">${i+1<step?"✓":i+1}</div><div class="step-label ${i+1===step?"slbl-on":""}">${s}</div>`).join("")}</div>`;

  let body = "";

  if(step===1) body = stepRaceClass(d);
  else if(step===2) body = stepBackground(d);
  else if(step===3) body = stepSkills(d);
  else if(step===4) body = stepEquipment(d);
  else if(step===5) body = stepSpells(d);
  else if(step===6) body = stepReview(d);

  q("root").innerHTML = `
    <div class="fcenter">
      <div class="card wide creation-card">
        <h2 class="ch">Forge Your Hero <span class="step-sub">Step ${step} of ${steps.length}</span></h2>
        <p class="csub">Welcome, ${esc(S.myName)}.</p>
        ${stepBar}
        <div id="step-body">${body}</div>
        <div class="step-nav">
          ${step>1?`<button class="btn-ghost step-back" id="step-back">← Back</button>`:""}
          ${step<6?`<button class="btn-gold step-next" id="step-next">Next →</button>`:`<button class="btn-gold step-next" id="step-save">⚔ Save Character</button>`}
        </div>
        <div class="err" id="er"></div>
      </div>
    </div>`;

  bindStep(step, d);
}

function stepRaceClass(d) {
  return `
    <div class="f"><label>Character Name</label><input id="cc-n" value="${esc(d.name)}" placeholder="Your hero's name..."/></div>
    <div class="two-col">
      <div class="f"><label>Race</label><select id="cc-r">${RACES.map(r=>`<option${r===d.race?" selected":""}>${r}</option>`).join("")}</select></div>
      <div class="f"><label>Class</label><select id="cc-c">${CLASSES.map(c=>`<option${c===d.cls?" selected":""}>${c}</option>`).join("")}</select></div>
    </div>
    <div class="f" id="subrace-field">
      <label>Subrace</label>
      <select id="cc-sr">
        ${(SUBRACES[d.race]||["—"]).map(s=>`<option${s===(d.subrace||"")?" selected":""}>${s}</option>`).join("")}
      </select>
      ${(SUBRACES[d.race]||["—"])[0]==="—"?`<div class="subrace-note">No subraces for ${d.race}.</div>`:""}
    </div>
    <div class="f"><label>Backstory <span class="dim">(optional)</span></label><textarea id="cc-b" placeholder="A wandering sellsword, a disgraced noble's heir...">${esc(d.backstory||"")}</textarea></div>
    <div class="f">
      <label>Ability Scores <span class="dim">(4d6 drop lowest)</span></label>
      <div class="stat-grid">${Object.entries(d.stats).map(([k,v])=>`<div class="stat-box"><div class="sk">${k}</div><div class="sv">${v}</div><div class="sm">${modStr(v)}</div></div>`).join("")}</div>
      <button class="btn-sm rmt" id="reroll">⚄ Reroll Stats</button>
    </div>
    <div class="f class-feature-box">
      <label>Class Features at Level 1</label>
      <div class="feature-list">${(CLASS_FEATURES[d.cls]||[]).map(f=>`<div class="feature-item">✦ ${f}</div>`).join("")}</div>
    </div>`;
}

function stepBackground(d) {
  const bg = d.background || "";
  const bgData = bg ? BACKGROUNDS[bg] : null;
  return `
    <div class="f"><label>Background</label>
      <select id="bg-sel">
        <option value="">— Choose background —</option>
        ${Object.keys(BACKGROUNDS).map(b=>`<option${b===bg?" selected":""}>${b}</option>`).join("")}
      </select>
    </div>
    ${bgData ? `
      <div class="bg-info">
        <div class="bg-row"><span class="bg-lbl">Bonus Skills:</span> ${bgData.skills.join(", ")}</div>
        <div class="bg-row"><span class="bg-lbl">Feature:</span> ${bgData.feature}</div>
        <div class="bg-row"><span class="bg-lbl">Starting Equipment:</span> ${bgData.equipment.join(", ")}</div>
      </div>` : `<div class="bg-hint">Select a background to see its benefits.</div>`}`;
}

function stepSkills(d) {
  const cls = d.cls;
  const bgSkills = d.background ? BACKGROUNDS[d.background]?.skills || [] : [];
  const clsData = CLASS_SKILLS[cls];
  const chosen = d.skills || [];
  const needed = clsData.choices;
  return `
    <div class="skill-header">
      <span>Choose <strong>${needed}</strong> skill proficiencies from your class list.</span>
      <span class="skill-count">${chosen.length}/${needed} chosen</span>
    </div>
    ${bgSkills.length?`<div class="bg-skill-note">From background (${d.background}): <strong>${bgSkills.join(", ")}</strong> — already included.</div>`:""}
    <div class="skill-grid">
      ${clsData.from.map(sk => {
        const fromBg = bgSkills.includes(sk);
        const isChosen = chosen.includes(sk) || fromBg;
        return `<label class="skill-check ${fromBg?"skill-bg":""}">
          <input type="checkbox" ${isChosen?"checked":""} ${fromBg?"disabled":""} data-skill="${sk}" class="skbox"/>
          <span>${sk}</span>
        </label>`;
      }).join("")}
    </div>
    <div class="f" style="margin-top:.8rem"><label>All Proficiencies (auto-listed, editable)</label>
      <textarea id="prof-ta" rows="2" placeholder="Add any extra proficiencies...">${esc((d.extraProfs||[]).join(", "))}</textarea>
    </div>`;
}

function stepEquipment(d) {
  const classEq = CLASS_EQUIPMENT[d.cls] || [];
  const bgEq    = d.background ? BACKGROUNDS[d.background]?.equipment || [] : [];
  const combined = d.equipment || [...classEq, ...bgEq];
  return `
    <div class="eq-note">Starting equipment from your class and background — edit as needed.</div>
    <div class="f"><label>Equipment</label>
      <div class="eq-list" id="eq-list">
        ${combined.map((item,i)=>`<div class="eq-item"><input class="eq-inp" data-i="${i}" value="${esc(item)}"/><button class="del-btn eq-del" data-i="${i}">✕</button></div>`).join("")}
      </div>
      <button class="btn-sm" id="add-eq">+ Add item</button>
    </div>
    <div class="f"><label>Gold Pieces</label><input id="gp-inp" type="number" value="${d.gp||0}" min="0" style="width:100px"/></div>`;
}

function stepSpells(d) {
  const cls = d.cls;
  const cantripList = SPELLS_BY_LEVEL[cls]?.cantrips||[];
  const spellList   = SPELLS_BY_LEVEL[cls]?.[1]||[];
  const cantripPicks = CANTRIP_PICKS[cls] || 0;
  const spellPicks   = SPELL_PICKS[cls];
  const isPreparedCaster = SPELLS_KNOWN_TABLE[cls]===null;
  const chosenCan = d.cantrips || [];
  const chosenSp  = d.spells   || [];

  if(!cantripList.length && !spellList.length) return `<div class="no-spells"><p>${cls}s do not cast spells.</p><p style="margin-top:.5rem;opacity:.7">Your class features (like Rage or Second Wind) are already noted on your sheet.</p></div>`;
  const isPrepared = SPELLS_KNOWN_TABLE[cls]===null && spellList.length>0;

  return `
    ${cantripList ? `
      <div class="spell-section">
        <div class="spell-hdr">Cantrips — choose <strong>${cantripPicks}</strong> <span class="spell-count">(${chosenCan.length}/${cantripPicks})</span></div>
        <div class="spell-grid">
          ${cantripList.map(s=>`<label class="spell-check ${chosenCan.includes(s)?"sp-on":""}">
            <input type="checkbox" ${chosenCan.includes(s)?"checked":""} data-spell="${s}" class="canbox"/> ${s}
          </label>`).join("")}
        </div>
      </div>` : ""}
    ${spellList ? `
      <div class="spell-section">
        <div class="spell-hdr">${isPrepared?"All 1st-Level Spells (prepared caster — you know all of them)":"1st-Level Spells — choose "+spellPicks} ${!isPrepared?`<span class="spell-count">(${chosenSp.length}/${spellPicks})</span>`:""}</div>
        ${isPrepared?`<div class="prep-note">As a ${cls}, you prepare spells each day. All are available — check the ones you have prepared today.</div>`:""}
        <div class="spell-grid">
          ${spellList.map(s=>`<label class="spell-check ${chosenSp.includes(s)?"sp-on":""}">
            <input type="checkbox" ${chosenSp.includes(s)?"checked":""} data-spell="${s}" class="spbox"/> ${s}
          </label>`).join("")}
        </div>
      </div>` : ""}`;
}

function stepReview(d) {
  const bgSkills  = d.background ? BACKGROUNDS[d.background]?.skills || [] : [];
  const allSkills = [...new Set([...bgSkills, ...(d.skills||[])])];
  const slots = CLASS_SPELL_SLOTS[d.cls] || {};
  return `
    <div class="review-grid">
      <div class="review-block">
        <div class="rv-hdr">${esc(d.name)}</div>
        <div class="rv-sub">${esc(d.race)}${d.subrace&&d.subrace!=="—"?" ("+esc(d.subrace)+")":""} ${esc(d.cls)} · ${esc(d.background||"No background")}</div>
      </div>
      <div class="review-block">
        <div class="rv-lbl">Ability Scores</div>
        <div class="mstats">${Object.entries(d.stats).map(([k,v])=>`<div class="ms"><div class="msk">${k}</div><div class="msv">${v}</div><div class="msm">${modStr(v)}</div></div>`).join("")}</div>
      </div>
      <div class="review-block">
        <div class="rv-lbl">Skill Proficiencies</div>
        <div class="rv-list">${allSkills.length?allSkills.join(", "):"None selected"}</div>
      </div>
      <div class="review-block">
        <div class="rv-lbl">Equipment</div>
        <div class="rv-list">${(d.equipment||[]).slice(0,6).join(", ")}${(d.equipment||[]).length>6?"...":""}</div>
      </div>
      ${d.cantrips?.length?`<div class="review-block"><div class="rv-lbl">Cantrips</div><div class="rv-list">${d.cantrips.join(", ")}</div></div>`:""}
      ${d.spells?.length?`<div class="review-block"><div class="rv-lbl">Spells Known</div><div class="rv-list">${d.spells.join(", ")}</div></div>`:""}
      ${Object.keys(slots).length?`<div class="review-block"><div class="rv-lbl">Spell Slots</div><div class="rv-list">${Object.entries(slots).map(([l,n])=>`Level ${l}: ${n}`).join(", ")}</div></div>`:""}
      <div class="review-block">
        <div class="rv-lbl">Class Features</div>
        <div class="rv-list">${(CLASS_FEATURES[d.cls]||[]).join(" · ")}</div>
      </div>
      ${d.backstory?`<div class="review-block"><div class="rv-lbl">Backstory</div><div class="rv-list">${esc(d.backstory)}</div></div>`:""}
    </div>`;
}

function bindStep(step, d) {
  const nextBtn = id("step-next") || id("step-save");
  const backBtn = id("step-back");
  if(backBtn) backBtn.onclick = () => { S.charDraft.step = step-1; rChar(); };

  if(step===1) {
    id("cc-n").oninput = e => S.charDraft.name=e.target.value;
    id("cc-r").onchange= e => {
      S.charDraft.race=e.target.value;
      S.charDraft.subrace=(SUBRACES[e.target.value]||["—"])[0];
      rChar();
    };
    const srSel=id("cc-sr"); if(srSel) srSel.onchange=e=>S.charDraft.subrace=e.target.value;
    id("cc-c").onchange= e => {
      S.charDraft.cls=e.target.value;
      // Reset equipment/spells when class changes
      delete S.charDraft.equipment;
      delete S.charDraft.spells;
      delete S.charDraft.cantrips;
      rChar();
    };
    id("cc-b").oninput = e => S.charDraft.backstory=e.target.value;
    id("reroll").onclick= () => { S.charDraft.stats=rollAll(); rChar(); };
    if(nextBtn) nextBtn.onclick = () => {
      if(!S.charDraft.name?.trim()){ id("er").textContent="Name your character."; return; }
      S.charDraft.step=2; rChar();
    };
  }

  if(step===2) {
    id("bg-sel").onchange = e => {
      S.charDraft.background = e.target.value;
      delete S.charDraft.equipment; // reset equipment when background changes
      rChar();
    };
    if(nextBtn) nextBtn.onclick = () => {
      if(!S.charDraft.background){ id("er").textContent="Choose a background."; return; }
      S.charDraft.step=3; rChar();
    };
  }

  if(step===3) {
    const bgSkills = d.background ? BACKGROUNDS[d.background]?.skills||[] : [];
    qall(".skbox").forEach(cb => {
      cb.onchange = () => {
        const chosen = [...qall(".skbox:checked")].map(c=>c.dataset.skill).filter(s=>!bgSkills.includes(s));
        S.charDraft.skills = chosen;
        // re-render count
        const cnt = document.querySelector(".skill-count");
        if(cnt) cnt.textContent = `${chosen.length}/${CLASS_SKILLS[d.cls].choices} chosen`;
      };
    });
    id("prof-ta").oninput = e => S.charDraft.extraProfs = e.target.value.split(",").map(s=>s.trim()).filter(Boolean);
    if(nextBtn) nextBtn.onclick = () => {
      const needed = CLASS_SKILLS[d.cls].choices;
      const chosen = (S.charDraft.skills||[]).length;
      if(chosen < needed){ id("er").textContent=`Choose ${needed} skills (${chosen} selected).`; return; }
      S.charDraft.step=4; rChar();
    };
  }

  if(step===4) {
    // Initialize equipment if not set
    if(!S.charDraft.equipment) {
      S.charDraft.equipment = [...(CLASS_EQUIPMENT[d.cls]||[]), ...(d.background?BACKGROUNDS[d.background]?.equipment||[]:[])] ;
    }
    qall(".eq-inp").forEach(inp => {
      inp.oninput = e => { const i=parseInt(inp.dataset.i); S.charDraft.equipment[i]=e.target.value; };
    });
    qall(".eq-del").forEach(btn => {
      btn.onclick = () => { const i=parseInt(btn.dataset.i); S.charDraft.equipment.splice(i,1); rChar(); };
    });
    id("add-eq").onclick = () => { S.charDraft.equipment.push(""); rChar(); };
    id("gp-inp").oninput = e => S.charDraft.gp = parseInt(e.target.value)||0;
    if(nextBtn) nextBtn.onclick = () => { S.charDraft.step=5; rChar(); };
  }

  if(step===5) {
    const cantripPicks = CANTRIP_PICKS[d.cls]||0;
    const spellPicks   = SPELL_PICKS[d.cls];
    const isPrepared   = spellPicks===999;

    qall(".canbox").forEach(cb => {
      cb.onchange = () => {
        const chosen=[...qall(".canbox:checked")].map(c=>c.dataset.spell);
        if(chosen.length>cantripPicks){ cb.checked=false; id("er").textContent=`Max ${cantripPicks} cantrips.`; return; }
        id("er").textContent="";
        S.charDraft.cantrips=chosen;
        qall(".canbox").forEach(c=>{ c.closest("label").classList.toggle("sp-on",c.checked); });
      };
    });
    qall(".spbox").forEach(cb => {
      cb.onchange = () => {
        const chosen=[...qall(".spbox:checked")].map(c=>c.dataset.spell);
        if(!isPrepared && chosen.length>spellPicks){ cb.checked=false; id("er").textContent=`Max ${spellPicks} spells.`; return; }
        id("er").textContent="";
        S.charDraft.spells=chosen;
        qall(".spbox").forEach(c=>{ c.closest("label").classList.toggle("sp-on",c.checked); });
      };
    });
    if(nextBtn) nextBtn.onclick = () => {
      const needCan = CANTRIP_PICKS[d.cls]||0;
      if(needCan>0 && (S.charDraft.cantrips||[]).length<needCan && CANTRIPS[d.cls]){
        id("er").textContent=`Choose ${needCan} cantrips.`; return;
      }
      S.charDraft.step=6; rChar();
    };
  }

  if(step===6) {
    const saveBtn = id("step-save");
    if(saveBtn) saveBtn.onclick = async () => {
      const d=S.charDraft;
      const bgSkills = d.background ? BACKGROUNDS[d.background]?.skills||[] : [];
      const allSkills= [...new Set([...bgSkills,...(d.skills||[])])];
      const char = {
        name:d.name, race:d.race, subrace:d.subrace||"", cls:d.cls, background:d.background||"",
        backstory:d.backstory||"", stats:d.stats,
        skills:allSkills, extraProfs:d.extraProfs||[],
        equipment:d.equipment||[], gp:d.gp||0,
        cantrips:d.cantrips||[], spells:d.spells||[],
        features:CLASS_FEATURES[d.cls]||[],
        spellSlots:CLASS_SPELL_SLOTS[d.cls]||{},
      };
      const hp = calcHp(d.cls, d.stats.CON);
      // Initial sheet state
      const sheet = {
        inventory: [...(d.equipment||[])],
        spells: [...(d.cantrips||[]), ...(d.spells||[])],
        skills: allSkills,
        notes: "",
        spellSlotsUsed: {},
        action: false, bonusAction: false, reaction: false,
        concentration: "",
        gp: d.gp||0,
      };
      saveBtn.disabled=true; saveBtn.textContent="Saving...";
      const players=S.campaign.players.map(p=>p.name===S.myName?{...p,char,hp,maxHp:hp,sheet}:p);
      await patch(S.campaignId,{players});
    };
  }
}


// ── CHARACTER SHEET PANEL ────────────────────────────────────────────────────
function sheetHtml(me, camp) {
  const c = me.char;
  const sheet = me.sheet || {};
  const tab = S.sheetTab;
  const tabs = ["combat","spells","inventory","skills","notes"];

  const tabContent = () => {
    if(tab==="combat") return combatTab(c, me, sheet);
    if(tab==="spells") return spellsTab(c, sheet);
    if(tab==="inventory") return inventoryTab(sheet);
    if(tab==="skills") return skillsTab(c, sheet);
    if(tab==="notes") return notesTab(sheet);
    return "";
  };

  return `<div class="card sc">
    <div class="st sheet-toggle" id="sheet-toggle">
      ${esc(c.name)} <span class="sheet-arrow">${S.sheetOpen?"▲":"▼"}</span>
    </div>
    ${S.sheetOpen ? `
    <div class="sheet-tabs">
      ${tabs.map(t=>`<button class="stab ${tab===t?"stab-on":""}" data-tab="${t}">${t}</button>`).join("")}
    </div>
    <div class="sheet-body">${tabContent()}</div>
    ` : ""}
  </div>`;
}

function combatTab(c, me, sheet) {
  const ac   = sheet.ac || (10+mod(c.stats.DEX));
  const init = modStr(c.stats.DEX);
  const used = sheet.spellSlotsUsed || {};
  const slots= c.spellSlots || {};
  const hasSlots = Object.keys(slots).length>0;
  const weaponActions = getWeaponActions(sheet.inventory||[], sheet.equipped||[], c.stats, c.cls);
  const bonusActions  = CLASS_BONUS_ACTIONS[c.cls]||[];
  const reactions     = CLASS_REACTIONS[c.cls]||[];
  // Spell actions — non-cantrip spells from sheet
  const cantrips = (c.cantrips||[]);
  const spellActions = (sheet.spells||[]).filter(s=>cantrips.includes(s));
  const nonCantripSpells = (sheet.spells||[]).filter(s=>!cantrips.includes(s)).slice(0,6);

  return `
    <div class="combat-stats">
      <div class="cs-box"><div class="cs-lbl">AC</div><div class="cs-val">${ac}</div></div>
      <div class="cs-box"><div class="cs-lbl">Init</div><div class="cs-val">${init}</div></div>
      <div class="cs-box"><div class="cs-lbl">Speed</div><div class="cs-val">${sheet.speed||"30ft"}</div></div>
      <div class="cs-box"><div class="cs-lbl">Prof</div><div class="cs-val">+2</div></div>
    </div>
    <div class="xp-bar-wrap">
      <div class="xp-row">
        <span class="xp-lbl">Level ${me.level||1} ${esc(c.cls)}</span>
        <span class="xp-val">${me.xp||0} XP ${xpForNext(me.level||1)?`/ ${xpForNext(me.level||1)}`:"(max)"}</span>
      </div>
      <div class="xp-track"><div class="xp-fill" style="width:${xpForNext(me.level||1)?Math.round(((me.xp||0)-XP_THRESHOLDS[(me.level||1)-1])/(xpForNext(me.level||1)-XP_THRESHOLDS[(me.level||1)-1])*100):100}%"></div></div>
      ${me.levelUpPending?`<div class="levelup-banner">🎉 Level Up! Your HP and spell slots have been updated.</div>`:""}
    </div>
    <div class="act-section">
      <div class="act-row">
        <label class="act-check"><input type="checkbox" id="chk-action" ${sheet.action?"checked":""}/><span>Action</span></label>
        <label class="act-check"><input type="checkbox" id="chk-bonus" ${sheet.bonusAction?"checked":""}/><span>Bonus Action</span></label>
        <label class="act-check"><input type="checkbox" id="chk-reaction" ${sheet.reaction?"checked":""}/><span>Reaction</span></label>
      </div>
      <button class="btn-rest" id="btn-rest">🌙 Short/Long Rest — Reset All</button>
    </div>

    <!-- ACTIONS -->
    <div class="action-section">
      <div class="slots-lbl">⚔ Actions</div>
      ${weaponActions.map(a=>`
        <div class="action-row-item">
          <div class="act-name">${esc(a.name)}</div>
          <div class="act-detail"><span class="act-hit">${a.hit} to hit</span> · <span class="act-dmg">${a.dmg} ${a.dmgType}</span>${a.prop?` · <span class="act-prop">${esc(a.prop)}</span>`:""}</div>
        </div>`).join("")}
      ${cantrips.map(s=>`
        <div class="action-row-item">
          <div class="act-name">🔮 ${esc(s)}</div>
          <div class="act-detail act-prop">Cantrip · Action</div>
        </div>`).join("")}
      ${nonCantripSpells.length?`
        <div class="action-row-item">
          <div class="act-name">📖 Cast Spell</div>
          <div class="act-detail act-prop">${nonCantripSpells.slice(0,4).map(s=>esc(s)).join(", ")}${nonCantripSpells.length>4?` +${nonCantripSpells.length-4} more`:""}</div>
        </div>`:""}
    </div>

    <!-- BONUS ACTIONS -->
    ${bonusActions.length?`
    <div class="action-section">
      <div class="slots-lbl">⚡ Bonus Actions</div>
      ${bonusActions.map(a=>`<div class="action-row-item"><div class="act-name act-bonus-name">${esc(a)}</div></div>`).join("")}
    </div>`:""}

    <!-- REACTIONS -->
    ${reactions.length?`
    <div class="action-section">
      <div class="slots-lbl">🛡 Reactions</div>
      ${reactions.map(a=>`<div class="action-row-item"><div class="act-name act-react-name">${esc(a)}</div></div>`).join("")}
    </div>`:""}

    <!-- SPELL SLOTS -->
    ${hasSlots?`
    <div class="slots-section">
      <div class="slots-lbl">✨ Spell Slots</div>
      ${Object.entries(slots).map(([lvl,total])=>{
        const usedN = used[lvl]||0;
        const avail = total-usedN;
        return `<div class="slot-row">
          <span class="slot-name">Lv${lvl}</span>
          <div class="slot-pips">${Array.from({length:total},(_,i)=>`<div class="slot-pip ${i<avail?"pip-avail":""}" data-lvl="${lvl}" data-idx="${i}"></div>`).join("")}</div>
          <button class="slot-use-btn" data-lvl="${lvl}" ${avail<1?"disabled":""}>Use</button>
          <button class="slot-reg-btn" data-lvl="${lvl}" ${usedN<1?"disabled":""}>↩</button>

    <div class="conc-row">
      <span class="conc-lbl">Concentration:</span>
      <input class="conc-inp" id="conc-inp" placeholder="None" value="${esc(sheet.concentration||"")}"/>
    </div>
    ${(me.conditions||[]).length?`
    <div class="action-section">
      <div class="slots-lbl">⚠ Active Conditions</div>
      <div class="cond-badges-lg">
        ${(me.conditions||[]).map(c=>`<span class="cond-badge-lg ${TURN_SKIP_CONDITIONS.includes(c)?"cond-danger":""}">${CONDITION_ICONS[c]||""}${c}</span>`).join("")}
      </div>
    </div>`:""}
    <div class="feature-section">
      <div class="slots-lbl">★ Class Features</div>
      ${(c.features||[]).map(f=>`<div class="feature-item">✦ ${esc(f)}</div>`).join("")}
    </div>`;
}

function spellsTab(c, sheet) {
  const spells = sheet.spells || [];
  return `
    <div class="sheet-list">
      ${spells.map((s,i)=>`<div class="sheet-item"><span>${esc(s)}</span><button class="del-btn" data-type="spells" data-i="${i}">✕</button></div>`).join("")}
      ${!spells.length?`<div class="empty-list">No spells added yet</div>`:""}
    </div>
    <div class="sheet-add-row">
      <input id="spell-inp" class="sheet-inp" placeholder="Add spell or ability..."/>
      <button class="sheet-add-btn" data-type="spells">+</button>
    </div>`;
}

function inventoryTab(sheet) {
  const inv = sheet.inventory || [];
  const equipped = sheet.equipped || [];
  // Detect if item is a weapon by checking WEAPON_DAMAGE keys
  const isWeapon = item => Object.keys(WEAPON_DAMAGE).some(w => item.toLowerCase().replace(/\s*\(.*?\)/g,"").trim().includes(w));
  return `
    <div class="inv-gp-row">
      <span class="gp-lbl">💰 Gold:</span>
      <input class="gp-inp-sm" id="gp-sm" type="number" min="0" value="${sheet.gp||0}"/>
      <button class="btn-sm" id="gp-save">Save</button>
    </div>
    <div class="inv-legend">
      <span class="inv-leg-eq">⚔ = equipped (shown in actions)</span>
    </div>
    <div class="sheet-list">
      ${inv.map((item,i)=>{
        const isWeap = isWeapon(item);
        const isEq   = equipped.includes(i);
        return `<div class="sheet-item ${isEq?"item-equipped":""}">
          ${isWeap?`<button class="equip-btn ${isEq?"eq-on":""}" data-i="${i}" title="${isEq?"Unequip":"Equip"}">${isEq?"⚔":"○"}</button>`:`<span class="eq-spacer"></span>`}
          <span class="inv-name">${esc(item)}</span>
          <button class="del-btn" data-type="inventory" data-i="${i}">✕</button>
        </div>`;

      ${!inv.length?`<div class="empty-list">No items yet</div>`:""}

      <input id="inv-inp" class="sheet-inp" placeholder="Add item or weapon..."/>
      <button class="sheet-add-btn" data-type="inventory">+</button>

function skillsTab(c, sheet) {
  const profs = [...new Set([...(c.skills||[]),...(c.extraProfs||[])])];
  const customSkills = sheet.customSkills || [];
  return `
    <div class="slots-lbl">Proficiencies</div>
    <div class="prof-list">
      ${profs.map(s=>`<div class="prof-item">✦ ${esc(s)}</div>`).join("")}
      ${customSkills.map((s,i)=>`<div class="prof-item">${esc(s)} <button class="del-btn" data-type="customSkills" data-i="${i}">✕</button></div>`).join("")}

      <input id="skill-inp" class="sheet-inp" placeholder="Add proficiency..."/>
